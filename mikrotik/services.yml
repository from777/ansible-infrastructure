# @file services.yml
# @desc Отключение ненужных сервисов MikroTik (ftp, telnet, www, api)
# @hosts mikrotik
---
- name: Configure MikroTik services
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    services_disabled:
      - ftp
      - telnet
      - www
      - www-ssl
      - api
      - api-ssl
    services_enabled:
      - ssh
      - winbox

  tasks:
    - name: Build allowed addresses string
      ansible.builtin.set_fact:
        allowed_addresses: "{{ allowed_networks | join(',') }}"

    - name: Disable services
      community.routeros.command:
        commands:
          - /ip/service/disable {{ item }}
      loop: "{{ services_disabled }}"
      ignore_errors: yes

    - name: Enable services
      community.routeros.command:
        commands:
          - /ip/service/enable {{ item }}
      loop: "{{ services_enabled }}"
      ignore_errors: yes

    - name: Set SSH allowed addresses
      community.routeros.command:
        commands:
          - /ip/service/set ssh address={{ allowed_addresses }}

    - name: Set Winbox allowed addresses
      community.routeros.command:
        commands:
          - /ip/service/set winbox address={{ allowed_addresses }}

    - name: Disable bandwidth-test server
      community.routeros.command:
        commands:
          - /tool/bandwidth-server/set enabled=no

    - name: Show result
      ansible.builtin.debug:
        msg: "Disabled: {{ services_disabled }}. Enabled: {{ services_enabled }}. Allowed: {{ allowed_addresses }}"