# 12-guest-input.yml
# Правила для трафика от гостевой сети к роутеру
# Разрешаем только DNS и DHCP, всё остальное дропаем
# НЕ ЗАПУСКАТЬ на роутерах без гостевой сети!
---
- name: Configure GUEST-Input rules
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # Проверяем есть ли interface-list GUEST
    - name: Check if GUEST interface list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="GUEST"
      register: guest_list_count

    - name: Set GUEST list exists flag
      set_fact:
        guest_list_exists: "{{ guest_list_count.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 }}"

    # Пропускаем если нет GUEST interface list
    - name: Skip if no GUEST interface list
      debug:
        msg: "GUEST interface list not found - skipping GUEST-Input rules"
      when: not guest_list_exists

    # Проверяем есть ли уже правила GUEST-Input
    - name: Check if GUEST-Input rules exist
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain="GUEST-Input" action=accept
      register: guest_input_count
      when: guest_list_exists

    - name: Set rules exist flag
      set_fact:
        guest_input_exists: "{{ guest_input_count.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 3 }}"
      when: guest_list_exists

    # Добавляем правила GUEST-Input
    - name: Add GUEST-Input rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=established comment="GUEST: Accept established"
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=related comment="GUEST: Accept related"
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=untracked comment="GUEST: Accept untracked"
          - /ip/firewall/filter/add chain=GUEST-Input action=drop connection-state=invalid comment="GUEST: Drop invalid"
          - /ip/firewall/filter/add chain=GUEST-Input action=accept protocol=udp dst-port=53 comment="GUEST: Allow DNS"
          - /ip/firewall/filter/add chain=GUEST-Input action=accept protocol=udp dst-port=67 comment="GUEST: Allow DHCP"
          - /ip/firewall/filter/add chain=GUEST-Input action=drop comment="GUEST: Drop all other to router"
      when: guest_list_exists and not guest_input_exists | default(false)

    - name: Show result
      debug:
        msg: "GUEST-Input rules - {{ 'skipped (no GUEST list)' if not guest_list_exists else ('already configured' if guest_input_exists | default(false) else 'added') }}"