# 10-lan-input.yml
# Правила для трафика от LAN к роутеру
# LAN - доверенная сеть, разрешаем всё
---
- name: Configure LAN-Input rules
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # Проверяем есть ли правило accept в LAN-Input
    - name: Check if LAN-Input accept rule exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain="LAN-Input" action=accept
      register: lan_input_count

    - name: Set rule exists flag
      set_fact:
        lan_input_exists: "{{ lan_input_count.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 }}"

    # Добавляем правило
    - name: Add LAN-Input accept rule
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=LAN-Input action=accept comment="Accept all from LAN"
      when: not lan_input_exists

    - name: Show result
      debug:
        msg: "LAN-Input rules - {{ 'already configured' if lan_input_exists else 'added' }}"