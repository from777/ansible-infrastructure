# 01-brute-force.yml
# Защита от перебора паролей
# Блокирует IP после 4 неудачных попыток на 8 часов
---
- name: Configure Brute-force protection
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # Проверяем есть ли уже правила Brute-force
    - name: Check if Brute-force rules exist
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain="Brute-force"
      register: brute_count

    - name: Set rules exist flag
      set_fact:
        brute_exists: "{{ brute_count.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 5 }}"

    # Добавляем правила только если их мало (chain пустой или только маркер)
    - name: Add Brute-force rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=Brute-force action=drop src-address-list=Brute-force-block comment="BF: Drop blocked"
          - /ip/firewall/filter/add chain=Brute-force action=add-src-to-address-list src-address-list=Brute-force-4 address-list=Brute-force-block address-list-timeout=8h comment="BF: Block after 4th"
          - /ip/firewall/filter/add chain=Brute-force action=add-src-to-address-list src-address-list=Brute-force-3 address-list=Brute-force-4 address-list-timeout=30s comment="BF: 4th attempt"
          - /ip/firewall/filter/add chain=Brute-force action=add-src-to-address-list src-address-list=Brute-force-2 address-list=Brute-force-3 address-list-timeout=30s comment="BF: 3rd attempt"
          - /ip/firewall/filter/add chain=Brute-force action=add-src-to-address-list src-address-list=Brute-force-1 address-list=Brute-force-2 address-list-timeout=30s comment="BF: 2nd attempt"
          - /ip/firewall/filter/add chain=Brute-force action=add-src-to-address-list address-list=Brute-force-1 address-list-timeout=30s comment="BF: 1st attempt"
          - /ip/firewall/filter/add chain=Brute-force action=accept comment="BF: Accept if not blocked"
      when: not brute_exists

    - name: Show result
      debug:
        msg: "Brute-force rules - {{ 'already configured' if brute_exists else 'added' }}"