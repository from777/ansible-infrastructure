# 21-isp-forward.yml
# Правила для chain=ISP-Forward
# Трафик из WAN (интернета) внутрь сети
#
# Разрешаем только:
# - established/related (ответы на наши запросы)
# - DST-NAT (проброс портов)
# Всё остальное блокируем (защита от атак из интернета)
---
- name: Configure ISP-Forward chain
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # Разрешаем established соединения (ответы на наши запросы)
    - name: Add ISP-Forward accept established
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=ISP-Forward action=accept connection-state=established comment="ISP-FWD Accept established"

    # Разрешаем related соединения
    - name: Add ISP-Forward accept related
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=ISP-Forward action=accept connection-state=related comment="ISP-FWD Accept related"

    # Разрешаем untracked соединения
    - name: Add ISP-Forward accept untracked
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=ISP-Forward action=accept connection-state=untracked comment="ISP-FWD Accept untracked"

    # Блокируем invalid соединения (битые пакеты)
    - name: Add ISP-Forward drop invalid
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=ISP-Forward action=drop connection-state=invalid comment="ISP-FWD Drop invalid"

    # Разрешаем DST-NAT (проброс портов)
    - name: Add ISP-Forward accept DST-NAT
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=ISP-Forward action=accept connection-nat-state=dstnat comment="ISP-FWD Accept DST-NAT"

    # Всё остальное блокируем
    - name: Add ISP-Forward drop all
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=ISP-Forward action=drop comment="ISP-FWD Drop all other"

    # Итоговое сообщение
    - name: Show result
      debug:
        msg: "ISP-Forward chain added - only established and DST-NAT allowed"
