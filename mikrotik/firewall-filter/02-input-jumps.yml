# 02-input-jumps.yml
# Jump правила для chain=input
# Определяют порядок обработки трафика К роутеру
#
# Порядок важен! Правила добавляются в таком порядке:
# 1. jump → LAN-Input (трафик из LAN)
# 2. jump → ISP-Input (трафик из WAN)
# 3. jump → VPN-Input (трафик из VPN, если есть)
# 4. jump → GUEST-Input (трафик из гостевой сети, если есть)
# 5. drop all (всё остальное блокируем)
---
- name: Add input jump rules
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # ===== ПРОВЕРКА INTERFACE-LISTS =====
    - name: Check GUEST interface list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="GUEST"
      register: guest_list_check

    - name: Check VPN-OUT interface list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="VPN-OUT"
      register: vpn_list_check

    - name: Set interface list flags
      set_fact:
        has_guest: "{{ guest_list_check.stdout[0] | int > 0 }}"
        has_vpn: "{{ vpn_list_check.stdout[0] | int > 0 }}"

    - name: Show detected interface lists
      debug:
        msg: "GUEST: {{ has_guest }}, VPN-OUT: {{ has_vpn }}"

    # ===== JUMP ПРАВИЛА С ПРОВЕРКОЙ =====

    # --- LAN-Input ---
    - name: Check LAN-Input jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="Jump to LAN-Input"
      register: lan_input_check

    - name: Add jump to LAN-Input
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=jump jump-target=LAN-Input in-interface-list=LAN comment="Jump to LAN-Input"
      when: lan_input_check.stdout[0] | int == 0

    # --- ISP-Input ---
    - name: Check ISP-Input jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="Jump to ISP-Input"
      register: isp_input_check

    - name: Add jump to ISP-Input
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=jump jump-target=ISP-Input in-interface-list=WAN comment="Jump to ISP-Input"
      when: isp_input_check.stdout[0] | int == 0

    # --- VPN-Input ---
    - name: Check VPN-Input jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="Jump to VPN-Input"
      register: vpn_input_check
      when: has_vpn

    - name: Add jump to VPN-Input
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=jump jump-target=VPN-Input in-interface-list=VPN-OUT comment="Jump to VPN-Input"
      when: has_vpn and (vpn_input_check.stdout[0] | int == 0)

    # --- GUEST-Input ---
    - name: Check GUEST-Input jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="Jump to GUEST-Input"
      register: guest_input_check
      when: has_guest

    - name: Add jump to GUEST-Input
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=jump jump-target=GUEST-Input in-interface-list=GUEST comment="Jump to GUEST-Input"
      when: has_guest and (guest_input_check.stdout[0] | int == 0)

    # --- DROP ALL ---
    - name: Check input drop all exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="Drop all other to router"
      register: drop_all_check

    - name: Add input drop all
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=drop log=yes log-prefix="INPUT-DROP:" comment="Drop all other to router"
      when: drop_all_check.stdout[0] | int == 0

    - name: Show result
      debug:
        msg: "Input jumps configured (GUEST: {{ has_guest }}, VPN: {{ has_vpn }})"
