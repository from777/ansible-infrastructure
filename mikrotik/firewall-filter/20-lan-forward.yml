# 20-lan-forward.yml
# Правила для трафика из LAN наружу
# LAN - доверенная сеть, разрешаем всё
---
- name: Configure LAN-Forward rules
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # Проверяем есть ли уже правила LAN-Forward
    - name: Check if LAN-Forward rules exist
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain="LAN-Forward" action=accept
      register: lan_forward_count

    - name: Set rules exist flag
      set_fact:
        lan_forward_exists: "{{ lan_forward_count.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 3 }}"

    # Добавляем правила LAN-Forward
    - name: Add LAN-Forward rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=LAN-Forward action=accept connection-state=established comment="LAN-FWD: Accept established"
          - /ip/firewall/filter/add chain=LAN-Forward action=accept connection-state=related comment="LAN-FWD: Accept related"
          - /ip/firewall/filter/add chain=LAN-Forward action=accept connection-state=untracked comment="LAN-FWD: Accept untracked"
          - /ip/firewall/filter/add chain=LAN-Forward action=drop connection-state=invalid comment="LAN-FWD: Drop invalid"
          - /ip/firewall/filter/add chain=LAN-Forward action=accept comment="LAN-FWD: Accept new from LAN"
      when: not lan_forward_exists

    - name: Show result
      debug:
        msg: "LAN-Forward rules - {{ 'already configured' if lan_forward_exists else 'added' }}"