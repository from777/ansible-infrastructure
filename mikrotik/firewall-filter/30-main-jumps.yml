# 30-main-jumps.yml
# Главные правила input и forward
# Делают jump в соответствующие chains по interface-list
# ЗАПУСКАТЬ ПОСЛЕ всех остальных плейбуков!
---
- name: Configure main input/forward jumps
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # ===== INPUT JUMPS =====

    # Проверяем есть ли jump к LAN-Input
    - name: Check LAN-Input jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=input action=jump jump-target=LAN-Input
      register: lan_input_jump

    - name: Add LAN-Input jump
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=jump jump-target=LAN-Input in-interface-list=LAN comment="Jump to LAN-Input"
      when: lan_input_jump.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # ISP-Input jump
    - name: Check ISP-Input jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=input action=jump jump-target=ISP-Input
      register: isp_input_jump

    - name: Add ISP-Input jump
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=jump jump-target=ISP-Input in-interface-list=WAN comment="Jump to ISP-Input"
      when: isp_input_jump.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # VPN-Input jump (только если есть VPN-OUT list)
    - name: Check VPN-OUT list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="VPN-OUT"
      register: vpn_list

    - name: Check VPN-Input jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=input action=jump jump-target=VPN-Input
      register: vpn_input_jump
      when: vpn_list.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0

    - name: Add VPN-Input jump
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=jump jump-target=VPN-Input in-interface-list=VPN-OUT comment="Jump to VPN-Input"
      when: vpn_list.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 and vpn_input_jump.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # GUEST-Input jump (только если есть GUEST list)
    - name: Check GUEST list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="GUEST"
      register: guest_list

    - name: Check GUEST-Input jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=input action=jump jump-target=GUEST-Input
      register: guest_input_jump
      when: guest_list.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0

    - name: Add GUEST-Input jump
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=jump jump-target=GUEST-Input in-interface-list=GUEST comment="Jump to GUEST-Input"
      when: guest_list.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 and guest_input_jump.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # Input drop all
    - name: Check input drop exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=input action=drop comment~"Drop all"
      register: input_drop

    - name: Add input drop all
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=drop log=yes log-prefix="INPUT-DROP:" comment="Drop all other to router"
      when: input_drop.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # ===== FORWARD JUMPS =====

    # ISP-Forward jump
    - name: Check ISP-Forward jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=forward action=jump jump-target=ISP-Forward
      register: isp_forward_jump

    - name: Add ISP-Forward jump
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=forward action=jump jump-target=ISP-Forward in-interface-list=WAN comment="Jump to ISP-Forward"
      when: isp_forward_jump.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # VPN-Forward jump
    - name: Check VPN-Forward jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=forward action=jump jump-target=VPN-Forward
      register: vpn_forward_jump
      when: vpn_list.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0

    - name: Add VPN-Forward jump
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=forward action=jump jump-target=VPN-Forward in-interface-list=VPN-OUT comment="Jump to VPN-Forward"
      when: vpn_list.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 and vpn_forward_jump.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # LAN-Forward jump
    - name: Check LAN-Forward jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=forward action=jump jump-target=LAN-Forward
      register: lan_forward_jump

    - name: Add LAN-Forward jump
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=forward action=jump jump-target=LAN-Forward in-interface-list=LAN comment="Jump to LAN-Forward"
      when: lan_forward_jump.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # GUEST-Forward jump
    - name: Check GUEST-Forward jump exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=forward action=jump jump-target=GUEST-Forward
      register: guest_forward_jump
      when: guest_list.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0

    - name: Add GUEST-Forward jump
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=forward action=jump jump-target=GUEST-Forward in-interface-list=GUEST comment="Jump to GUEST-Forward"
      when: guest_list.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 and guest_forward_jump.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # Forward drop all
    - name: Check forward drop exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain=forward action=drop comment~"Drop all"
      register: forward_drop

    - name: Add forward drop all
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=forward action=drop comment="Drop all other"
      when: forward_drop.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Show result
      debug:
        msg: "Main jumps configured"