# 99-cleanup.yml
# Удаляет старые правила которые не относятся к новой структуре
# !!! ОПАСНО !!! Запускать только после проверки что новые правила работают!
# Сначала запусти с --check чтобы увидеть что будет удалено
---
- name: Cleanup old firewall rules
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    - name: WARNING
      debug:
        msg: |
          !!! ВНИМАНИЕ !!!
          Этот плейбук удалит старые правила firewall.
          Убедись что:
          1. SAFE-ACCESS правило на месте
          2. Новые chains работают
          3. У тебя есть физический доступ к роутеру
          
          Удаляются правила:
          - Правила с комментарием 'defconf'
          - Правила без комментариев в chain=input/forward

    # Удаляем defconf правила в chain=forward
    - name: Remove defconf forward rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/remove [find chain=forward comment~"defconf"]
      ignore_errors: yes

    # Удаляем defconf правила в chain=input
    - name: Remove defconf input rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/remove [find chain=input comment~"defconf"]
      ignore_errors: yes

    - name: Show remaining rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print
      register: final_rules

    - name: Display rules
      debug:
        msg: "{{ final_rules.stdout_lines }}"