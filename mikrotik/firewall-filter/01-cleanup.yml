# 01-cleanup.yml
# Удаляет ВСЕ старые правила кроме SAFE-ACCESS
# После этого можно добавлять новые правила в правильном порядке
#
# !!! ВНИМАНИЕ !!!
# Этот плейбук удалит все правила firewall кроме SAFE-ACCESS!
# Убедись что SAFE-ACCESS правило на месте перед запуском!
---
- name: Remove old firewall rules
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    # Должен совпадать с safe_ip в 00-safe-access.yml
    safe_ip: "212.20.46.209"

  tasks:
    # Получаем все input accept правила
    - name: Get all input accept rules for check
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print where chain=input action=accept
      register: safe_check

    # Debug
    - name: Debug safe check output
      debug:
        msg: "Input accept rules: '{{ safe_check.stdout[0] }}'"

    # Проверяем есть ли наш IP в выводе
    - name: Set safe exists flag
      set_fact:
        safe_exists: "{{ safe_ip in safe_check.stdout[0] }}"

    # Прерываем если нет SAFE-ACCESS
    - name: Fail if no SAFE-ACCESS
      fail:
        msg: "SAFE-ACCESS rule for {{ safe_ip }} not found! Run 00-safe-access.yml first!"
      when: not safe_exists

    # Получаем ID безопасного правила
    - name: Get safe rule ID
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print where src-address~"{{ safe_ip }}"
      register: safe_rule_info

    - name: Debug safe rule info
      debug:
        msg: "Safe rule: {{ safe_rule_info.stdout[0] }}"

    # Извлекаем номер правила (первое число в строке это индекс)
    - name: Extract safe rule index
      set_fact:
        safe_rule_idx: "{{ safe_rule_info.stdout[0] | regex_search('^\\s*(\\d+)', '\\1') | first | default('-1') }}"

    - name: Debug safe rule index
      debug:
        msg: "Safe rule index: {{ safe_rule_idx }}"

    # Удаляем все правила кроме безопасного
    - name: Remove all rules except safe (by comment regex)
      community.routeros.command:
        commands:
          - /ip/firewall/filter/remove [find where src-address!~"{{ safe_ip }}"]
      ignore_errors: yes
      register: remove_result

    - name: Debug remove result
      debug:
        msg: "Remove result: {{ remove_result.stdout | default('no output') }}"

    # Проверяем что осталось
    - name: Verify remaining rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print
      register: remaining_rules

    - name: Show remaining rules
      debug:
        msg: "Remaining rules:\n{{ remaining_rules.stdout[0] }}"