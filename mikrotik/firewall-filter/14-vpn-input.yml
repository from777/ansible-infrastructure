# 14-vpn-input.yml
# Правила для chain=VPN-Input
# Трафик от VPN клиентов к роутеру
#
# VPN клиентам разрешаем только established/related
# Новые соединения к роутеру блокируем
#
# Автоматически пропускается если нет interface-list VPN-OUT
---
- name: Configure VPN-Input chain
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # ===== ПРОВЕРКА INTERFACE-LIST =====
    # Проверяем есть ли VPN-OUT interface list

    - name: Check VPN-OUT interface list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="VPN-OUT"
      register: vpn_list_check

    # Сохраняем результат в переменную
    - name: Set VPN-OUT list exists flag
      set_fact:
        has_vpn: "{{ vpn_list_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 }}"

    # Debug - показать результат проверки
    - name: Debug VPN-OUT list check
      debug:
        msg: "VPN-OUT interface list exists: {{ has_vpn }}"

    # Пропускаем если нет VPN-OUT interface list
    - name: Skip if no VPN-OUT interface list
      debug:
        msg: "VPN-OUT interface list not found - skipping VPN-Input rules"
      when: not has_vpn

    # ===== VPN-Input ПРАВИЛА =====
    # Выполняются только если есть VPN-OUT interface list

    # Разрешаем established соединения
    - name: Add VPN-Input accept established
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=VPN-Input action=accept connection-state=established comment="VPN Accept established"
      when: has_vpn

    # Разрешаем related соединения
    - name: Add VPN-Input accept related
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=VPN-Input action=accept connection-state=related comment="VPN Accept related"
      when: has_vpn

    # Разрешаем untracked соединения
    - name: Add VPN-Input accept untracked
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=VPN-Input action=accept connection-state=untracked comment="VPN Accept untracked"
      when: has_vpn

    # Блокируем invalid соединения
    - name: Add VPN-Input drop invalid
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=VPN-Input action=drop connection-state=invalid comment="VPN Drop invalid"
      when: has_vpn

    # Всё остальное блокируем
    - name: Add VPN-Input drop all
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=VPN-Input action=drop comment="VPN Drop all other"
      when: has_vpn

    # Итоговое сообщение
    - name: Show result
      debug:
        msg: "VPN-Input chain - {{ 'added' if has_vpn else 'skipped (no VPN-OUT list)' }}"
