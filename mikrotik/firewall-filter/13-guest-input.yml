# 13-guest-input.yml
# Правила для chain=GUEST-Input
# Трафик от гостевой сети к роутеру
#
# Гостям разрешаем только:
# - DNS (чтобы работал интернет)
# - DHCP (чтобы получили IP)
# Всё остальное блокируем (не должны иметь доступ к настройкам роутера)
#
# Автоматически пропускается если нет interface-list GUEST
---
- name: Configure GUEST-Input chain
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # ===== ПРОВЕРКА INTERFACE-LIST =====
    - name: Check GUEST interface list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="GUEST"
      register: guest_list_check

    - name: Set GUEST list exists flag
      set_fact:
        has_guest: "{{ guest_list_check.stdout[0] | int > 0 }}"

    - name: Debug GUEST list check
      debug:
        msg: "GUEST interface list exists: {{ has_guest }}"

    - name: Skip if no GUEST interface list
      debug:
        msg: "GUEST interface list not found - skipping GUEST-Input rules"
      when: not has_guest

    # ===== GUEST-Input ПРАВИЛА =====

    # --- established ---
    - name: Check GUEST-Input established exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="GUEST Accept established"
      register: guest_established_check
      when: has_guest

    - name: Add GUEST-Input accept established
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=established comment="GUEST Accept established"
      when: has_guest and (guest_established_check.stdout[0] | int == 0)

    # --- related ---
    - name: Check GUEST-Input related exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="GUEST Accept related"
      register: guest_related_check
      when: has_guest

    - name: Add GUEST-Input accept related
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=related comment="GUEST Accept related"
      when: has_guest and (guest_related_check.stdout[0] | int == 0)

    # --- untracked ---
    - name: Check GUEST-Input untracked exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="GUEST Accept untracked"
      register: guest_untracked_check
      when: has_guest

    - name: Add GUEST-Input accept untracked
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=untracked comment="GUEST Accept untracked"
      when: has_guest and (guest_untracked_check.stdout[0] | int == 0)

    # --- invalid ---
    - name: Check GUEST-Input invalid exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="GUEST Drop invalid"
      register: guest_invalid_check
      when: has_guest

    - name: Add GUEST-Input drop invalid
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=drop connection-state=invalid comment="GUEST Drop invalid"
      when: has_guest and (guest_invalid_check.stdout[0] | int == 0)

    # --- DNS ---
    - name: Check GUEST-Input DNS exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="GUEST Allow DNS"
      register: guest_dns_check
      when: has_guest

    - name: Add GUEST-Input allow DNS
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept protocol=udp dst-port=53 comment="GUEST Allow DNS"
      when: has_guest and (guest_dns_check.stdout[0] | int == 0)

    # --- DHCP ---
    - name: Check GUEST-Input DHCP exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="GUEST Allow DHCP"
      register: guest_dhcp_check
      when: has_guest

    - name: Add GUEST-Input allow DHCP
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept protocol=udp dst-port=67 comment="GUEST Allow DHCP"
      when: has_guest and (guest_dhcp_check.stdout[0] | int == 0)

    # --- drop all ---
    - name: Check GUEST-Input drop all exists
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where comment="GUEST Drop all other"
      register: guest_drop_check
      when: has_guest

    - name: Add GUEST-Input drop all
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=drop comment="GUEST Drop all other"
      when: has_guest and (guest_drop_check.stdout[0] | int == 0)

    - name: Show result
      debug:
        msg: "GUEST-Input chain - {{ 'configured' if has_guest else 'skipped (no GUEST list)' }}"
