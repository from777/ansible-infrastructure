# 13-guest-input.yml
# Правила для chain=GUEST-Input
# Трафик от гостевой сети к роутеру
#
# Гостям разрешаем только:
# - DNS (чтобы работал интернет)
# - DHCP (чтобы получили IP)
# Всё остальное блокируем (не должны иметь доступ к настройкам роутера)
#
# Автоматически пропускается если нет interface-list GUEST
---
- name: Configure GUEST-Input chain
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # ===== ПРОВЕРКА INTERFACE-LIST =====
    # Проверяем есть ли GUEST interface list

    - name: Check GUEST interface list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="GUEST"
      register: guest_list_check

    # Сохраняем результат в переменную
    - name: Set GUEST list exists flag
      set_fact:
        has_guest: "{{ guest_list_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 }}"

    # Debug - показать результат проверки
    - name: Debug GUEST list check
      debug:
        msg: "GUEST interface list exists: {{ has_guest }}"

    # Пропускаем если нет GUEST interface list
    - name: Skip if no GUEST interface list
      debug:
        msg: "GUEST interface list not found - skipping GUEST-Input rules"
      when: not has_guest

    # ===== GUEST-Input ПРАВИЛА =====
    # Выполняются только если есть GUEST interface list

    # Разрешаем established соединения
    - name: Add GUEST-Input accept established
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=established comment="GUEST Accept established"
      when: has_guest

    # Разрешаем related соединения
    - name: Add GUEST-Input accept related
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=related comment="GUEST Accept related"
      when: has_guest

    # Разрешаем untracked соединения
    - name: Add GUEST-Input accept untracked
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept connection-state=untracked comment="GUEST Accept untracked"
      when: has_guest

    # Блокируем invalid соединения
    - name: Add GUEST-Input drop invalid
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=drop connection-state=invalid comment="GUEST Drop invalid"
      when: has_guest

    # Разрешаем DNS (UDP 53) - чтобы работал интернет
    - name: Add GUEST-Input allow DNS
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept protocol=udp dst-port=53 comment="GUEST Allow DNS"
      when: has_guest

    # Разрешаем DHCP (UDP 67) - чтобы получили IP
    - name: Add GUEST-Input allow DHCP
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=accept protocol=udp dst-port=67 comment="GUEST Allow DHCP"
      when: has_guest

    # Всё остальное блокируем
    - name: Add GUEST-Input drop all
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=GUEST-Input action=drop comment="GUEST Drop all other"
      when: has_guest

    # Итоговое сообщение
    - name: Show result
      debug:
        msg: "GUEST-Input chain - {{ 'added' if has_guest else 'skipped (no GUEST list)' }}"
