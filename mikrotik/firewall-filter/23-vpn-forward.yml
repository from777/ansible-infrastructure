# 23-vpn-forward.yml
# Правила для трафика из VPN наружу
# Разрешаем выход в WAN
---
- name: Configure VPN-Forward rules
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # Проверяем есть ли interface-list VPN-OUT
    - name: Check if VPN-OUT interface list exists
      community.routeros.command:
        commands:
          - /interface/list/print count-only where name="VPN-OUT"
      register: vpn_list_count

    - name: Set VPN list exists flag
      set_fact:
        vpn_list_exists: "{{ vpn_list_count.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 }}"

    - name: Skip if no VPN-OUT interface list
      debug:
        msg: "VPN-OUT interface list not found - skipping VPN-Forward rules"
      when: not vpn_list_exists

    # Проверяем есть ли уже правила VPN-Forward
    - name: Check if VPN-Forward rules exist
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print count-only where chain="VPN-Forward" action=accept
      register: vpn_forward_count
      when: vpn_list_exists

    - name: Set rules exist flag
      set_fact:
        vpn_forward_exists: "{{ vpn_forward_count.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 3 }}"
      when: vpn_list_exists

    # Добавляем правила VPN-Forward
    - name: Add VPN-Forward rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=VPN-Forward action=accept connection-state=established comment="VPN-FWD: Accept established"
          - /ip/firewall/filter/add chain=VPN-Forward action=accept connection-state=related comment="VPN-FWD: Accept related"
          - /ip/firewall/filter/add chain=VPN-Forward action=accept connection-state=untracked comment="VPN-FWD: Accept untracked"
          - /ip/firewall/filter/add chain=VPN-Forward action=drop connection-state=invalid comment="VPN-FWD: Drop invalid"
          - /ip/firewall/filter/add chain=VPN-Forward action=accept connection-state=new out-interface-list=WAN comment="VPN-FWD: Allow new to WAN"
          - /ip/firewall/filter/add chain=VPN-Forward action=drop disabled=yes comment="VPN-FWD: Drop new (disabled)"
      when: vpn_list_exists and not vpn_forward_exists | default(false)

    - name: Show result
      debug:
        msg: "VPN-Forward rules - {{ 'skipped (no VPN-OUT list)' if not vpn_list_exists else ('already configured' if vpn_forward_exists | default(false) else 'added') }}"