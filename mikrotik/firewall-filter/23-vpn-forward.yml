# 23-vpn-forward.yml
# Правила для chain=VPN-Forward
# Трафик из VPN наружу
#
# VPN клиентам разрешаем выход в интернет
#
# Автоматически пропускается если нет interface-list VPN-OUT
---
- name: Configure VPN-Forward chain
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # ===== ПРОВЕРКА INTERFACE-LIST =====
    - name: Check VPN-OUT interface list exists
      community.routeros.command:
        commands:
          - /interface list print count-only where name=VPN-OUT
      register: vpn_list_check

    - name: Set VPN-OUT list exists flag
      set_fact:
        has_vpn: "{{ vpn_list_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 }}"

    - name: Debug VPN-OUT list check
      debug:
        msg: "VPN-OUT interface list exists: {{ has_vpn }}"

    - name: Skip if no VPN-OUT interface list
      debug:
        msg: "VPN-OUT interface list not found - skipping VPN-Forward rules"
      when: not has_vpn

    # ===== VPN-Forward ПРАВИЛА =====

    # --- established ---
    - name: Check VPN-Forward established exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN-FWD Accept established"
      register: vpn_established_check
      when: has_vpn

    - name: Add VPN-Forward accept established
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Forward action=accept connection-state=established comment="VPN-FWD Accept established"
      when: has_vpn and (vpn_established_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    # --- related ---
    - name: Check VPN-Forward related exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN-FWD Accept related"
      register: vpn_related_check
      when: has_vpn

    - name: Add VPN-Forward accept related
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Forward action=accept connection-state=related comment="VPN-FWD Accept related"
      when: has_vpn and (vpn_related_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    # --- untracked ---
    - name: Check VPN-Forward untracked exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN-FWD Accept untracked"
      register: vpn_untracked_check
      when: has_vpn

    - name: Add VPN-Forward accept untracked
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Forward action=accept connection-state=untracked comment="VPN-FWD Accept untracked"
      when: has_vpn and (vpn_untracked_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    # --- invalid ---
    - name: Check VPN-Forward invalid exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN-FWD Drop invalid"
      register: vpn_invalid_check
      when: has_vpn

    - name: Add VPN-Forward drop invalid
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Forward action=drop connection-state=invalid comment="VPN-FWD Drop invalid"
      when: has_vpn and (vpn_invalid_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    # --- allow new to WAN ---
    - name: Check VPN-Forward allow WAN exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN-FWD Allow new to WAN"
      register: vpn_wan_check
      when: has_vpn

    - name: Add VPN-Forward allow new to WAN
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Forward action=accept connection-state=new out-interface-list=WAN comment="VPN-FWD Allow new to WAN"
      when: has_vpn and (vpn_wan_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    # --- drop new disabled ---
    - name: Check VPN-Forward drop disabled exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN-FWD Drop new (disabled)"
      register: vpn_drop_disabled_check
      when: has_vpn

    - name: Add VPN-Forward drop new disabled
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Forward action=drop disabled=yes comment="VPN-FWD Drop new (disabled)"
      when: has_vpn and (vpn_drop_disabled_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    - name: Show result
      debug:
        msg: "VPN-Forward chain - {{ 'configured' if has_vpn else 'skipped (no VPN-OUT list)' }}"
