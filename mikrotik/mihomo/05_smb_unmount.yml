# 05_smb_unmount.yml
# Размонтирует SMB шару
---
- name: "05: SMB Unmount"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
  vars_files:
    - vars.yml

  tasks:
    - name: Проверить монтирование
      ansible.builtin.shell: mount | grep "{{ smb_mount_point }}" || true
      delegate_to: localhost
      register: is_mounted
      changed_when: false

    - name: Размонтировать SMB
      ansible.builtin.shell: umount "{{ smb_mount_point }}"
      delegate_to: localhost
      become: yes
      when: is_mounted.stdout != ""

    - name: Результат
      ansible.builtin.debug:
        msg: "SMB размонтирован: {{ smb_mount_point }}"
