# vars_zapret2.yml - Переменные для zapret2 контейнера (DPI bypass)
---
# ============================================================
# ПЕРЕМЕННЫЕ КОНТЕЙНЕРА ZAPRET2
# ============================================================

container_name: "Zapret2"
container_image: "wiktorbgu/nfqws2-mikrotik:latest"

# Сеть
container_gateway: "192.168.254.1"
container_network: "192.168.254"
docker_bridge: "Bridge-Docker"

# Routing table для перенаправления трафика
routing_table_name: "to_zapret2"

# ============================================================
# СТРАТЕГИЯ DPI BYPASS
# ============================================================
# Найдена через blockcheck2.sh для конкретного провайдера
# Если перестанет работать - запустить blockcheck2.sh заново
#
# Метод: Фейк-пакеты с TTL + разбиение на позиции midsld
# ip_ttl=3 : TTL=3 чтобы фейк не дошёл до сервера, но прошёл DPI
# fakedsplit:pos=midsld : разбиение в середине SNI домена
#
nfqws2_strategy_https: "--payload=tls_client_hello --lua-desync=fake:blob=fake_default_tls:ip_ttl=3:repeats=1 --lua-desync=fakedsplit:pos=midsld:ip_ttl=3"
nfqws2_strategy_quic: "--payload=quic_initial --lua-desync=fake:blob=fake_default_quic:repeats=10"

# Комбинированная стратегия для config
nfqws2_strategy: "--filter-tcp=443 {{ nfqws2_strategy_https }}"

# USB
usb_partition: "usb1-part1"
smb_mount_point: "/mnt/mikrotik_smb"

# Пакет container (зависит от архитектуры роутера)
# hAP ax3 = arm64, hEX/hAP ac2 = arm, x86 = x86
container_pkg_url: "https://download.mikrotik.com/routeros/7.20.6/container-7.20.6-arm64.npk"
