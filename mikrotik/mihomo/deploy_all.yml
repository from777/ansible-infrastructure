---
- name: "Deploy All"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_connection: ansible.netcommon.network_cli
  vars_files:
    - vars.yml
  
  tasks:
    # === 01: NETWORK ===
    
    - name: "01: Проверить veth"
      community.routeros.command:
        commands:
          - /interface veth print count-only where name={{ container_name }}
      register: veth_exists

    - name: "01: Создать veth"
      community.routeros.command:
        commands:
          - /interface veth add name={{ container_name }} address={{ container_ip }}/24 gateway={{ container_gateway }}
      when: veth_exists.stdout[0] | int == 0

    - name: "01: Проверить bridge port"
      community.routeros.command:
        commands:
          - /interface bridge port print count-only where interface={{ container_name }}
      register: port_exists

    - name: "01: Добавить в bridge"
      community.routeros.command:
        commands:
          - /interface bridge port add bridge={{ docker_bridge }} interface={{ container_name }}
      when: port_exists.stdout[0] | int == 0

    # === 02: SMB MOUNT ===

    - name: "02: Включить SMB"
      community.routeros.command:
        commands:
          - /ip smb set enabled=yes interfaces={{ smb_interface }}

    - name: "02: Проверить SMB шару"
      community.routeros.command:
        commands:
          - /ip smb shares print count-only where name={{ usb_path }}
      register: share_exists

    - name: "02: Создать SMB шару"
      community.routeros.command:
        commands:
          - /ip smb shares add name={{ usb_path }} directory={{ usb_path }}
      when: share_exists.stdout[0] | int == 0

    - name: "02: Создать точку монтирования"
      ansible.builtin.file:
        path: "{{ smb_mount_point }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: yes

    - name: "02: Смонтировать SMB"
      ansible.posix.mount:
        path: "{{ smb_mount_point }}"
        src: "//{{ ansible_host }}/{{ usb_path }}"
        fstype: cifs
        opts: "username={{ ansible_user }},password={{ ansible_password }},vers=2.0"
        state: mounted
      delegate_to: localhost
      become: yes

    # === 03: CONFIGS ===

    - name: "03: Создать папки"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ smb_mount_point }}/docker/{{ container_name }}"
        - "{{ smb_mount_point }}/docker_configs/{{ container_name }}"
        - "{{ smb_mount_point }}/docker_configs/{{ container_name }}/template"
        - "{{ smb_mount_point }}/docker_configs/{{ container_name }}/awg"
        - "{{ smb_mount_point }}/docker_configs/{{ container_name }}/srv"
      delegate_to: localhost
      become: yes

    - name: "03: Копировать конфиг mihomo"
      ansible.builtin.copy:
        src: configs/template/custom_config.yaml
        dest: "{{ smb_mount_point }}/docker_configs/{{ container_name }}/template/custom_config.yaml"
      delegate_to: localhost
      become: yes

    - name: "03: Копировать AWG"
      ansible.builtin.copy:
        src: configs/awg/warp.conf
        dest: "{{ smb_mount_point }}/docker_configs/{{ container_name }}/awg/warp.conf"
      delegate_to: localhost
      become: yes

    - name: "03: Копировать VLESS"
      ansible.builtin.copy:
        src: configs/srv/proxies.yaml
        dest: "{{ smb_mount_point }}/docker_configs/{{ container_name }}/srv/proxies.yaml"
      delegate_to: localhost
      become: yes

    # === 04: CONTAINER ===

    - name: "04: Проверить mount"
      community.routeros.command:
        commands:
          - /container mounts print count-only where name={{ container_name }}_conf
      register: mount_exists

    - name: "04: Создать mount"
      community.routeros.command:
        commands:
          - /container mounts add name={{ container_name }}_conf src={{ usb_path }}/docker_configs/{{ container_name }} dst=/etc/mihomo
      when: mount_exists.stdout[0] | int == 0

    - name: "04: Проверить envlist"
      community.routeros.command:
        commands:
          - /container envs print count-only where list={{ container_name }}_env
      register: env_exists

    - name: "04: Создать envlist"
      community.routeros.command:
        commands:
          - /container envs add list={{ container_name }}_env key=CONFIG value=custom_config.yaml
      when: env_exists.stdout[0] | int == 0

    - name: "04: Проверить контейнер"
      community.routeros.command:
        commands:
          - /container print count-only where name="{{ container_name }}"
      register: container_exists

    - name: "04: Создать контейнер"
      community.routeros.command:
        commands:
          - /container add remote-image={{ container_image }} interface={{ container_name }} root-dir={{ usb_path }}/docker/{{ container_name }} mounts={{ container_name }}_conf envlists={{ container_name }}_env dns={{ container_dns }} logging=yes name="{{ container_name }}" start-on-boot=yes
      when: container_exists.stdout[0] | int == 0

    - name: "04: Ожидание загрузки"
      ansible.builtin.pause:
        seconds: 30
      when: container_exists.stdout[0] | int == 0

    - name: "04: Запустить"
      community.routeros.command:
        commands:
          - /container start [find name="{{ container_name }}"]

    # === 05: SMB UNMOUNT ===

    - name: "05: Отмонтировать SMB"
      ansible.posix.mount:
        path: "{{ smb_mount_point }}"
        state: unmounted
      delegate_to: localhost
      become: yes

    - name: "05: Удалить точку монтирования"
      ansible.builtin.file:
        path: "{{ smb_mount_point }}"
        state: absent
      delegate_to: localhost
      become: yes

    - name: "05: Отключить SMB"
      community.routeros.command:
        commands:
          - /ip smb set enabled=no

    # === РЕЗУЛЬТАТ ===

    - name: Проверить статус
      community.routeros.command:
        commands:
          - /container print where name="{{ container_name }}"
      register: result

    - name: Готово
      ansible.builtin.debug:
        msg: "Контейнер {{ container_name }} создан. Web UI: http://{{ container_ip }}:9090/ui/"
