# 00a_container_package.yml
---
- name: "00a: Install container package"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_command_timeout: 120
  vars_files:
    - vars.yml

  tasks:
    - name: Проверить наличие пакета container
      community.routeros.command:
        commands:
          - /system package print count-only where name=container
      register: pkg_exists

    - name: Статус пакета
      ansible.builtin.debug:
        msg: "Container package: {{ 'установлен' if pkg_exists.stdout[0] | int > 0 else 'отсутствует' }}"

    - name: Установка пакета
      block:
        - name: Скачать пакет container
          community.routeros.command:
            commands:
              - /tool fetch url={{ container_pkg_url }} dst-path=container.npk

        - name: Перезагрузить роутер
          ansible.netcommon.cli_command:
            command: /system reboot
            prompt:
              - "Reboot, yes"
            answer:
              - "y"
          ignore_errors: yes

        - name: Ждать выключения
          ansible.builtin.wait_for:
            host: "{{ ansible_host }}"
            port: 22
            state: stopped
            timeout: 60
          delegate_to: localhost

        - name: Ждать загрузки
          ansible.builtin.wait_for:
            host: "{{ ansible_host }}"
            port: 22
            state: started
            timeout: 180
          delegate_to: localhost

        - name: Пауза для инициализации
          ansible.builtin.pause:
            seconds: 15
      when: pkg_exists.stdout[0] | int == 0

    - name: Проверить установку пакета
      community.routeros.command:
        commands:
          - /system package print count-only where name=container
      register: pkg_final

    - name: Результат
      ansible.builtin.debug:
        msg: "{{ 'OK: Пакет container установлен' if pkg_final.stdout[0] | int > 0 else 'FAILED: Пакет не установлен' }}"

    - name: Fail если пакет не установлен
      ansible.builtin.fail:
        msg: "Пакет container не установился"
      when: pkg_final.stdout[0] | int == 0