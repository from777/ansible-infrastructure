# 02_smb_mount.yml
---
- name: "02: SMB Mount"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    smb_share_name: "usb1"
    smb_share_dir: "usb1/smb_share"
  vars_files:
    - vars.yml

  tasks:
    - name: Включить SMB
      community.routeros.command:
        commands:
          - /ip smb set enabled=yes interfaces={{ smb_interface }}

    - name: Включить guest без read-only
      community.routeros.command:
        commands:
          - /ip smb users set [find name="guest"] disabled=no read-only=no

    - name: Проверить директорию для шары
      community.routeros.command:
        commands:
          - /file print count-only where name="{{ smb_share_dir }}"
      register: share_dir_exists

    - name: Создать директорию для шары
      community.routeros.command:
        commands:
          - /file add name={{ smb_share_dir }} type=directory
      when: share_dir_exists.stdout[0] | int == 0

    - name: Проверить SMB шару
      community.routeros.command:
        commands:
          - /ip smb shares print count-only where name={{ smb_share_name }}
      register: share_exists

    - name: Создать SMB шару
      community.routeros.command:
        commands:
          - /ip smb shares add name={{ smb_share_name }} directory={{ smb_share_dir }}
      when: share_exists.stdout[0] | int == 0

    - name: Настроить SMB шару без valid-users (гостевой доступ)
      community.routeros.command:
        commands:
          - /ip smb shares set [find name={{ smb_share_name }}] directory={{ smb_share_dir }} valid-users=""

    - name: Создать точку монтирования
      ansible.builtin.file:
        path: "{{ smb_mount_point }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: yes

    - name: Размонтировать если смонтировано
      ansible.builtin.shell: umount "{{ smb_mount_point }}" || true
      delegate_to: localhost
      become: yes
      changed_when: false

    - name: Смонтировать SMB (гостевой доступ)
      ansible.builtin.shell: |
        mount -t cifs "//{{ ansible_host }}/{{ smb_share_name }}" "{{ smb_mount_point }}" -o guest,sec=none
      delegate_to: localhost
      become: yes

    - name: Проверить монтирование
      ansible.builtin.shell: ls -la "{{ smb_mount_point }}/docker_configs/"
      delegate_to: localhost
      register: mount_check

    - name: Результат
      ansible.builtin.debug:
        msg: "SMB смонтирован: //{{ ansible_host }}/{{ smb_share_name }} → {{ smb_mount_point }}"