# 03_configs.yml
---
- name: "03: Configs"
  hosts: mikrotik
  gather_facts: no
  vars:
    smb_path: "{{ smb_mount_point }}/docker_configs/{{ container_name }}"
    repo_path: "{{ playbook_dir }}/configs"
  vars_files:
    - vars.yml

  tasks:
    - name: Проверить что SMB смонтирован
      ansible.builtin.stat:
        path: "{{ smb_mount_point }}"
      delegate_to: localhost
      register: mount_stat

    - name: Fail если SMB не смонтирован
      ansible.builtin.fail:
        msg: "SMB не смонтирован! Сначала запусти 02_smb_mount.yml"
      when: not mount_stat.stat.exists

    - name: Создать структуру папок
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ smb_path }}"
        - "{{ smb_path }}/awg"
        - "{{ smb_path }}/srv"
        - "{{ smb_path }}/template"

    - name: Найти все AWG конфиги
      delegate_to: localhost
      ansible.builtin.find:
        paths: "{{ repo_path }}/awg"
        patterns: "*.conf"
      register: awg_files

    - name: Копировать AWG конфиги
      delegate_to: localhost
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ smb_path }}/awg/"
        mode: '0644'
      loop: "{{ awg_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Удалить старый custom_config.yaml
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ smb_path }}/template/custom_config.yaml"
        state: absent

    - name: Копировать custom_config.yaml в template/
      delegate_to: localhost
      ansible.builtin.copy:
        src: "{{ repo_path }}/template/custom_config.yaml"
        dest: "{{ smb_path }}/template/custom_config.yaml"
        mode: '0644'

    - name: Найти SRV конфиги
      delegate_to: localhost
      ansible.builtin.find:
        paths: "{{ repo_path }}/srv"
        patterns: "*.yaml"
      register: srv_files

    - name: Копировать SRV конфиги
      delegate_to: localhost
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ smb_path }}/srv/"
        mode: '0644'
      loop: "{{ srv_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"

    - name: Результат
      ansible.builtin.debug:
        msg: "AWG: {{ awg_files.files | length }}, SRV: {{ srv_files.files | length }}"