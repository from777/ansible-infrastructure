# 03_configs.yml
---
- name: "03: Copy configs to container"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    smb_path: "{{ smb_mount_point }}/docker_configs/{{ container_name }}"
    repo_path: "{{ playbook_dir }}/configs"
  vars_files:
    - vars.yml

  tasks:
    # ===== ПРОВЕРКА SMB =====
    - name: "03: Проверить что SMB смонтирован"
      ansible.builtin.stat:
        path: "{{ smb_mount_point }}"
      register: smb_mounted
      delegate_to: localhost

    - name: "03: Fail если SMB не смонтирован"
      ansible.builtin.fail:
        msg: "SMB не смонтирован! Сначала запусти 02_smb_mount.yml"
      when: not smb_mounted.stat.exists

    # ===== СТРУКТУРА ПАПОК =====
    - name: "03: Создать структуру папок"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ smb_path }}"
        - "{{ smb_path }}/awg"
        - "{{ smb_path }}/srv"
        - "{{ smb_path }}/template"
        - "{{ smb_path }}/ui"
      delegate_to: localhost

    # ===== AWG КОНФИГИ =====
    - name: "03: Найти AWG конфиги"
      ansible.builtin.find:
        paths: "{{ repo_path }}/awg"
        patterns: "*.conf"
      register: awg_files
      delegate_to: localhost

    - name: "03: Копировать AWG конфиги"
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ smb_path }}/awg/"
        mode: '0644'
      loop: "{{ awg_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      delegate_to: localhost
      when: awg_files.files | length > 0

    # ===== SRV КОНФИГИ =====
    - name: "03: Найти SRV конфиги"
      ansible.builtin.find:
        paths: "{{ repo_path }}/srv"
        patterns: "*.yaml"
      register: srv_files
      delegate_to: localhost

    - name: "03: Копировать SRV конфиги"
      ansible.builtin.copy:
        src: "{{ item.path }}"
        dest: "{{ smb_path }}/srv/"
        mode: '0644'
      loop: "{{ srv_files.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      delegate_to: localhost
      when: srv_files.files | length > 0

    # ===== CUSTOM CONFIG =====
    - name: "03: Копировать custom_config.yaml в корень"
      ansible.builtin.copy:
        src: "{{ repo_path }}/template/custom_config.yaml"
        dest: "{{ smb_path }}/custom_config.yaml"
        mode: '0644'
      delegate_to: localhost

    - name: "03: Копировать custom_config.yaml в template"
      ansible.builtin.copy:
        src: "{{ repo_path }}/template/custom_config.yaml"
        dest: "{{ smb_path }}/template/custom_config.yaml"
        mode: '0644'
      delegate_to: localhost

    # ===== UI =====
    - name: "03: Проверить UI"
      ansible.builtin.stat:
        path: "{{ smb_path }}/ui/index.html"
      register: ui_exists
      delegate_to: localhost

    - name: "03: Установить unzip"
      ansible.builtin.apt:
        name: unzip
        state: present
        update_cache: yes
      delegate_to: localhost
      become: yes
      when: not ui_exists.stat.exists

    - name: "03: Скачать UI архив"
      ansible.builtin.get_url:
        url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
        dest: "/tmp/ui.zip"
        timeout: 120
      delegate_to: localhost
      when: not ui_exists.stat.exists

    - name: "03: Распаковать UI"
      ansible.builtin.unarchive:
        src: "/tmp/ui.zip"
        dest: "/tmp/"
        remote_src: yes
      delegate_to: localhost
      when: not ui_exists.stat.exists

    - name: "03: Копировать UI"
      ansible.builtin.shell: |
        cp -r /tmp/metacubexd-gh-pages/* "{{ smb_path }}/ui/"
      delegate_to: localhost
      when: not ui_exists.stat.exists

    - name: "03: Удалить временные файлы"
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/ui.zip
        - /tmp/metacubexd-gh-pages
      delegate_to: localhost
      when: not ui_exists.stat.exists

    # ===== РЕЗУЛЬТАТ =====
    - name: "03: Проверить файлы"
      ansible.builtin.find:
        paths: "{{ smb_path }}"
        recurse: yes
        file_type: file
      register: all_files
      delegate_to: localhost

    - name: "03: Результат"
      ansible.builtin.debug:
        msg: |
          Скопировано файлов: {{ all_files.files | length }}
          AWG: {{ awg_files.files | length }} конфигов
          SRV: {{ srv_files.files | length }} конфигов
          UI: {{ 'OK' if ui_exists.stat.exists else 'скачан' }}