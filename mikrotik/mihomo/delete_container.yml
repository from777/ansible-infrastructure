# delete_container.yml
# Полное удаление контейнера со всеми зависимостями
#
# Использование:
#   ansible-playbook delete_container.yml -e container_name="vless"
#
# Порядок удаления (критически важен!):
# 1. Остановить контейнер
# 2. Удалить контейнер
# 3. Удалить порт из bridge
# 4. Удалить veth интерфейс
# 5. Удалить mount, envlist, папки
---
- name: "Delete container completely"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_command_timeout: 120
    smb_base: "{{ usb_partition }}/smb_share"
  vars_files:
    - vars.yml

  tasks:
    # ===== ВАЛИДАЦИЯ =====
    - name: Проверить что container_name задан
      ansible.builtin.fail:
        msg: "container_name не задан! Использование: ansible-playbook delete_container.yml -e container_name=имя"
      when: container_name is not defined or container_name | length == 0

    - name: Показать что удаляем
      ansible.builtin.debug:
        msg: "Удаляем контейнер: {{ container_name }}"

    # ===== ШАГ 1: ОСТАНОВИТЬ КОНТЕЙНЕР =====
    - name: "1. Остановить контейнер"
      community.routeros.command:
        commands:
          - "/container stop [find name={{ container_name }}]"
      ignore_errors: yes

    - name: "Пауза 10 сек"
      ansible.builtin.pause:
        seconds: 10

    # ===== ШАГ 2: УДАЛИТЬ КОНТЕЙНЕР =====
    - name: "2. Удалить контейнер"
      community.routeros.command:
        commands:
          - "/container remove [find name={{ container_name }}]"
      ignore_errors: yes

    - name: "Пауза 5 сек"
      ansible.builtin.pause:
        seconds: 5

    # ===== ШАГ 3: УДАЛИТЬ ПОРТ ИЗ BRIDGE =====
    - name: "3. Удалить порт из bridge"
      community.routeros.command:
        commands:
          - "/interface bridge port remove [find interface={{ container_name }}]"
      ignore_errors: yes

    # ===== ШАГ 4: УДАЛИТЬ VETH =====
    - name: "4. Удалить veth"
      community.routeros.command:
        commands:
          - "/interface veth remove [find name={{ container_name }}]"
      ignore_errors: yes

    # ===== ШАГ 5: УДАЛИТЬ MOUNT =====
    - name: "5. Удалить mount"
      community.routeros.command:
        commands:
          - "/container mounts remove [find name={{ container_name }}_conf]"
      ignore_errors: yes

    # ===== ШАГ 6: УДАЛИТЬ ENVLIST =====
    - name: "6. Удалить envlist"
      community.routeros.command:
        commands:
          - "/container envs remove [find list={{ container_name }}_env]"
      ignore_errors: yes

    # ===== ШАГ 7: УДАЛИТЬ ПАПКИ НА SMB =====
    - name: "7.1 Удалить папку конфигов"
      ansible.builtin.file:
        path: "{{ smb_mount_point }}/docker_configs/{{ container_name }}"
        state: absent
      delegate_to: localhost
      ignore_errors: yes

    - name: "7.2 Удалить папку root-dir"
      ansible.builtin.file:
        path: "{{ smb_mount_point }}/docker/{{ container_name }}"
        state: absent
      delegate_to: localhost
      ignore_errors: yes

    # ===== ШАГ 8: ОЧИСТКА UNKNOWN ПОРТОВ =====
    - name: "8. Очистить unknown порты"
      community.routeros.command:
        commands:
          - "/interface bridge port remove [find interface~unknown and bridge={{ docker_bridge }}]"
      ignore_errors: yes

    - name: "Готово"
      ansible.builtin.debug:
        msg: "Контейнер {{ container_name }} удалён"
