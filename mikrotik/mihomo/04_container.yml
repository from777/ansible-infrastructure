# 04_container.yml
---
- name: "04: Container"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_command_timeout: 120
    smb_base: "{{ usb_partition }}/smb_share"
    container_network: "192.168.254"
  vars_files:
    - vars.yml

  tasks:
    # ===== ПРОВЕРКИ =====
    - name: Проверить что USB примонтирован
      community.routeros.command:
        commands:
          - /file print where name={{ usb_partition }} and type=disk
      register: disk_check

    - name: Fail если флешка не примонтирована
      ansible.builtin.fail:
        msg: "{{ usb_partition }} не найден!"
      when: "usb_partition not in disk_check.stdout[0]"

    - name: Проверить container registry
      community.routeros.command:
        commands:
          - /container config print
      register: container_config

    - name: Fail если registry не настроен
      ansible.builtin.fail:
        msg: "Container registry не настроен! Сначала запусти 00b_container_mode.yml"
      when: "'registry-1.docker.io' not in container_config.stdout[0]"

    # ===== УДАЛИТЬ СТАРЫЙ КОНТЕЙНЕР =====
    - name: Проверить существующий контейнер
      community.routeros.command:
        commands:
          - /container print count-only where name="{{ container_name }}"
      register: old_container

    - name: Остановить старый контейнер
      community.routeros.command:
        commands:
          - /container stop [find name="{{ container_name }}"]
      when: old_container.stdout[0] | int > 0
      ignore_errors: yes

    - name: Пауза для остановки
      ansible.builtin.pause:
        seconds: 5
      when: old_container.stdout[0] | int > 0

    - name: Удалить старый контейнер
      community.routeros.command:
        commands:
          - /container remove [find name="{{ container_name }}"]
      when: old_container.stdout[0] | int > 0
      ignore_errors: yes

    - name: Пауза после удаления
      ansible.builtin.pause:
        seconds: 3
      when: old_container.stdout[0] | int > 0

    # ===== АВТООПРЕДЕЛЕНИЕ IP =====
    - name: Получить все veth адреса
      community.routeros.command:
        commands:
          - /interface veth print where address~"{{ container_network }}"
      register: veth_list

    - name: Определить следующий IP
      ansible.builtin.set_fact:
        auto_container_ip: >-
          {%- set ips = [] -%}
          {%- for line in veth_list.stdout[0].split('\n') -%}
            {%- if container_network in line -%}
              {%- set match = line | regex_search('address=([0-9.]+)/', '\\1') -%}
              {%- if match -%}
                {%- set _ = ips.append(match[0].split('.')[-1] | int) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ container_network }}.{{ (ips | max | default(1)) + 1 }}

    - name: Показать выбранный IP
      ansible.builtin.debug:
        msg: "Контейнер {{ container_name }} получит IP: {{ container_ip | default(auto_container_ip) }}"

    # ===== VETH INTERFACE =====
    - name: Проверить veth
      community.routeros.command:
        commands:
          - /interface veth print count-only where name={{ container_name }}
      register: veth_exists

    - name: Создать veth
      community.routeros.command:
        commands:
          - /interface veth add name={{ container_name }} address={{ container_ip | default(auto_container_ip) }}/24 gateway={{ container_gateway }}
      when: veth_exists.stdout[0] | int == 0

    - name: Проверить veth в bridge
      community.routeros.command:
        commands:
          - /interface bridge port print count-only where interface={{ container_name }}
      register: veth_in_bridge

    - name: Добавить veth в bridge
      community.routeros.command:
        commands:
          - /interface bridge port add bridge={{ docker_bridge }} interface={{ container_name }}
      when: veth_in_bridge.stdout[0] | int == 0

    # ===== MOUNT =====
    - name: Проверить mount
      community.routeros.command:
        commands:
          - /container mounts print count-only where name={{ container_name }}_conf
      register: mount_exists

    - name: Создать mount
      community.routeros.command:
        commands:
          - /container mounts add name={{ container_name }}_conf src={{ smb_base }}/docker_configs/{{ container_name }} dst=/etc/mihomo
      when: mount_exists.stdout[0] | int == 0

    # ===== ENVLIST =====
    - name: Проверить envlist
      community.routeros.command:
        commands:
          - /container envs print count-only where list={{ container_name }}_env
      register: env_exists

    - name: Создать envlist с CONFIG
      community.routeros.command:
        commands:
          - /container envs add list={{ container_name }}_env key=CONFIG value={{ container_config }}
      when:
        - env_exists.stdout[0] | int == 0
        - container_config is defined
        - container_config | length > 0

    - name: Создать envlist без CONFIG
      community.routeros.command:
        commands:
          - /container envs add list={{ container_name }}_env key=TZ value=Europe/Moscow
      when:
        - env_exists.stdout[0] | int == 0
        - container_config is not defined or container_config | length == 0

    # ===== CONTAINER =====
    - name: Создать контейнер
      community.routeros.command:
        commands:
          - /container add remote-image={{ container_image }} interface={{ container_name }} root-dir={{ smb_base }}/docker/{{ container_name }} mounts={{ container_name }}_conf envlist={{ container_name }}_env dns={{ container_dns }} logging=yes name="{{ container_name }}" start-on-boot=yes

    - name: Ожидание загрузки образа
      ansible.builtin.pause:
        seconds: 60
        prompt: "Загрузка образа (60 сек)..."

    # ===== START =====
    - name: Запустить контейнер
      community.routeros.command:
        commands:
          - /container start [find name="{{ container_name }}"]

    - name: Ожидание запуска
      ansible.builtin.pause:
        seconds: 10

    - name: Проверить статус
      community.routeros.command:
        commands:
          - /container print where name="{{ container_name }}"
      register: result

    - name: Результат
      ansible.builtin.debug:
        msg: |
          Контейнер: {{ container_name }}
          IP: {{ container_ip | default(auto_container_ip) }}
          DNS: {{ container_dns }}
          UI: http://{{ container_ip | default(auto_container_ip) }}:9090/ui/
          Status: {{ result.stdout[0] }}