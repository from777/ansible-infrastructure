# 04_container.yml
---
- name: "04: Container"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
  vars_files:
    - vars.yml

  tasks:
    # ===== MOUNT =====
    - name: Проверить mount
      community.routeros.command:
        commands:
          - /container mounts print count-only where name={{ container_name }}_conf
      register: mount_exists

    - name: Создать mount
      community.routeros.command:
        commands:
          - /container mounts add name={{ container_name }}_conf src={{ usb_path }}/docker_configs/{{ container_name }} dst=/etc/mihomo
      when: mount_exists.stdout[0] | int == 0

    # ===== ENVLIST =====
    - name: Проверить envlist
      community.routeros.command:
        commands:
          - /container envs print count-only where list={{ container_name }}_env
      register: env_exists

    # Создаём env только если указан container_config
    - name: Создать envlist с CONFIG
      community.routeros.command:
        commands:
          - /container envs add list={{ container_name }}_env key=CONFIG value={{ container_config }}
      when:
        - env_exists.stdout[0] | int == 0
        - container_config is defined
        - container_config | length > 0

    # Если CONFIG не указан — создаём пустой envlist (образ использует дефолт)
    - name: Создать пустой envlist
      community.routeros.command:
        commands:
          - /container envs add list={{ container_name }}_env key=TZ value=Europe/Moscow
      when:
        - env_exists.stdout[0] | int == 0
        - container_config is not defined or container_config | length == 0

    # ===== CONTAINER =====
    - name: Проверить контейнер
      community.routeros.command:
        commands:
          - /container print count-only where name="{{ container_name }}"
      register: container_exists

    - name: Создать контейнер
      community.routeros.command:
        commands:
          - /container add remote-image={{ container_image }} interface={{ container_name }} root-dir={{ usb_path }}/docker/{{ container_name }} mounts={{ container_name }}_conf envlist={{ container_name }}_env dns={{ container_dns }} logging=yes name="{{ container_name }}" start-on-boot=yes
      when: container_exists.stdout[0] | int == 0

    - name: Ожидание загрузки образа
      ansible.builtin.pause:
        seconds: 30
        prompt: "Загрузка образа..."
      when: container_exists.stdout[0] | int == 0

    # ===== START =====
    - name: Запустить контейнер
      community.routeros.command:
        commands:
          - /container start [find name="{{ container_name }}"]

    - name: Проверить статус
      community.routeros.command:
        commands:
          - /container print where name="{{ container_name }}"
      register: result

    - name: Результат
      ansible.builtin.debug:
        msg: |
          Контейнер: {{ container_name }}
          DNS: {{ container_dns }}
          CONFIG: {{ container_config | default('default (auto)') }}
          UI: http://{{ container_ip }}:9090/ui/
