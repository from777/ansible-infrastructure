# 01_usb_format_ext4_bridge.yml
---
- name: "01: USB format ext4 (WIPES DATA if not ext4) + Bridge-Docker + NAT"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_command_timeout: 120
    usb_disk: "usb1"
    docker_bridge_ip: "192.168.254.1/24"
    docker_network: "192.168.254.0/24"
  vars_files:
    - vars.yml

  tasks:
    # ===== USB =====
    - name: Получить информацию о дисках
      community.routeros.command:
        commands:
          - /disk print detail without-paging
      register: disk_info

    - name: Проверить файловую систему
      ansible.builtin.set_fact:
        usb_is_ext4: "{{ 'fs=ext4' in disk_info.stdout[0] }}"
        usb_exists: "{{ usb_disk in disk_info.stdout[0] }}"

    - name: Статус USB
      ansible.builtin.debug:
        msg: "USB {{ usb_disk }}: exists={{ usb_exists }}, ext4={{ usb_is_ext4 }}"

    - name: "ФОРМАТИРОВАНИЕ - ДАННЫЕ БУДУТ УДАЛЕНЫ"
      ansible.builtin.pause:
        seconds: 10
        prompt: "USB будет отформатирован в ext4. Ctrl+C для отмены."
      when: usb_exists and not usb_is_ext4

    - name: Размонтировать USB перед форматированием
      community.routeros.command:
        commands:
          - /disk eject {{ usb_partition }}
      when: usb_exists and not usb_is_ext4
      ignore_errors: yes

    - name: Ожидание размонтирования
      ansible.builtin.pause:
        seconds: 5
      when: usb_exists and not usb_is_ext4

    - name: Форматировать USB в ext4
      ansible.netcommon.cli_command:
        command: /disk format {{ usb_disk }} file-system=ext4 mbr-partition-table=yes
        prompt:
          - "are you sure"
        answer:
          - "y"
      when: usb_exists and not usb_is_ext4

    - name: Ожидание монтирования
      community.routeros.command:
        commands:
          - /disk print where slot~"{{ usb_partition }}"
      register: disk_mounted
      until: "'M' in disk_mounted.stdout[0]"
      retries: 20
      delay: 3
      when: usb_exists and not usb_is_ext4

    # ===== BRIDGE =====
    - name: Проверить Bridge-Docker
      community.routeros.command:
        commands:
          - /interface bridge print count-only where name={{ docker_bridge }}
      register: bridge_exists

    - name: Создать Bridge-Docker
      community.routeros.command:
        commands:
          - /interface bridge add name={{ docker_bridge }}
      when: bridge_exists.stdout[0] | int == 0

    - name: Проверить IP на Bridge-Docker
      community.routeros.command:
        commands:
          - /ip address print count-only where interface={{ docker_bridge }}
      register: bridge_ip_exists

    - name: Назначить IP на Bridge-Docker
      community.routeros.command:
        commands:
          - /ip address add address={{ docker_bridge_ip }} interface={{ docker_bridge }}
      when: bridge_ip_exists.stdout[0] | int == 0

    # ===== DNS =====
    - name: Включить allow-remote-requests для DNS
      community.routeros.command:
        commands:
          - /ip dns set allow-remote-requests=yes

    # ===== NAT =====
    - name: Получить все NAT правила
      community.routeros.command:
        commands:
          - /ip firewall nat print
      register: nat_rules

    - name: Добавить NAT masquerade для контейнеров
      community.routeros.command:
        commands:
          - /ip firewall nat add chain=srcnat src-address={{ docker_network }} action=masquerade comment="Containers to WAN"
      when: "'192.168.254.0/24' not in nat_rules.stdout[0] or 'masquerade' not in nat_rules.stdout[0]"

    - name: Добавить NAT DNS accept для контейнеров
      community.routeros.command:
        commands:
          - /ip firewall nat add chain=dstnat action=accept protocol=udp src-address={{ docker_network }} dst-port=53 comment="Allow containers DNS direct"
      when: "'Allow containers DNS direct' not in nat_rules.stdout[0]"

    # ===== ПРОВЕРКА USB =====
    - name: Проверить что USB примонтирован как disk
      community.routeros.command:
        commands:
          - /file print where name={{ usb_partition }} and type=disk
      register: disk_check

    - name: Fail если флешка не примонтирована
      ansible.builtin.fail:
        msg: "{{ usb_partition }} не найден или не примонтирован!"
      when: "usb_partition not in disk_check.stdout[0]"

    # ===== РЕЗУЛЬТАТ =====
    - name: Финальная проверка
      community.routeros.command:
        commands:
          - /disk print detail where slot~"{{ usb_partition }}"
          - /ip address print where interface={{ docker_bridge }}
          - /ip dns print
          - /ip firewall nat print
      register: final_check

    - name: Результат
      ansible.builtin.debug:
        msg: |
          USB: {{ 'OK (ext4, mounted)' if 'fs=ext4' in final_check.stdout[0] else 'FAILED' }}
          Bridge: {{ docker_bridge }} {{ docker_bridge_ip }}
          DNS: allow-remote-requests={{ 'yes' if 'allow-remote-requests: yes' in final_check.stdout[2] else 'no' }}
          NAT rules: {{ final_check.stdout[3] }}