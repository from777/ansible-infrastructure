# vars.yml
---
# ============================================================
# ПЕРЕМЕННЫЕ КОНТЕЙНЕРА
# ============================================================

container_name: "mamuka"

# ============================================================
# VLESS/VMESS SUBSCRIPTION
# ============================================================
# URL для скачивания списка прокси (vless://, vmess://)
# Оставь пустым чтобы использовать локальный configs/vless/proxies.txt
subscription_url: "https://raw.githubusercontent.com/miladtahanian/multi-proxy-config-fetcher/refs/heads/main/configs/proxy_configs.txt"

# Или переопредели при запуске:
# ansible-playbook mihomo_vless.yml -e subscription_url="https://другой-url.com/proxies.txt"
container_gateway: "192.168.254.1"
docker_bridge: "Bridge-Docker"
container_image: "wiktorbgu/mihomo-mikrotik:latest"

# КРИТИЧНО: DNS = IP роутера на Bridge-Docker
container_dns: "192.168.254.1"

# CONFIG для mihomo
container_config: "custom_config.yaml"

# SMB
smb_mount_point: "/mnt/mikrotik_smb"
smb_interface: "bridge1"

# USB — ВАЖНО: usb1-part1, не usb1!
usb_partition: "usb1-part1"
smb_share_name: "usb1"
smb_share_dir: "usb1-part1/smb_share"

# Пакет container (зависит от архитектуры роутера)
# hAP ax³ = arm64, hEX/hAP ac² = arm, x86 = x86
container_pkg_url: "https://download.mikrotik.com/routeros/7.20.6/container-7.20.6-arm64.npk"