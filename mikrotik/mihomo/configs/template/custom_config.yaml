external-controller: 0.0.0.0:9090
external-ui: ui
secret: 
unified-delay: true
log-level: info
ipv6: true

dns:
  enable: true
  use-system-hosts: true
  nameserver:
  - system

proxy-providers:
  AWG:
    type: file
    path: /etc/mihomo/awg/proxies.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 60
      timeout: 5000
      lazy: false
      expected-status: 204
  
  SRV:
    type: file
    path: /etc/mihomo/srv/proxies.yaml
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 60
      timeout: 5000
      lazy: false
      expected-status: 204

proxy-groups:
  - name: AWG_BEST
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 50
    use:
      - AWG

  - name: SRV_BEST
    type: url-test
    url: https://www.gstatic.com/generate_204
    interval: 60
    tolerance: 50
    use:
      - SRV

  - name: SELECTOR
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 60
    proxies:
      - AWG_BEST
      - SRV_BEST

  - name: QUIC
    type: select
    proxies:
      - PASS
      - REJECT

listeners:
  - name: mixed-in
    type: mixed
    port: 1080
  - name: tun-in
    type: tun
    stack: system
    auto-detect-interface: true
    auto-route: true
    auto-redirect: true
    inet4-address:
    - 198.19.0.1/30

rules:
  - AND,((NETWORK,udp),(DST-PORT,443)),QUIC
  - MATCH,SELECTOR
