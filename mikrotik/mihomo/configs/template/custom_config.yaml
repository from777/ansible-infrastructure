# custom_config.yaml
# Автопереключение на самый быстрый VPN

mixed-port: 7890
external-controller: 0.0.0.0:9090
external-ui: ui

mode: rule
log-level: info

dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true

# Группы прокси
proxy-groups:
  # Автовыбор самого быстрого
  - name: AUTO
    type: url-test
    use:
      - AWG
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # Ручной выбор (если нужен)
  - name: SELECTOR
    type: select
    proxies:
      - AUTO
      - DIRECT
    use:
      - AWG

  # Fallback — если текущий упал, переключится на следующий рабочий
  - name: FALLBACK
    type: fallback
    use:
      - AWG
    url: http://www.gstatic.com/generate_204
    interval: 300

# Правила
rules:
  - GEOIP,RU,DIRECT
  - MATCH,AUTO
