# cyberok-script.yml
# Загружает скрипт update-cyberok-list с GitHub и импортирует на роутер
# При каждом запуске обновляет скрипт до актуальной версии
---
- name: Install CyberOK update script
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    script_url: "https://raw.githubusercontent.com/from777/mikrotik-scripts/main/cyberok-script.rsc"
    script_file: "cyberok-script.rsc"
    script_name: "update-cyberok-list"
    # Только нужные policy: ftp, read, write, test
    script_policy: "ftp,read,write,test"

  tasks:
    # Скачиваем скрипт с GitHub
    - name: Download script from GitHub
      community.routeros.command:
        commands:
          - /tool/fetch url="{{ script_url }}" dst-path="{{ script_file }}"

    - name: Wait for download
      community.routeros.command:
        commands:
          - /delay 2s

    # Удаляем старый скрипт если есть
    - name: Remove old script if exists
      community.routeros.command:
        commands:
          - /system/script/remove [find name="{{ script_name }}"]
      ignore_errors: yes

    # Импортируем новый скрипт
    - name: Import script
      community.routeros.command:
        commands:
          - /import file="{{ script_file }}"

    # Устанавливаем правильные policy
    - name: Set script policy
      community.routeros.command:
        commands:
          - /system/script/set [find name="{{ script_name }}"] policy="{{ script_policy }}"

    # Удаляем временный файл
    - name: Remove temp file
      community.routeros.command:
        commands:
          - /file/remove {{ script_file }}
      ignore_errors: yes