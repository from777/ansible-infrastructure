# mihomo_vless.yml - Установка mihomo в режиме VLESS/VMess
#
# Использование:
#   ansible-playbook mihomo_vless.yml -l Mik_Tim
#   ansible-playbook mihomo_vless.yml -l Mik_Tim -e subscription_url="https://другой-url.com/proxies.txt"
#
# Особенности:
# - Парсит configs/vless/proxies.txt или скачивает по subscription_url
# - Генерирует proxies.yaml из vless:// и vmess:// URL
# - Использует url-test для автовыбора лучшего прокси
#
---
- name: "Set VLESS config"
  hosts: mikrotik
  gather_facts: no
  tasks:
    - name: Set variables for VLESS mode
      ansible.builtin.set_fact:
        container_config: "custom_config_vless.yaml"
        # Базовый образ mihomo без AWG логики
        container_image: "metacubex/mihomo:latest"

- name: "01: Network (Bridge + NAT + DNS)"
  ansible.builtin.import_playbook: ../shared/01_network.yml

- name: "02: SMB mount"
  ansible.builtin.import_playbook: ../shared/02_smb_mount.yml

- name: "03: VLESS Configs"
  ansible.builtin.import_playbook: 03_configs_vless.yml

- name: "04: Container"
  ansible.builtin.import_playbook: 04_container.yml
