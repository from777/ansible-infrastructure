# delete.yml - Полное удаление контейнера mihomo
#
# Использование:
#   ansible-playbook delete.yml -l Mik_Tim
#   ansible-playbook delete.yml -l Mik_Tim -e container_name="Vless"
#
---
- name: "Delete mihomo container"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_command_timeout: 120
    smb_base: "{{ usb_partition }}/smb_share"
  vars_files:
    - ../shared/vars_common.yml
    - vars.yml

  tasks:
    - name: Показать что удаляем
      ansible.builtin.debug:
        msg: "Удаляем контейнер: {{ container_name }}"

    # ===== ОЧИСТКА (повторное использование shared/tasks/cleanup.yml) =====
    - name: Очистка контейнера
      ansible.builtin.include_tasks: ../shared/tasks/cleanup.yml

    # ===== УДАЛИТЬ ПАПКУ КОНФИГОВ =====
    - name: Удалить папку конфигов
      ansible.builtin.file:
        path: "{{ smb_mount_point }}/docker_configs/{{ container_name }}"
        state: absent
      delegate_to: localhost
      ignore_errors: yes

    # ===== ОЧИСТКА UNKNOWN ПОРТОВ =====
    - name: Очистить unknown порты
      community.routeros.command:
        commands:
          - /interface bridge port remove [find interface~unknown and bridge={{ docker_bridge }}]
      ignore_errors: yes

    - name: "Готово"
      ansible.builtin.debug:
        msg: "Контейнер {{ container_name }} удалён"
