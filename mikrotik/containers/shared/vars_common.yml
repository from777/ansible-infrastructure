# vars_common.yml - Общие переменные для всех контейнеров
---
# USB
usb_partition: "usb1-part1"

# SMB
smb_mount_point: "/mnt/mikrotik_smb"
smb_interface: "bridge1"
smb_share_name: "usb1"
smb_share_dir: "usb1-part1/smb_share"

# Docker network
docker_bridge: "Bridge-Docker"
docker_bridge_ip: "192.168.254.1/24"
docker_network: "192.168.254.0/24"
container_network: "192.168.254"
container_gateway: "192.168.254.1"
container_dns: "192.168.254.1"

# Container package URL определяется автоматически в container_package.yml
# на основе версии RouterOS и архитектуры роутера
