# delete.yml - Полное удаление контейнера Zapret2
#
# Использование:
#   ansible-playbook delete.yml -l Mik_Tim
#
# Удаляет:
# - Контейнер
# - veth интерфейс
# - Порт из bridge
# - Route и Routing table
# - Mangle rules (опционально)
# - Root-dir на USB
#
---
- name: "Delete Zapret2 container"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_command_timeout: 120
    smb_base: "{{ usb_partition }}/smb_share"
    # Удалять mangle rules с комментарием zapret2?
    delete_mangle_rules: true
  vars_files:
    - ../shared/vars_common.yml
    - vars.yml

  tasks:
    - name: Показать что удаляем
      ansible.builtin.debug:
        msg: "Удаляем контейнер: {{ container_name }}"

    # ===== ОЧИСТКА КОНТЕЙНЕРА (повторное использование shared/tasks/cleanup.yml) =====
    - name: Очистка контейнера
      ansible.builtin.include_tasks: ../shared/tasks/cleanup.yml

    # ===== УДАЛИТЬ ROUTE =====
    - name: Удалить route
      community.routeros.command:
        commands:
          - /ip route remove [find routing-table={{ routing_table_name }}]
      ignore_errors: yes

    # ===== УДАЛИТЬ ROUTING TABLE =====
    - name: Удалить routing table
      community.routeros.command:
        commands:
          - /routing table remove [find name={{ routing_table_name }}]
      ignore_errors: yes

    # ===== УДАЛИТЬ MANGLE RULES (опционально) =====
    - name: Удалить mangle rules
      community.routeros.command:
        commands:
          - /ip firewall mangle remove [find comment~"{{ container_name | lower }}"]
      ignore_errors: yes
      when: delete_mangle_rules | default(true)

    # ===== ОЧИСТКА UNKNOWN ПОРТОВ =====
    - name: Очистить unknown порты
      community.routeros.command:
        commands:
          - /interface bridge port remove [find interface~unknown and bridge={{ docker_bridge }}]
      ignore_errors: yes

    - name: "Готово"
      ansible.builtin.debug:
        msg: |
          ================================================
          Контейнер {{ container_name }} полностью удалён!
          ================================================
          Удалено:
          - Контейнер
          - veth интерфейс
          - Порт из bridge
          - Route и routing table {{ routing_table_name }}
          - Mangle rules: {{ 'да' if delete_mangle_rules else 'нет' }}
          - Папка root-dir
          ================================================
