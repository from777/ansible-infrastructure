# @file zapret2.yml
# @desc Установка Zapret2 контейнера для обхода DPI (nfqws2-mikrotik)
# @hosts mikrotik
# @deps _containers/container_package.yml, _containers/container_mode.yml
# @notes Требует RouterOS >= 7.21rc1. Docs: https://hub.docker.com/r/wiktorbgu/nfqws2-mikrotik
---
- name: "01: Network (Bridge + NAT + DNS)"
  ansible.builtin.import_playbook: ../_shared/01_network.yml

- name: "02: SMB mount"
  ansible.builtin.import_playbook: ../_shared/02_smb_mount.yml

- name: "03: Config"
  ansible.builtin.import_playbook: 03_config.yml

- name: "04: Container"
  ansible.builtin.import_playbook: 04_container.yml

- name: "05: Routing"
  ansible.builtin.import_playbook: 05_routing.yml
