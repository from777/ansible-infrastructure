# vars.yml - Переменные для контейнера Zapret2 (DPI bypass)
---
# ============================================================
# ПЕРЕМЕННЫЕ КОНТЕЙНЕРА
# ============================================================

container_name: "Zapret2"
container_image: "wiktorbgu/nfqws2-mikrotik:latest"

# ============================================================
# ROUTING
# ============================================================
# Routing table для перенаправления трафика через контейнер
routing_table_name: "BlackList_DPI"

# ============================================================
# СТРАТЕГИЯ DPI BYPASS
# ============================================================
# Найдена через blockcheck2.sh для конкретного провайдера
# Если перестанет работать - запустить blockcheck2.sh заново
#
# Метод: fakedsplit с tcp_seq=-3000 (модификация TCP sequence number)
# Работает для YouTube и других сайтов
#
nfqws2_strategy_https: "--payload=tls_client_hello --lua-desync=fakedsplit:pos=midsld:tcp_seq=-3000"
nfqws2_strategy_quic: "--payload=quic_initial --lua-desync=fake:blob=fake_default_quic:repeats=10"

# Комбинированная стратегия для config
nfqws2_strategy: "--filter-tcp=443 {{ nfqws2_strategy_https }}"

# ============================================================
# СЕТЬ (наследуется из _shared/vars_common.yml)
