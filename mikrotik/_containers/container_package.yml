# @file container_package.yml
# @desc Установка пакета container на MikroTik (автоопределение версии и архитектуры)
# @hosts mikrotik
---
- name: "Install container package"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_command_timeout: 120

  tasks:
    # ===== ОПРЕДЕЛЕНИЕ ВЕРСИИ И АРХИТЕКТУРЫ =====
    - name: Получить версию RouterOS
      community.routeros.command:
        commands:
          - /system resource print
      register: resource_info

    - name: Парсить версию и архитектуру
      ansible.builtin.set_fact:
        ros_version: "{{ resource_info.stdout[0] | regex_search('version: ([0-9]+\\.[0-9]+[^\\s]*)', '\\1') | first }}"
        ros_arch: "{{ resource_info.stdout[0] | regex_search('architecture-name: (\\S+)', '\\1') | first }}"

    - name: Показать информацию о системе
      ansible.builtin.debug:
        msg: |
          RouterOS версия: {{ ros_version }}
          Архитектура: {{ ros_arch }}
          URL пакета: https://download.mikrotik.com/routeros/{{ ros_version }}/container-{{ ros_version }}-{{ ros_arch }}.npk

    # ===== ПРОВЕРКА ПАКЕТА =====
    - name: Проверить наличие пакета container
      community.routeros.command:
        commands:
          - /system package print count-only where name=container
      register: pkg_exists

    - name: Проверить версию установленного пакета
      community.routeros.command:
        commands:
          - /system package print where name=container
      register: pkg_version
      when: pkg_exists.stdout[0] | int > 0

    - name: Статус пакета
      ansible.builtin.debug:
        msg: "Container package: {{ 'установлен' if pkg_exists.stdout[0] | int > 0 else 'отсутствует' }}"

    # ===== УСТАНОВКА ПАКЕТА =====
    - name: Установка пакета
      block:
        - name: Удалить старый файл пакета если есть
          community.routeros.command:
            commands:
              - /file remove container.npk
          ignore_errors: yes

        - name: Скачать пакет container (версия {{ ros_version }})
          community.routeros.command:
            commands:
              - /tool fetch url=https://download.mikrotik.com/routeros/{{ ros_version }}/container-{{ ros_version }}-{{ ros_arch }}.npk dst-path=container.npk
          register: fetch_result

        - name: DEBUG - результат скачивания
          ansible.builtin.debug:
            msg: "{{ fetch_result.stdout }}"

        - name: Перезагрузить роутер
          ansible.netcommon.cli_command:
            command: /system reboot
            prompt:
              - "Reboot, yes"
            answer:
              - "y"
          ignore_errors: yes

        - name: Ждать выключения
          ansible.builtin.wait_for:
            host: "{{ ansible_host }}"
            port: 22
            state: stopped
            timeout: 60
          delegate_to: localhost

        - name: Ждать загрузки
          ansible.builtin.wait_for:
            host: "{{ ansible_host }}"
            port: 22
            state: started
            timeout: 180
          delegate_to: localhost

        - name: Пауза для инициализации
          ansible.builtin.pause:
            seconds: 15
      when: pkg_exists.stdout[0] | int == 0

    # ===== ПРОВЕРКА РЕЗУЛЬТАТА =====
    - name: Проверить установку пакета
      community.routeros.command:
        commands:
          - /system package print count-only where name=container
      register: pkg_final

    - name: Результат
      ansible.builtin.debug:
        msg: |
          ================================================
          {{ 'OK: Пакет container установлен' if pkg_final.stdout[0] | int > 0 else 'FAILED: Пакет не установлен' }}
          RouterOS: {{ ros_version }}
          Архитектура: {{ ros_arch }}
          ================================================

    - name: Fail если пакет не установлен
      ansible.builtin.fail:
        msg: "Пакет container не установился"
      when: pkg_final.stdout[0] | int == 0
