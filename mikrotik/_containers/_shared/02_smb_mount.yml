# 02_smb_mount.yml - SMB share на роутере + монтирование на Semaphore
# Вызывается из мастер-плейбуков
---
- name: "02: SMB share on router + mount on Semaphore"
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_command_timeout: 120
  vars_files:
    - vars_common.yml

  tasks:
    # ===== ПРОВЕРКА USB =====
    - name: Проверить что USB примонтирован
      community.routeros.command:
        commands:
          - /file print where name={{ usb_partition }} and type=disk
      register: disk_check

    - name: Fail если флешка не примонтирована
      ansible.builtin.fail:
        msg: "{{ usb_partition }} не найден! Сначала запусти usb_format.yml"
      when: "usb_partition not in disk_check.stdout[0]"

    # ===== ROUTER: SMB =====
    - name: Включить SMB
      community.routeros.command:
        commands:
          - /ip smb set enabled=yes interfaces={{ smb_interface }}

    - name: Включить guest без read-only
      community.routeros.command:
        commands:
          - /ip smb users set [find name="guest"] disabled=no read-only=no

    - name: Проверить директорию для шары
      community.routeros.command:
        commands:
          - /file print count-only where name="{{ smb_share_dir }}"
      register: share_dir_exists

    - name: Создать директорию для шары
      community.routeros.command:
        commands:
          - /file add name={{ smb_share_dir }} type=directory
      when: share_dir_exists.stdout[0] | int == 0

    - name: Проверить SMB шару
      community.routeros.command:
        commands:
          - /ip smb shares print count-only where name={{ smb_share_name }}
      register: share_exists

    - name: Создать SMB шару
      community.routeros.command:
        commands:
          - /ip smb shares add name={{ smb_share_name }} directory={{ smb_share_dir }}
      when: share_exists.stdout[0] | int == 0

    - name: Настроить SMB шару (гостевой доступ)
      community.routeros.command:
        commands:
          - /ip smb shares set [find name={{ smb_share_name }}] directory={{ smb_share_dir }}

    - name: Пауза для применения настроек SMB
      ansible.builtin.pause:
        seconds: 3

    # ===== SEMAPHORE: MOUNT =====
    - name: Проверить cifs-utils
      ansible.builtin.command: which mount.cifs
      delegate_to: localhost
      changed_when: false
      failed_when: false
      register: cifs_check

    - name: Установить cifs-utils если нет
      ansible.builtin.apt:
        name: cifs-utils
        state: present
      delegate_to: localhost
      become: yes
      when: cifs_check.rc != 0

    - name: Размонтировать старую шару если есть
      ansible.builtin.shell: umount "{{ smb_mount_point }}" 2>/dev/null || true
      delegate_to: localhost
      become: yes
      changed_when: false

    - name: Удалить точку монтирования если битая
      ansible.builtin.shell: rm -rf "{{ smb_mount_point }}" 2>/dev/null || true
      delegate_to: localhost
      become: yes
      changed_when: false

    - name: Создать точку монтирования
      ansible.builtin.file:
        path: "{{ smb_mount_point }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      become: yes

    - name: Смонтировать SMB (гостевой доступ)
      ansible.builtin.shell: |
        mount -t cifs "//{{ ansible_host }}/{{ smb_share_name }}" "{{ smb_mount_point }}" -o guest,sec=none
      delegate_to: localhost
      become: yes

    # ===== РЕЗУЛЬТАТ =====
    - name: Проверить монтирование
      ansible.builtin.shell: ls -la "{{ smb_mount_point }}/"
      delegate_to: localhost
      register: mount_check
      changed_when: false

    - name: Результат
      ansible.builtin.debug:
        msg: |
          SMB: //{{ ansible_host }}/{{ smb_share_name }}
          Mount: {{ smb_mount_point }}
          Contents: {{ mount_check.stdout_lines | length }} items
