# @file mihomo_awg.yml
# @desc Установка mihomo в режиме AWG (AmneziaWG): сеть, SMB, конфиги, контейнер
# @hosts mikrotik
# @deps _containers/_shared/01_network.yml, _containers/_shared/02_smb_mount.yml
---
- name: "Set AWG config"
  hosts: mikrotik
  gather_facts: no
  tasks:
    - name: Set container_config for AWG mode
      ansible.builtin.set_fact:
        container_config: "custom_config.yaml"

- name: "01: Network (Bridge + NAT + DNS)"
  ansible.builtin.import_playbook: ../_shared/01_network.yml

- name: "02: SMB mount"
  ansible.builtin.import_playbook: ../_shared/02_smb_mount.yml

- name: "03: Configs"
  ansible.builtin.import_playbook: 03_configs_awg.yml

- name: "04: Container"
  ansible.builtin.import_playbook: 04_container.yml
