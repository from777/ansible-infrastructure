# @file mihomo_vless.yml
# @desc Установка mihomo в режиме VLESS/VMess: парсинг прокси, генерация конфига
# @hosts mikrotik
# @deps _containers/_shared/01_network.yml, _containers/_shared/02_smb_mount.yml
---
- name: "Set VLESS config"
  hosts: mikrotik
  gather_facts: no
  tasks:
    - name: Set variables for VLESS mode
      ansible.builtin.set_fact:
        container_config: "custom_config_vless.yaml"
        # Базовый образ mihomo без AWG логики
        container_image: "metacubex/mihomo:latest"

- name: "01: Network (Bridge + NAT + DNS)"
  ansible.builtin.import_playbook: ../_shared/01_network.yml

- name: "02: SMB mount"
  ansible.builtin.import_playbook: ../_shared/02_smb_mount.yml

- name: "03: VLESS Configs"
  ansible.builtin.import_playbook: 03_configs_vless.yml

- name: "04: Container"
  ansible.builtin.import_playbook: 04_container.yml
