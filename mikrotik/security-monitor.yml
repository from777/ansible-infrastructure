# security-monitor.yml
# Мониторинг безопасности - проверка SOCKS
# Запускать по расписанию в Semaphore (каждые 15-30 мин)
# telegram_bot_token и telegram_chat_id задаются в Semaphore Variable Groups
---
- name: Security monitoring - SOCKS proxy check
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    - name: Get SOCKS status
      community.routeros.command:
        commands:
          - /ip socks print
      register: socks_status

    - name: Set status flag
      ansible.builtin.set_fact:
        socks_enabled: "{{ 'enabled: yes' in socks_status.stdout[0] }}"

    - name: Send ALERT if SOCKS enabled
      ansible.builtin.uri:
        url: "https://api.telegram.org/bot{{ telegram_bot_token }}/sendMessage"
        method: POST
        body_format: json
        body:
          chat_id: "{{ telegram_chat_id }}"
          text: "🚨 SOCKS ВКЛЮЧЕН!\n\nRouter: {{ inventory_hostname }}\nIP: {{ ansible_host }}"
      delegate_to: localhost
      when: socks_enabled

    - name: Send OK if SOCKS disabled
      ansible.builtin.uri:
        url: "https://api.telegram.org/bot{{ telegram_bot_token }}/sendMessage"
        method: POST
        body_format: json
        body:
          chat_id: "{{ telegram_chat_id }}"
          text: "✅ SOCKS выключен\n\nRouter: {{ inventory_hostname }}\nIP: {{ ansible_host }}"
      delegate_to: localhost
      when: not socks_enabled
