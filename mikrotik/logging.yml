# logging.yml
---
- name: Configure MikroTik logging to ELK
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    ansible_connection: ansible.netcommon.network_cli
    elk_server: "{{ elk_server_override | default('192.168.0.82') }}"
    elk_port: "5514"

  tasks:
    - name: Configure remote logging action
      community.routeros.command:
        commands:
          - /system/logging/action/set remote remote={{ elk_server }} remote-port={{ elk_port }} remote-log-format=syslog

    - name: Add logging rule for info
      community.routeros.command:
        commands:
          - /system/logging/add action=remote topics=info
      ignore_errors: yes

    - name: Add logging rule for warning
      community.routeros.command:
        commands:
          - /system/logging/add action=remote topics=warning
      ignore_errors: yes

    - name: Add logging rule for error
      community.routeros.command:
        commands:
          - /system/logging/add action=remote topics=error
      ignore_errors: yes

    - name: Add logging rule for critical
      community.routeros.command:
        commands:
          - /system/logging/add action=remote topics=critical
      ignore_errors: yes