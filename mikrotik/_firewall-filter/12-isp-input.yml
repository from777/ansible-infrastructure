# @file 12-isp-input.yml
# @desc Правила ISP-Input: трафик от WAN к роутеру
# @hosts mikrotik
---
- name: Configure ISP-Input chain
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    # ===== ISP-Input chain =====

    - name: Check ISP-Input established exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"ISP Accept established"
      register: isp_established_check

    - name: Add ISP-Input accept established
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input action=accept connection-state=established comment="ISP Accept established"
      when: isp_established_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Check ISP-Input related exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"ISP Accept related"
      register: isp_related_check

    - name: Add ISP-Input accept related
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input action=accept connection-state=related comment="ISP Accept related"
      when: isp_related_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Check ISP-Input untracked exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"ISP Accept untracked"
      register: isp_untracked_check

    - name: Add ISP-Input accept untracked
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input action=accept connection-state=untracked comment="ISP Accept untracked"
      when: isp_untracked_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Check ISP-Input invalid exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"ISP Drop invalid"
      register: isp_invalid_check

    - name: Add ISP-Input drop invalid
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input action=drop connection-state=invalid comment="ISP Drop invalid"
      when: isp_invalid_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Check ISP-Input jump exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"ISP Jump to allowed"
      register: isp_jump_check

    - name: Add ISP-Input jump to allowed
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input action=jump jump-target=ISP-Input-Allow comment="ISP Jump to allowed"
      when: isp_jump_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Check ISP-Input drop all exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"ISP Drop all other"
      register: isp_drop_check

    - name: Add ISP-Input drop all
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input action=drop comment="ISP Drop all other"
      when: isp_drop_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    # ===== ISP-Input-Allow chain =====

    - name: Check ISP-Input-Allow ICMP exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"Allow ICMP"
      register: isp_icmp_check

    - name: Add ISP-Input-Allow ICMP
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input-Allow action=accept protocol=icmp comment="Allow ICMP"
      when: isp_icmp_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Check ISP-Input-Allow SSH exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"SSH via Brute-force"
      register: isp_ssh_check

    - name: Add ISP-Input-Allow SSH via Brute-force
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input-Allow action=jump jump-target=Brute-force protocol=tcp dst-port=22 connection-nat-state=dstnat comment="SSH via Brute-force"
      when: isp_ssh_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Check ISP-Input-Allow drop Winbox exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"Drop Winbox from WAN"
      register: isp_winbox_check

    - name: Add ISP-Input-Allow drop Winbox
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input-Allow action=drop protocol=tcp dst-port=8291 comment="Drop Winbox from WAN"
      when: isp_winbox_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Check ISP-Input-Allow WireGuard exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"WireGuard"
      register: isp_wg_check

    - name: Add ISP-Input-Allow WireGuard
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=ISP-Input-Allow action=accept protocol=udp dst-port=51820 comment="WireGuard"
      when: isp_wg_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Show result
      debug:
        msg: "ISP-Input and ISP-Input-Allow chains configured"
