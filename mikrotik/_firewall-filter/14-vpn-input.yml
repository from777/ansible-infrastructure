# 14-vpn-input.yml
# Правила для chain=VPN-Input
# Трафик от VPN клиентов и контейнеров к роутеру
---
- name: Configure VPN-Input chain
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    container_network: "192.168.254.0/24"

  tasks:
    # ===== ПРОВЕРКА INTERFACE-LIST =====
    - name: Check VPN-OUT interface list exists
      community.routeros.command:
        commands:
          - /interface list print count-only where name=VPN-OUT
      register: vpn_list_check

    - name: Set VPN-OUT list exists flag
      set_fact:
        has_vpn: "{{ vpn_list_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int > 0 }}"

    - name: Debug VPN-OUT list check
      debug:
        msg: "VPN-OUT interface list exists: {{ has_vpn }}"

    - name: Skip if no VPN-OUT interface list
      debug:
        msg: "VPN-OUT interface list not found - skipping VPN-Input rules"
      when: not has_vpn

    # ===== VPN-Input ПРАВИЛА =====

    - name: Check VPN-Input established exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN Accept established"
      register: vpn_established_check
      when: has_vpn

    - name: Add VPN-Input accept established
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Input action=accept connection-state=established comment="VPN Accept established"
      when: has_vpn and (vpn_established_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    - name: Check VPN-Input related exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN Accept related"
      register: vpn_related_check
      when: has_vpn

    - name: Add VPN-Input accept related
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Input action=accept connection-state=related comment="VPN Accept related"
      when: has_vpn and (vpn_related_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    - name: Check VPN-Input untracked exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN Accept untracked"
      register: vpn_untracked_check
      when: has_vpn

    - name: Add VPN-Input accept untracked
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Input action=accept connection-state=untracked comment="VPN Accept untracked"
      when: has_vpn and (vpn_untracked_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    - name: Check VPN-Input invalid exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN Drop invalid"
      register: vpn_invalid_check
      when: has_vpn

    - name: Add VPN-Input drop invalid
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Input action=drop connection-state=invalid comment="VPN Drop invalid"
      when: has_vpn and (vpn_invalid_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    - name: Check VPN-Input containers DNS exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"Containers DNS to router"
      register: vpn_dns_check
      when: has_vpn

    - name: Add VPN-Input accept containers DNS
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Input action=accept protocol=udp dst-port=53 src-address={{ container_network }} comment="Containers DNS to router"
      when: has_vpn and (vpn_dns_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    - name: Check VPN-Input drop all exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"VPN Drop all other"
      register: vpn_drop_check
      when: has_vpn

    - name: Add VPN-Input drop all
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=VPN-Input action=drop comment="VPN Drop all other"
      when: has_vpn and (vpn_drop_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0)

    - name: Show result
      debug:
        msg: "VPN-Input chain - {{ 'configured' if has_vpn else 'skipped (no VPN-OUT list)' }}"
