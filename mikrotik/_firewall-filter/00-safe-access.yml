# 00-safe-access.yml
# ВЫПОЛНЯТЬ ПЕРВЫМ! Защита доступа с твоего IP
# Это правило гарантирует что ты не потеряешь доступ к роутеру
---
- name: Add safe access rule
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros
    # Твой внешний IP - с него всегда разрешён доступ
    safe_ip: "212.20.46.209"

  tasks:
    # Получаем все input правила
    - name: Get all input accept rules
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print where chain=input action=accept
      register: input_rules

    # Проверяем есть ли наш IP в выводе
    - name: Set rule exists flag
      set_fact:
        safe_rule_exists: "{{ safe_ip in input_rules.stdout[0] }}"

    # Debug
    - name: Debug safe rule check
      debug:
        msg: "Safe rule exists: {{ safe_rule_exists }}"

    # Добавляем правило если нет (без place-before, потом переместим)
    - name: Add safe access rule
      community.routeros.command:
        commands:
          - /ip/firewall/filter/add chain=input action=accept src-address={{ safe_ip }} comment=SAFE-ACCESS
      register: add_result
      when: not safe_rule_exists

    # Показываем что вернула команда add
    - name: Debug add result
      debug:
        msg: "Add command returned: {{ add_result.stdout | default('nothing') }}"
      when: not safe_rule_exists

    # Перемещаем правило в начало
    - name: Move safe rule to top
      community.routeros.command:
        commands:
          - /ip/firewall/filter/move [find src-address~"{{ safe_ip }}" chain=input] 0
      when: not safe_rule_exists
      ignore_errors: yes

    # Проверяем что правило реально добавилось
    - name: Verify rule was added
      community.routeros.command:
        commands:
          - /ip/firewall/filter/print where chain=input action=accept
      register: verify_rules
      when: not safe_rule_exists

    - name: Debug verify
      debug:
        msg: "After add: {{ verify_rules.stdout[0] | default('skipped') }}"
      when: not safe_rule_exists

    - name: Fail if rule not added
      fail:
        msg: "CRITICAL: Failed to add safe access rule! Check RouterOS manually!"
      when:
        - not safe_rule_exists
        - safe_ip not in (verify_rules.stdout[0] | default(''))

    # Итоговое сообщение
    - name: Show result
      debug:
        msg: "Safe access rule for {{ safe_ip }} - {{ 'already exists' if safe_rule_exists else 'added' }}"