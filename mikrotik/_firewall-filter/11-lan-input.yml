# @file 11-lan-input.yml
# @desc Правила LAN-Input: трафик от LAN к роутеру (разрешаем всё)
# @hosts mikrotik
---
- name: Configure LAN-Input chain
  hosts: mikrotik
  gather_facts: no
  connection: ansible.netcommon.network_cli
  vars:
    ansible_network_os: community.routeros.routeros

  tasks:
    - name: Check LAN-Input accept all exists
      community.routeros.command:
        commands:
          - /ip firewall filter print count-only where comment~"Accept all from LAN"
      register: lan_accept_check

    - name: Add LAN-Input accept all
      community.routeros.command:
        commands:
          - /ip firewall filter add chain=LAN-Input action=accept comment="Accept all from LAN"
      when: lan_accept_check.stdout[0] | regex_search('([0-9]+)\\s*$') | int == 0

    - name: Show result
      debug:
        msg: "LAN-Input chain configured"
