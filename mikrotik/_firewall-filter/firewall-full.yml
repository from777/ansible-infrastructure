- import_playbook: 00-preflight-check.yml

# === ЗАЩИТА ===
- import_playbook: 00-safe-access.yml
- import_playbook: 01-cleanup.yml

# === ПРАВИЛА В ЦЕПОЧКАХ (сначала наполняем цепочки) ===
- import_playbook: 10-brute-force.yml
