# firewall-full.yml
# Главный плейбук - вызывает все остальные в правильном порядке
#
# ПРАВИЛЬНЫЙ ПОРЯДОК:
# 1. Защита доступа (SAFE-ACCESS)
# 2. Очистка старых правил
# 3. Правила В цепочках (LAN-Input, ISP-Input и т.д.)
# 4. Jump правила в эти цепочки
# 5. Drop all - В САМОМ КОНЦЕ!
#
# !!! ВНИМАНИЕ !!!
# 01-cleanup.yml удаляет ВСЕ старые правила!
---
# === ПРОВЕРКА ГОТОВНОСТИ ===
- import_playbook: 00-preflight-check.yml

# === ЗАЩИТА ===
- import_playbook: 00-safe-access.yml
- import_playbook: 01-cleanup.yml

# === ПРАВИЛА В ЦЕПОЧКАХ (сначала наполняем цепочки) ===
- import_playbook: 10-brute-force.yml
- import_playbook: 11-lan-input.yml
- import_playbook: 12-isp-input.yml
- import_playbook: 13-guest-input.yml
- import_playbook: 14-vpn-input.yml
- import_playbook: 20-lan-forward.yml
- import_playbook: 21-isp-forward.yml
- import_playbook: 22-guest-forward.yml
- import_playbook: 23-vpn-forward.yml

# === JUMP ПРАВИЛА (теперь прыгаем в заполненные цепочки) ===
- import_playbook: 02-input-jumps.yml
- import_playbook: 03-forward-jumps.yml

# === DROP ALL В КОНЦЕ ===
- import_playbook: 99-drop-all.yml