# inventory.yml - общий inventory для всех плейбуков
---
mikrotik:
  hosts:
    Mik_Tim:
      ansible_host: 192.168.0.1
      elk_server: 192.168.0.82
      router_ip: 192.168.0.1
      zabbix_monitor: true   # -> setup-mikrotik-hosts.yml (добавляет/удаляет хост в Zabbix)
      monitor_socks: true    # -> monitoring-socks.yml (линкует/отлинковывает template SOCKS)
      monitor_users: true    # -> monitoring-users.yml (линкует/отлинковывает template Users)
    Mik_mom:
      ansible_host: 109.174.1.142
      elk_server: 10.200.200.82
      router_ip: 192.168.0.1
      zabbix_monitor: false  # -> setup-mikrotik-hosts.yml (добавляет/удаляет хост в Zabbix)
      monitor_socks: false   # -> monitoring-socks.yml (линкует/отлинковывает template SOCKS)
      monitor_users: false   # -> monitoring-users.yml (линкует/отлинковывает template Users)
    hap_ax3:
      ansible_host: 192.168.0.88
      ansible_user: ansible+cet1024w
      ansible_password: ansible_pass
      router_ip: 192.168.88.1
      allowed_networks:
        - 192.168.88.0/24
        - 192.168.0.0/24
        - 212.20.46.209
      zabbix_monitor: false  # -> setup-mikrotik-hosts.yml (добавляет/удаляет хост в Zabbix)
      monitor_socks: false   # -> monitoring-socks.yml (линкует/отлинковывает template SOCKS)
      monitor_users: false   # -> monitoring-users.yml (линкует/отлинковывает template Users)

zabbix_servers:
  hosts:
    zabbix:
      ansible_host: 192.168.0.81
      ansible_user: vagrant

elk_servers:
  hosts:
    elk:
      ansible_host: 192.168.0.82
      ansible_user: vagrant
