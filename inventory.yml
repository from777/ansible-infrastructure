# inventory.yml - общий inventory для всех плейбуков
#
# Zabbix monitoring flags:
#   zabbix_monitor: true/false  -> setup-mikrotik-hosts.yml (добавляет/не добавляет хост в Zabbix)
#   monitor_socks: true/false   -> monitoring-socks.yml (линкует/отлинковывает template SOCKS)
#   monitor_users: true/false   -> monitoring-users.yml (линкует/отлинковывает template Users)
#
# При изменении любого флага запустить соответствующий playbook!
---
mikrotik:
  hosts:
    Mik_Tim:
      ansible_host: 192.168.0.1
      elk_server: 192.168.0.82
      router_ip: 192.168.0.1
      # Zabbix monitoring flags (см. комментарий вверху)
      zabbix_monitor: true
      monitor_socks: true
      monitor_users: true
    Mik_mom:
      ansible_host: 109.174.1.142
      elk_server: 10.200.200.82
      router_ip: 192.168.0.1
      # Zabbix monitoring flags
      zabbix_monitor: false
      monitor_socks: false
      monitor_users: false
    hap_ax3:
      ansible_host: 192.168.0.88
      ansible_user: ansible+cet1024w
      ansible_password: ansible_pass
      router_ip: 192.168.88.1
      allowed_networks:
        - 192.168.88.0/24
        - 192.168.0.0/24
        - 212.20.46.209
      # Zabbix monitoring flags
      zabbix_monitor: false
      monitor_socks: false
      monitor_users: false

zabbix_servers:
  hosts:
    zabbix:
      ansible_host: 192.168.0.81
      ansible_user: vagrant

elk_servers:
  hosts:
    elk:
      ansible_host: 192.168.0.82
      ansible_user: vagrant
