# setup-mikrotik-hosts.yml
# Добавляет хосты MikroTik в Zabbix (без templates)
# Templates привязываются отдельными playbooks monitoring-*.yml
# Запускать: при добавлении нового роутера
---
- name: Setup MikroTik hosts in Zabbix
  hosts: zabbix
  gather_facts: no
  connection: local
  vars:
    zabbix_url: "http://{{ ansible_host }}/api_jsonrpc.php"
    zabbix_user: "Admin"
    zabbix_password: "zabbix"

  tasks:
    - name: Login to Zabbix API
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 1
      register: zabbix_auth

    - name: Set auth token
      ansible.builtin.set_fact:
        auth: "{{ zabbix_auth.json.result }}"

    # Host Group
    - name: Check if host group exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "hostgroup.get"
          params:
            filter:
              name: "MikroTik"
          auth: "{{ auth }}"
          id: 2
      register: hostgroup_check

    - name: Create host group MikroTik
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "hostgroup.create"
          params:
            name: "MikroTik"
          auth: "{{ auth }}"
          id: 3
      when: hostgroup_check.json.result | length == 0
      register: hostgroup_created

    - name: Set host group ID
      ansible.builtin.set_fact:
        hostgroup_id: "{{ hostgroup_check.json.result[0].groupid if hostgroup_check.json.result | length > 0 else hostgroup_created.json.result.groupids[0] }}"

    # Build hosts lists from inventory
    - name: Build MikroTik hosts to ADD (zabbix_monitor=true)
      ansible.builtin.set_fact:
        mikrotik_hosts_to_add: "{{ mikrotik_hosts_to_add | default([]) + [{'name': item, 'ip': hostvars[item].ansible_host, 'user': hostvars[item].ansible_user, 'password': hostvars[item].ansible_password}] }}"
      loop: "{{ groups['mikrotik'] }}"
      when: hostvars[item].zabbix_monitor | default(false)

    - name: Build MikroTik hosts to DELETE (zabbix_monitor=false)
      ansible.builtin.set_fact:
        mikrotik_hosts_to_delete: "{{ mikrotik_hosts_to_delete | default([]) + [item] }}"
      loop: "{{ groups['mikrotik'] }}"
      when: not (hostvars[item].zabbix_monitor | default(false))

    - name: Show hosts to add/delete
      ansible.builtin.debug:
        msg:
          - "Hosts to ADD: {{ mikrotik_hosts_to_add | default([]) | map(attribute='name') | list }}"
          - "Hosts to DELETE: {{ mikrotik_hosts_to_delete | default([]) }}"

    # Create hosts
    - name: Check and create MikroTik hosts
      ansible.builtin.include_tasks: tasks/create-zabbix-host.yml
      loop: "{{ mikrotik_hosts_to_add | default([]) }}"
      loop_control:
        loop_var: mikrotik_host

    # Delete hosts
    - name: Delete MikroTik hosts with zabbix_monitor=false
      ansible.builtin.include_tasks: tasks/delete-zabbix-host.yml
      loop: "{{ mikrotik_hosts_to_delete | default([]) }}"
      loop_control:
        loop_var: host_to_delete

    - name: Done
      ansible.builtin.debug:
        msg: "MikroTik hosts synced with Zabbix. Now run monitoring-*.yml to add templates."
