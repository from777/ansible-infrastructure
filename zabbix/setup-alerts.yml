# setup-alerts.yml
# Создаёт Action для отправки алертов MikroTik в Telegram
# Запускать: один раз после setup-telegram.yml
---
- name: Setup MikroTik alerts in Zabbix
  hosts: zabbix
  gather_facts: no
  connection: local
  vars:
    zabbix_url: "http://{{ ansible_host }}/api_jsonrpc.php"
    zabbix_user: "Admin"
    zabbix_password: "zabbix"

  tasks:
    - name: Login to Zabbix API
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 1
      register: zabbix_auth

    - name: Set auth token
      ansible.builtin.set_fact:
        auth: "{{ zabbix_auth.json.result }}"

    # Get MikroTik host group
    - name: Get MikroTik host group
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "hostgroup.get"
          params:
            filter:
              name: "MikroTik"
          auth: "{{ auth }}"
          id: 2
      register: hostgroup

    - name: Set host group ID
      ansible.builtin.set_fact:
        hostgroup_id: "{{ hostgroup.json.result[0].groupid }}"
      when: hostgroup.json.result | length > 0

    # Get Telegram media type
    - name: Get Telegram media type
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "mediatype.get"
          params:
            filter:
              name: "Telegram"
          auth: "{{ auth }}"
          id: 3
      register: mediatype

    # Get Admin user
    - name: Get Admin user
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.get"
          params:
            filter:
              username: "Admin"
          auth: "{{ auth }}"
          id: 4
      register: admin_user

    # Create Action
    - name: Check if action exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "action.get"
          params:
            filter:
              name: "MikroTik Alerts to Telegram"
          auth: "{{ auth }}"
          id: 5
      register: action_check

    - name: Create action for Telegram
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "action.create"
          params:
            name: "MikroTik Alerts to Telegram"
            eventsource: 0
            status: 0
            esc_period: "30m"
            filter:
              evaltype: 0
              conditions:
                - conditiontype: 1
                  operator: 0
                  value: "{{ hostgroup_id }}"
            operations:
              - operationtype: 0
                esc_period: "0s"
                esc_step_from: 1
                esc_step_to: 0
                opmessage:
                  mediatypeid: "{{ mediatype.json.result[0].mediatypeid }}"
                  default_msg: 1
                opmessage_usr:
                  - userid: "{{ admin_user.json.result[0].userid }}"
            recovery_operations:
              - operationtype: 0
                opmessage:
                  mediatypeid: "{{ mediatype.json.result[0].mediatypeid }}"
                  default_msg: 1
                opmessage_usr:
                  - userid: "{{ admin_user.json.result[0].userid }}"
          auth: "{{ auth }}"
          id: 6
      when:
        - action_check.json.result | length == 0
        - hostgroup_id is defined
        - mediatype.json.result | length > 0

    - name: Done
      ansible.builtin.debug:
        msg: "MikroTik Telegram alerts configured. Alerts will repeat every 30 min until resolved."
