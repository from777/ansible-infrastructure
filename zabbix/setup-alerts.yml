# setup-alerts.yml
# Создаёт Action для отправки алертов MikroTik в Telegram
# Удаляет старый action и создаёт заново для чистой настройки
# Запускать: после setup-telegram.yml
---
- name: Setup MikroTik alerts in Zabbix
  hosts: zabbix
  gather_facts: no
  connection: local
  vars:
    zabbix_url: "http://{{ ansible_host }}/api_jsonrpc.php"
    zabbix_user: "Admin"
    zabbix_password: "zabbix"

  tasks:
    - name: Login to Zabbix API
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 1
      register: zabbix_auth

    - name: Set auth token
      ansible.builtin.set_fact:
        auth: "{{ zabbix_auth.json.result }}"

    # Удалить существующий action
    - name: Get existing action
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "action.get"
          params:
            filter:
              name: "MikroTik Alerts to Telegram"
          auth: "{{ auth }}"
          id: 2
      register: existing_action

    - name: Delete existing action
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "action.delete"
          params:
            - "{{ existing_action.json.result[0].actionid }}"
          auth: "{{ auth }}"
          id: 3
      when: existing_action.json.result | length > 0
      ignore_errors: yes

    # Получить необходимые ID
    - name: Get MikroTik host group
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "hostgroup.get"
          params:
            filter:
              name: "MikroTik"
          auth: "{{ auth }}"
          id: 4
      register: hostgroup

    - name: FAIL if host group not found
      ansible.builtin.fail:
        msg: "Host group 'MikroTik' not found! Run setup-mikrotik-hosts.yml first."
      when: hostgroup.json.result | length == 0

    - name: Get Telegram media type
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "mediatype.get"
          params:
            filter:
              name: "Telegram"
          auth: "{{ auth }}"
          id: 5
      register: mediatype

    - name: FAIL if Telegram not configured
      ansible.builtin.fail:
        msg: "Telegram media type not found! Run setup-telegram.yml first."
      when: mediatype.json.result | length == 0

    - name: Get Admin user
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.get"
          params:
            filter:
              username: "Admin"
          auth: "{{ auth }}"
          id: 6
      register: admin_user

    # Создать action
    - name: Create action for Telegram
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "action.create"
          params:
            name: "MikroTik Alerts to Telegram"
            eventsource: 0
            status: 0
            esc_period: "30m"
            filter:
              evaltype: 0
              conditions:
                - conditiontype: 0
                  operator: 0
                  value: "{{ hostgroup.json.result[0].groupid }}"
            operations:
              - operationtype: 0
                esc_period: "0s"
                esc_step_from: 1
                esc_step_to: 0
                opmessage:
                  mediatypeid: "{{ mediatype.json.result[0].mediatypeid }}"
                  default_msg: 1
                opmessage_usr:
                  - userid: "{{ admin_user.json.result[0].userid }}"
            recovery_operations:
              - operationtype: 0
                opmessage:
                  mediatypeid: "{{ mediatype.json.result[0].mediatypeid }}"
                  default_msg: 1
                opmessage_usr:
                  - userid: "{{ admin_user.json.result[0].userid }}"
          auth: "{{ auth }}"
          id: 7
      register: action_created

    - name: Done
      ansible.builtin.debug:
        msg:
          - "Action created: {{ action_created.json.result.actionids[0] }}"
          - "При проблеме: сообщение сразу + повтор каждые 30 мин"
          - "При решении: одно сообщение Resolved"
