# debug-host-group.yml - проверяет в какой группе хост
---
- name: Debug host group membership
  hosts: zabbix
  gather_facts: no
  connection: local
  vars:
    zabbix_url: "http://{{ ansible_host }}/api_jsonrpc.php"
    zabbix_user: "Admin"
    zabbix_password: "zabbix"

  tasks:
    - name: Login to Zabbix API
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 1
      register: zabbix_auth

    - name: Set auth token
      ansible.builtin.set_fact:
        auth: "{{ zabbix_auth.json.result }}"

    # Check host Mik_Tim groups
    - name: Get host Mik_Tim with groups
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "host.get"
          params:
            filter:
              host: "Mik_Tim"
            selectGroups: ["groupid", "name"]
          auth: "{{ auth }}"
          id: 2
      register: host_info

    - name: Show host groups
      ansible.builtin.debug:
        msg:
          - "=== HOST Mik_Tim ==="
          - "hostid: {{ host_info.json.result[0].hostid | default('NOT FOUND') }}"
          - "groups: {{ host_info.json.result[0].groups | default('NO GROUPS') }}"

    # Check action with recovery ops
    - name: Get action with all details
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "action.get"
          params:
            filter:
              name: "MikroTik Alerts to Telegram"
            selectOperations: "extend"
            selectRecoveryOperations: "extend"
            selectFilter: "extend"
          auth: "{{ auth }}"
          id: 3
      register: action_info

    - name: Show action details
      ansible.builtin.debug:
        msg:
          - "=== ACTION ==="
          - "{{ action_info.json.result }}"

    # Check current problems
    - name: Get problems
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "problem.get"
          params:
            recent: true
          auth: "{{ auth }}"
          id: 4
      register: problems

    - name: Show problems
      ansible.builtin.debug:
        msg:
          - "=== PROBLEMS ==="
          - "{{ problems.json.result }}"

    # Check alert history
    - name: Get recent alerts
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "alert.get"
          params:
            output: "extend"
            sortfield: "alertid"
            sortorder: "DESC"
            limit: 10
          auth: "{{ auth }}"
          id: 5
      register: alerts

    - name: Show alerts
      ansible.builtin.debug:
        msg:
          - "=== RECENT ALERTS ==="
          - "{{ alerts.json.result }}"
