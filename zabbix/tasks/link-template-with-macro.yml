# tasks/link-template-with-macro.yml
# Привязывает template к хосту и устанавливает host macro
# Требуемые переменные:
#   - host_name: имя хоста
#   - target_template_id: ID шаблона
#   - macro_name: имя макроса (например {$ALLOWED_USERS})
#   - macro_value: значение макроса
---
- name: "Get host {{ host_name }}"
  ansible.builtin.uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "host.get"
      params:
        filter:
          host: "{{ host_name }}"
        selectParentTemplates: ["templateid"]
        selectMacros: ["hostmacroid", "macro", "value"]
      auth: "{{ auth }}"
      id: 20
  register: host_info

- name: Set host facts
  ansible.builtin.set_fact:
    current_host_id: "{{ host_info.json.result[0].hostid }}"
    current_templates: "{{ host_info.json.result[0].parentTemplates | map(attribute='templateid') | list }}"
    current_macros: "{{ host_info.json.result[0].macros | default([]) }}"
  when: host_info.json.result | length > 0

- name: "Link template to {{ host_name }}"
  ansible.builtin.uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "host.update"
      params:
        hostid: "{{ current_host_id }}"
        templates: "{{ (current_templates + [target_template_id]) | unique | map('community.general.dict_kv', 'templateid') | list }}"
      auth: "{{ auth }}"
      id: 21
  when:
    - host_info.json.result | length > 0
    - target_template_id not in current_templates

# Check if macro already exists on host
- name: Find existing macro
  ansible.builtin.set_fact:
    existing_macro: "{{ current_macros | selectattr('macro', 'equalto', macro_name) | list | first | default(None) }}"
  when: host_info.json.result | length > 0

# Create or update host macro
- name: "Create macro {{ macro_name }} on {{ host_name }}"
  ansible.builtin.uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "usermacro.create"
      params:
        hostid: "{{ current_host_id }}"
        macro: "{{ macro_name }}"
        value: "{{ macro_value }}"
        description: "Allowed users from inventory"
      auth: "{{ auth }}"
      id: 22
  when:
    - host_info.json.result | length > 0
    - existing_macro is none or existing_macro == None

- name: "Update macro {{ macro_name }} on {{ host_name }}"
  ansible.builtin.uri:
    url: "{{ zabbix_url }}"
    method: POST
    body_format: json
    body:
      jsonrpc: "2.0"
      method: "usermacro.update"
      params:
        hostmacroid: "{{ existing_macro.hostmacroid }}"
        value: "{{ macro_value }}"
      auth: "{{ auth }}"
      id: 23
  when:
    - host_info.json.result | length > 0
    - existing_macro is not none and existing_macro != None
    - existing_macro.value != macro_value
