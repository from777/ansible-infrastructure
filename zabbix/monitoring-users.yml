# monitoring-users.yml
# Создаёт template для мониторинга новых пользователей на MikroTik
# Триггер срабатывает если появился пользователь с group=full кроме известных
# Запускать: после setup-mikrotik-hosts.yml
---
- name: Collect hosts for Users monitoring
  hosts: mikrotik
  gather_facts: no
  tasks:
    - name: Add to Users monitoring list (monitor_users=true)
      ansible.builtin.set_fact:
        users_hosts_to_link: "{{ users_hosts_to_link | default([]) + [inventory_hostname] }}"
      delegate_to: localhost
      when: monitor_users | default(false)

    - name: Add to Users unlink list (monitor_users=false)
      ansible.builtin.set_fact:
        users_hosts_to_unlink: "{{ users_hosts_to_unlink | default([]) + [inventory_hostname] }}"
      delegate_to: localhost
      when: not (monitor_users | default(false))

- name: Setup Users monitoring in Zabbix
  hosts: zabbix
  gather_facts: no
  connection: local
  vars:
    zabbix_url: "http://{{ ansible_host }}/api_jsonrpc.php"
    zabbix_user: "Admin"
    zabbix_password: "zabbix"
    template_name: "Template MikroTik Users"
    # Известные пользователи (не триггерить на них)
    known_users: "admin|ansible"

  tasks:
    - name: Login to Zabbix API
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 1
      register: zabbix_auth

    - name: Set auth token
      ansible.builtin.set_fact:
        auth: "{{ zabbix_auth.json.result }}"

    # Get template group (Zabbix 7.0+ separates host groups and template groups)
    - name: Get Templates template group
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "templategroup.get"
          params:
            filter:
              name: "Templates"
          auth: "{{ auth }}"
          id: 2
      register: templategroup

    - name: Set template group ID
      ansible.builtin.set_fact:
        templategroup_id: "{{ templategroup.json.result[0].groupid }}"
      when: templategroup.json.result | length > 0

    - name: FAIL if template group not found
      ansible.builtin.fail:
        msg: "Template group 'Templates' not found in Zabbix!"
      when: templategroup_id is not defined

    # Create Template
    - name: Check if template exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.get"
          params:
            filter:
              host: "{{ template_name }}"
          auth: "{{ auth }}"
          id: 3
      register: template_check

    - name: Create template
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.create"
          params:
            host: "{{ template_name }}"
            name: "{{ template_name }}"
            groups:
              - groupid: "{{ templategroup_id }}"
          auth: "{{ auth }}"
          id: 4
      when: template_check.json.result | length == 0
      register: template_created

    # Re-query template to get ID (works for both new and existing)
    - name: Get template ID
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.get"
          params:
            filter:
              host: "{{ template_name }}"
          auth: "{{ auth }}"
          id: 5
      register: template_final

    - name: Set template ID
      ansible.builtin.set_fact:
        template_id: "{{ template_final.json.result[0].templateid }}"

    # Create Item - get users list
    - name: Check if item exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "item.get"
          params:
            templateids: "{{ template_id }}"
            filter:
              key_: "ssh.run[users_check]"
          auth: "{{ auth }}"
          id: 5
      register: item_check

    - name: Create SSH item for Users check
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "item.create"
          params:
            name: "Users with full access"
            key_: "ssh.run[users_check]"
            hostid: "{{ template_id }}"
            type: 13
            value_type: 4
            params: "/user print where group=full"
            username: "{$MIKROTIK_USER}"
            password: "{$MIKROTIK_PASS}"
            delay: "15m"
            authtype: 0
          auth: "{{ auth }}"
          id: 6
      when: item_check.json.result | length == 0

    # Create Item - users count
    - name: Check if count item exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "item.get"
          params:
            templateids: "{{ template_id }}"
            filter:
              key_: "ssh.run[users_count]"
          auth: "{{ auth }}"
          id: 7
      register: count_item_check

    - name: Create SSH item for Users count
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "item.create"
          params:
            name: "Full access users count"
            key_: "ssh.run[users_count]"
            hostid: "{{ template_id }}"
            type: 13
            value_type: 3
            params: "/user print count-only where group=full"
            username: "{$MIKROTIK_USER}"
            password: "{$MIKROTIK_PASS}"
            delay: "15m"
            authtype: 0
          auth: "{{ auth }}"
          id: 8
      when: count_item_check.json.result | length == 0

    # Create Trigger - too many users
    - name: Check if trigger exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "trigger.get"
          params:
            templateids: "{{ template_id }}"
            filter:
              description: "New full-access user on {HOST.NAME}"
          auth: "{{ auth }}"
          id: 9
      register: trigger_check

    - name: Create trigger
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "trigger.create"
          params:
            description: "New full-access user on {HOST.NAME}"
            expression: "last(/{{ template_name }}/ssh.run[users_count])>2"
            priority: 4
            manual_close: 1
          auth: "{{ auth }}"
          id: 10
      when: trigger_check.json.result | length == 0

    # Link template to hosts with monitor_users=true
    - name: Link template to hosts
      ansible.builtin.include_tasks: tasks/link-template-to-host.yml
      loop: "{{ hostvars['localhost'].users_hosts_to_link | default([]) }}"
      loop_control:
        loop_var: host_name
      vars:
        target_template_id: "{{ template_id }}"

    # Unlink template from hosts with monitor_users=false
    - name: Unlink template from hosts
      ansible.builtin.include_tasks: tasks/unlink-template-from-host.yml
      loop: "{{ hostvars['localhost'].users_hosts_to_unlink | default([]) }}"
      loop_control:
        loop_var: host_name
      vars:
        target_template_id: "{{ template_id }}"

    - name: Done
      ansible.builtin.debug:
        msg:
          - "Users template LINKED to: {{ hostvars['localhost'].users_hosts_to_link | default([]) }}"
          - "Users template UNLINKED from: {{ hostvars['localhost'].users_hosts_to_unlink | default([]) }}"
