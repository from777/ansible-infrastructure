вон # backup.yml
---
- name: Backup Zabbix PostgreSQL database
  hosts: all
  become: yes

  vars:
    backup_dir: /var/backups/zabbix
    backup_retention_days: 7
    db_name: zabbix

  tasks:
    - name: Create backup directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        owner: postgres
        group: postgres
        mode: "0750"

    - name: Create database backup
      become_user: postgres
      shell: |
        pg_dump {{ db_name }} | gzip > {{ backup_dir }}/zabbix_$(date +%Y%m%d_%H%M%S).sql.gz
      args:
        executable: /bin/bash

    - name: Remove old backups
      shell: |
        find {{ backup_dir }} -name "*.sql.gz" -mtime +{{ backup_retention_days }} -delete
      args:
        executable: /bin/bash

    - name: List current backups
      find:
        paths: "{{ backup_dir }}"
        patterns: "*.sql.gz"
      register: backup_files

    - name: Show backup info
      debug:
        msg: "Backups: {{ backup_files.files | map(attribute='path') | list }}"
