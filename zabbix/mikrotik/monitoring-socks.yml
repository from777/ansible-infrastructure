# monitoring-socks.yml
# Создаёт template для мониторинга SOCKS и привязывает/отлинковывает к хостам
# Запускать: после setup-mikrotik-hosts.yml
---
- name: Setup SOCKS monitoring in Zabbix
  hosts: zabbix
  gather_facts: no
  connection: local
  vars:
    zabbix_url: "http://{{ ansible_host }}/api_jsonrpc.php"
    # zabbix_user и zabbix_password берутся из inventory.yml
    template_name: "Template MikroTik SOCKS"

  tasks:
    - name: Login to Zabbix API
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 1
      register: zabbix_auth

    - name: Set auth token
      ansible.builtin.set_fact:
        auth: "{{ zabbix_auth.json.result }}"

    # Build hosts lists from inventory
    - name: Build hosts to LINK (monitor_socks=true)
      ansible.builtin.set_fact:
        socks_hosts_to_link: "{{ socks_hosts_to_link | default([]) + [item] }}"
      loop: "{{ groups['mikrotik'] }}"
      when: hostvars[item].monitor_socks | default(false)

    - name: Build hosts to UNLINK (monitor_socks=false)
      ansible.builtin.set_fact:
        socks_hosts_to_unlink: "{{ socks_hosts_to_unlink | default([]) + [item] }}"
      loop: "{{ groups['mikrotik'] }}"
      when: not (hostvars[item].monitor_socks | default(false))

    - name: Show hosts to link/unlink
      ansible.builtin.debug:
        msg:
          - "Hosts to LINK: {{ socks_hosts_to_link | default([]) }}"
          - "Hosts to UNLINK: {{ socks_hosts_to_unlink | default([]) }}"

    # Get or create template group (Zabbix 7.0+ separates host groups and template groups)
    - name: Get Templates template group
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "templategroup.get"
          params:
            filter:
              name: "Templates"
          auth: "{{ auth }}"
          id: 2
      register: templategroup

    - name: DEBUG - templategroup response
      ansible.builtin.debug:
        var: templategroup.json

    - name: Set template group ID
      ansible.builtin.set_fact:
        templategroup_id: "{{ templategroup.json.result[0].groupid }}"
      when: templategroup.json.result | length > 0

    - name: FAIL if template group not found
      ansible.builtin.fail:
        msg: "Template group 'Templates' not found in Zabbix!"
      when: templategroup_id is not defined

    # Create Template
    - name: Check if template exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.get"
          params:
            filter:
              host: "{{ template_name }}"
          auth: "{{ auth }}"
          id: 3
      register: template_check

    - name: DEBUG - template_check response
      ansible.builtin.debug:
        var: template_check.json

    - name: Create template
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.create"
          params:
            host: "{{ template_name }}"
            name: "{{ template_name }}"
            groups:
              - groupid: "{{ templategroup_id }}"
          auth: "{{ auth }}"
          id: 4
      when: template_check.json.result | length == 0
      register: template_created

    - name: DEBUG - template_created response
      ansible.builtin.debug:
        var: template_created.json
      when: template_created is not skipped

    # Re-query template to get ID (works for both new and existing)
    - name: Get template ID
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.get"
          params:
            filter:
              host: "{{ template_name }}"
          auth: "{{ auth }}"
          id: 5
      register: template_final

    - name: DEBUG - template_final response
      ansible.builtin.debug:
        var: template_final.json

    - name: Set template ID
      ansible.builtin.set_fact:
        template_id: "{{ template_final.json.result[0].templateid }}"

    # Create Item
    - name: Check if item exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "item.get"
          params:
            templateids: "{{ template_id }}"
            filter:
              key_: "ssh.run[socks_check]"
          auth: "{{ auth }}"
          id: 5
      register: item_check

    - name: Create SSH item for SOCKS check
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "item.create"
          params:
            name: "SOCKS Proxy Status"
            key_: "ssh.run[socks_check]"
            hostid: "{{ template_id }}"
            type: 13
            value_type: 4
            params: "/ip socks print"
            username: "{$MIKROTIK_USER}"
            password: "{$MIKROTIK_PASS}"
            delay: "5m"
            authtype: 0
          auth: "{{ auth }}"
          id: 6
      when: item_check.json.result | length == 0

    # Delete and recreate Trigger (idempotent)
    - name: Get existing trigger
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "trigger.get"
          params:
            templateids: "{{ template_id }}"
            search:
              description: "SOCKS proxy"
          auth: "{{ auth }}"
          id: 7
      register: trigger_check

    - name: Delete existing trigger
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "trigger.delete"
          params:
            - "{{ trigger_check.json.result[0].triggerid }}"
          auth: "{{ auth }}"
          id: 8
      when: trigger_check.json.result | length > 0
      ignore_errors: yes

    - name: Create trigger
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "trigger.create"
          params:
            description: "SOCKS proxy enabled"
            expression: "find(/{{ template_name }}/ssh.run[socks_check],#1,\"like\",\"enabled: yes\")=1"
            priority: 4
            manual_close: 1
          auth: "{{ auth }}"
          id: 9

    # Link template to hosts with monitor_socks=true
    - name: Link template to hosts
      ansible.builtin.include_tasks: ../_tasks/link-template-to-host.yml
      loop: "{{ socks_hosts_to_link | default([]) }}"
      loop_control:
        loop_var: host_name
      vars:
        target_template_id: "{{ template_id }}"

    # Unlink template from hosts with monitor_socks=false
    - name: Unlink template from hosts
      ansible.builtin.include_tasks: ../_tasks/unlink-template-from-host.yml
      loop: "{{ socks_hosts_to_unlink | default([]) }}"
      loop_control:
        loop_var: host_name
      vars:
        target_template_id: "{{ template_id }}"

    - name: Done
      ansible.builtin.debug:
        msg:
          - "SOCKS template LINKED to: {{ socks_hosts_to_link | default([]) }}"
          - "SOCKS template UNLINKED from: {{ socks_hosts_to_unlink | default([]) }}"
