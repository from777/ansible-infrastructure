# monitoring-users.yml
# Мониторинг пользователей с full-доступом на MikroTik
# Триггер срабатывает если появился пользователь НЕ из списка allowed_users
# Список allowed_users задаётся в inventory.yml для каждого хоста
# Запускать: после setup-mikrotik-hosts.yml
---
- name: Setup Users monitoring in Zabbix
  hosts: zabbix
  gather_facts: no
  connection: local
  vars:
    zabbix_url: "http://{{ ansible_host }}/api_jsonrpc.php"
    zabbix_user: "Admin"
    zabbix_password: "zabbix"
    template_name: "Template MikroTik Users"

  tasks:
    - name: Login to Zabbix API
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 1
      register: zabbix_auth

    - name: Set auth token
      ansible.builtin.set_fact:
        auth: "{{ zabbix_auth.json.result }}"

    # Build hosts lists from inventory
    - name: Build hosts to LINK (monitor_users=true)
      ansible.builtin.set_fact:
        users_hosts_to_link: "{{ users_hosts_to_link | default([]) + [item] }}"
      loop: "{{ groups['mikrotik'] }}"
      when: hostvars[item].monitor_users | default(false)

    - name: Build hosts to UNLINK (monitor_users=false)
      ansible.builtin.set_fact:
        users_hosts_to_unlink: "{{ users_hosts_to_unlink | default([]) + [item] }}"
      loop: "{{ groups['mikrotik'] }}"
      when: not (hostvars[item].monitor_users | default(false))

    - name: Show hosts to link/unlink
      ansible.builtin.debug:
        msg:
          - "Hosts to LINK: {{ users_hosts_to_link | default([]) }}"
          - "Hosts to UNLINK: {{ users_hosts_to_unlink | default([]) }}"

    # Get template group (Zabbix 7.0+ separates host groups and template groups)
    - name: Get Templates template group
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "templategroup.get"
          params:
            filter:
              name: "Templates"
          auth: "{{ auth }}"
          id: 2
      register: templategroup

    - name: Set template group ID
      ansible.builtin.set_fact:
        templategroup_id: "{{ templategroup.json.result[0].groupid }}"
      when: templategroup.json.result | length > 0

    - name: FAIL if template group not found
      ansible.builtin.fail:
        msg: "Template group 'Templates' not found in Zabbix!"
      when: templategroup_id is not defined

    # Delete existing template (idempotent - recreate with new settings)
    - name: Check if template exists
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.get"
          params:
            filter:
              host: "{{ template_name }}"
          auth: "{{ auth }}"
          id: 3
      register: template_check

    - name: Delete existing template (for clean recreation)
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.delete"
          params:
            - "{{ template_check.json.result[0].templateid }}"
          auth: "{{ auth }}"
          id: 4
      when: template_check.json.result | length > 0
      ignore_errors: yes

    # Create Template with macro
    - name: Create template
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "template.create"
          params:
            host: "{{ template_name }}"
            name: "{{ template_name }}"
            groups:
              - groupid: "{{ templategroup_id }}"
            macros:
              - macro: "{$ALLOWED_USERS}"
                value: "admin"
                description: "Разрешённые пользователи с full-доступом (через |)"
          auth: "{{ auth }}"
          id: 5
      register: template_created

    - name: Set template ID
      ansible.builtin.set_fact:
        template_id: "{{ template_created.json.result.templateids[0] }}"

    # Create Item - get users list with JavaScript preprocessing
    - name: Create SSH item for Users check
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "item.create"
          params:
            name: "Unknown full-access users"
            key_: "ssh.run[users_check]"
            hostid: "{{ template_id }}"
            type: 13  # SSH agent
            value_type: 4  # Text
            params: "/user print where group=full"
            username: "{$MIKROTIK_USER}"
            privatekey: "{$SSH_PRIVKEY}"
            delay: "15m"
            authtype: 1
            preprocessing:
              - type: "21"  # JavaScript
                params: |
                  var lines = value.split('\n');
                  var users = [];
                  for (var i = 0; i < lines.length; i++) {
                      var line = lines[i].trim();
                      if (/^\d+\s+/.test(line)) {
                          var parts = line.split(/\s+/);
                          if (parts.length >= 2) {
                              users.push(parts[1]);
                          }
                      }
                  }
                  var allowed = '{$ALLOWED_USERS}'.split('|');
                  var unknown = [];
                  for (var j = 0; j < users.length; j++) {
                      if (allowed.indexOf(users[j]) === -1) {
                          unknown.push(users[j]);
                      }
                  }
                  return unknown.length > 0 ? unknown.join(', ') : 'OK';
                error_handler: "1"
          auth: "{{ auth }}"
          id: 6

    # Create Trigger
    - name: Create trigger
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "trigger.create"
          params:
            description: "Unknown full-access user detected on {HOST.NAME}"
            expression: "last(/{{ template_name }}/ssh.run[users_check])<>\"OK\""
            priority: 4  # High
            manual_close: 1
            comments: "Обнаружен пользователь с full-доступом не из списка allowed_users. Текущие неизвестные: {ITEM.LASTVALUE}"
          auth: "{{ auth }}"
          id: 7

    # Link template to hosts and set host macros
    - name: Link template and set allowed_users macro
      ansible.builtin.include_tasks: ../tasks/link-template-with-macro.yml
      loop: "{{ users_hosts_to_link | default([]) }}"
      loop_control:
        loop_var: host_name
      vars:
        target_template_id: "{{ template_id }}"
        macro_name: "{$ALLOWED_USERS}"
        macro_value: "{{ hostvars[host_name].allowed_users | default(['admin']) | join('|') }}"

    # Unlink template from hosts with monitor_users=false
    - name: Unlink template from hosts
      ansible.builtin.include_tasks: ../tasks/unlink-template-from-host.yml
      loop: "{{ users_hosts_to_unlink | default([]) }}"
      loop_control:
        loop_var: host_name
      vars:
        target_template_id: "{{ template_id }}"

    - name: Done
      ansible.builtin.debug:
        msg:
          - "Template recreated with JavaScript preprocessing"
          - "Users template LINKED to: {{ users_hosts_to_link | default([]) }}"
          - "Users template UNLINKED from: {{ users_hosts_to_unlink | default([]) }}"
          - "Each host has its own {$ALLOWED_USERS} macro from inventory"
