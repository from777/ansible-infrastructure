# setup-telegram.yml
# Настройка Telegram в Zabbix + тестовое сообщение
# Удаляет существующий media type и создаёт новый (идемпотентность)
---
- name: Setup Telegram integration in Zabbix
  hosts: zabbix
  gather_facts: no
  connection: local
  vars:
    zabbix_url: "http://{{ ansible_host }}/api_jsonrpc.php"
    zabbix_user: "Admin"
    zabbix_password: "zabbix"

  tasks:
    - name: Login to Zabbix API
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.login"
          params:
            username: "{{ zabbix_user }}"
            password: "{{ zabbix_password }}"
          id: 1
      register: zabbix_auth

    - name: DEBUG - login response
      ansible.builtin.debug:
        var: zabbix_auth.json

    - name: Set auth token
      ansible.builtin.set_fact:
        auth: "{{ zabbix_auth.json.result }}"

    # Найти существующий Telegram media type
    - name: Get existing Telegram media type
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "mediatype.get"
          params:
            filter:
              name: "Telegram"
            selectMessageTemplates: "extend"
          auth: "{{ auth }}"
          id: 2
      register: existing_mediatype

    - name: DEBUG - existing mediatype
      ansible.builtin.debug:
        var: existing_mediatype.json

    - name: DEBUG - mediatype ID to delete
      ansible.builtin.debug:
        msg: "Will delete mediatype ID: {{ existing_mediatype.json.result[0].mediatypeid }}"
      when: existing_mediatype.json.result | length > 0

    # Удалить существующий media type (идемпотентность)
    - name: Delete existing Telegram media type
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "mediatype.delete"
          params:
            - "{{ existing_mediatype.json.result[0].mediatypeid }}"
          auth: "{{ auth }}"
          id: 3
      when: existing_mediatype.json.result | length > 0
      register: delete_result

    - name: DEBUG - delete response
      ansible.builtin.debug:
        var: delete_result.json
      when: delete_result is defined and delete_result is not skipped

    - name: FAIL if delete failed
      ansible.builtin.fail:
        msg: "Failed to delete media type: {{ delete_result.json.error }}"
      when: delete_result is defined and delete_result is not skipped and delete_result.json.error is defined

    # Создать Telegram media type
    - name: Create Telegram media type
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "mediatype.create"
          params:
            name: "Telegram"
            type: 4
            status: 0
            parameters:
              - name: "bot_token"
                value: "{{ tg_token }}"
              - name: "chat_id"
                value: "{ALERT.SENDTO}"
              - name: "message"
                value: "{ALERT.MESSAGE}"
              - name: "subject"
                value: "{ALERT.SUBJECT}"
            script: |
              var params = JSON.parse(value),
                  req = new HttpRequest(),
                  response;
              req.addHeader('Content-Type: application/json');
              response = req.post(
                  'https://api.telegram.org/bot' + params.bot_token + '/sendMessage',
                  JSON.stringify({
                      chat_id: params.chat_id,
                      text: params.subject + '\n' + params.message,
                      parse_mode: 'HTML'
                  })
              );
              if (req.getStatus() !== 200) {
                  throw 'Response: ' + response;
              }
              return response;
            message_templates:
              - eventsource: 0
                recovery: 0
                subject: "🚨 {EVENT.NAME}"
                message: "Host: {HOST.NAME}\nSeverity: {EVENT.SEVERITY}\nTime: {EVENT.TIME} {EVENT.DATE}"
              - eventsource: 0
                recovery: 1
                subject: "✅ {EVENT.NAME}"
                message: "Host: {HOST.NAME}\nResolved: {EVENT.RECOVERY.TIME} {EVENT.RECOVERY.DATE}"
          auth: "{{ auth }}"
          id: 4
      register: created_mediatype

    - name: DEBUG - create response
      ansible.builtin.debug:
        var: created_mediatype.json

    - name: FAIL if media type creation failed
      ansible.builtin.fail:
        msg: "Failed to create media type: {{ created_mediatype.json.error }}"
      when: created_mediatype.json.error is defined

    - name: Set media type ID
      ansible.builtin.set_fact:
        telegram_mediatypeid: "{{ created_mediatype.json.result.mediatypeids[0] }}"

    # Получить Admin user
    - name: Get Admin user
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.get"
          params:
            filter:
              username: "Admin"
            selectMedias: "extend"
          auth: "{{ auth }}"
          id: 5
      register: admin_user

    - name: DEBUG - admin user
      ansible.builtin.debug:
        var: admin_user.json

    - name: Update Admin user with Telegram media
      ansible.builtin.uri:
        url: "{{ zabbix_url }}"
        method: POST
        body_format: json
        body:
          jsonrpc: "2.0"
          method: "user.update"
          params:
            userid: "{{ admin_user.json.result[0].userid }}"
            medias:
              - mediatypeid: "{{ telegram_mediatypeid }}"
                sendto: "{{ tg_chat_id }}"
                active: 0
                severity: 63
                period: "1-7,00:00-24:00"
          auth: "{{ auth }}"
          id: 6
      register: user_update

    - name: DEBUG - user update response
      ansible.builtin.debug:
        var: user_update.json

    # Тестовое сообщение
    - name: Send test message via Telegram
      ansible.builtin.uri:
        url: "https://api.telegram.org/bot{{ tg_token }}/sendMessage"
        method: POST
        body_format: json
        body:
          chat_id: "{{ tg_chat_id }}"
          text: "✅ Zabbix Telegram настроен!\nСервер: {{ ansible_host }}"
      register: test_msg

    - name: DEBUG - test message response
      ansible.builtin.debug:
        var: test_msg.json

    - name: Done
      ansible.builtin.debug:
        msg:
          - "Telegram media type ID: {{ telegram_mediatypeid }}"
          - "Media type ENABLED and configured"
          - "Message templates updated"
