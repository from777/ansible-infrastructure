# @file elk.yml
# @desc Установка ELK Stack (Elasticsearch + Kibana)
# @hosts elk
---
- name: Install ELK Stack
  hosts: elk
  become: yes
  vars:
    elk_version: "8.17.0"
    es_heap_size: "2g"
    kibana_encryption_key: "{{ lookup('password', '/dev/null length=32 chars=hexdigits') }}"

  tasks:
    - name: Install dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - default-jdk
        state: present
        update_cache: yes

    - name: Download Elasticsearch
      get_url:
        url: "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-{{ elk_version }}-amd64.deb"
        dest: "/tmp/elasticsearch-{{ elk_version }}-amd64.deb"
        timeout: 300

    - name: Install Elasticsearch
      apt:
        deb: "/tmp/elasticsearch-{{ elk_version }}-amd64.deb"

    - name: Clear Elasticsearch keystore
      shell: |
        /usr/share/elasticsearch/bin/elasticsearch-keystore remove xpack.security.transport.ssl.keystore.secure_password || true
        /usr/share/elasticsearch/bin/elasticsearch-keystore remove xpack.security.transport.ssl.truststore.secure_password || true
        /usr/share/elasticsearch/bin/elasticsearch-keystore remove xpack.security.http.ssl.keystore.secure_password || true
      ignore_errors: yes

    - name: Configure Elasticsearch
      copy:
        content: |
          cluster.name: elk-cluster
          node.name: elk-node-1
          path.data: /var/lib/elasticsearch
          path.logs: /var/log/elasticsearch
          network.host: 0.0.0.0
          http.port: 9200
          discovery.type: single-node
          xpack.security.enabled: false
          xpack.security.enrollment.enabled: false
          xpack.security.http.ssl.enabled: false
          xpack.security.transport.ssl.enabled: false
        dest: /etc/elasticsearch/elasticsearch.yml
      notify: Restart Elasticsearch

    - name: Configure Elasticsearch heap size
      copy:
        content: |
          -Xms{{ es_heap_size }}
          -Xmx{{ es_heap_size }}
        dest: /etc/elasticsearch/jvm.options.d/heap.options
      notify: Restart Elasticsearch

    - name: Start and enable Elasticsearch
      systemd:
        name: elasticsearch
        state: started
        enabled: yes

    - name: Wait for Elasticsearch
      wait_for:
        host: localhost
        port: 9200
        delay: 10
        timeout: 120

    - name: Download Kibana
      get_url:
        url: "https://artifacts.elastic.co/downloads/kibana/kibana-{{ elk_version }}-amd64.deb"
        dest: "/tmp/kibana-{{ elk_version }}-amd64.deb"
        timeout: 300

    - name: Install Kibana
      apt:
        deb: "/tmp/kibana-{{ elk_version }}-amd64.deb"

    - name: Configure Kibana
      copy:
        content: |
          server.port: 5601
          server.host: "0.0.0.0"
          elasticsearch.hosts: ["http://localhost:9200"]
          xpack.encryptedSavedObjects.encryptionKey: "{{ kibana_encryption_key }}"
          xpack.reporting.encryptionKey: "{{ kibana_encryption_key }}"
          xpack.security.encryptionKey: "{{ kibana_encryption_key }}"
        dest: /etc/kibana/kibana.yml
      notify: Restart Kibana

    - name: Start and enable Kibana
      systemd:
        name: kibana
        state: started
        enabled: yes

    - name: Download Logstash
      get_url:
        url: "https://artifacts.elastic.co/downloads/logstash/logstash-{{ elk_version }}-amd64.deb"
        dest: "/tmp/logstash-{{ elk_version }}-amd64.deb"
        timeout: 300

    - name: Install Logstash
      apt:
        deb: "/tmp/logstash-{{ elk_version }}-amd64.deb"

    - name: Configure Logstash pipeline
      copy:
        content: |
          input {
            syslog {
              port => 5514
              type => "syslog"
            }
            beats {
              port => 5044
            }
          }
          
          filter {
            if [type] == "syslog" {
              grok {
                match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}" }
              }
            }
          }
          
          output {
            elasticsearch {
              hosts => ["localhost:9200"]
              index => "logs-%{+YYYY.MM.dd}"
            }
          }
        dest: /etc/logstash/conf.d/main.conf
      notify: Restart Logstash

    - name: Start and enable Logstash
      systemd:
        name: logstash
        state: started
        enabled: yes

    - name: Create ILM policy for log retention
      uri:
        url: "http://localhost:9200/_ilm/policy/logs-retention"
        method: PUT
        body_format: json
        body:
          policy:
            phases:
              hot:
                min_age: "0ms"
                actions:
                  rollover:
                    max_age: "1d"
                    max_size: "5gb"
              delete:
                min_age: "30d"
                actions:
                  delete: {}
        status_code: [200, 201]
      ignore_errors: yes

    - name: Create index template with ILM
      uri:
        url: "http://localhost:9200/_index_template/logs-template"
        method: PUT
        body_format: json
        body:
          index_patterns: ["logs-*"]
          template:
            settings:
              index.lifecycle.name: "logs-retention"
          priority: 500
        status_code: [200, 201]
      ignore_errors: yes

  handlers:
    - name: Restart Elasticsearch
      systemd:
        name: elasticsearch
        state: restarted

    - name: Restart Kibana
      systemd:
        name: kibana
        state: restarted

    - name: Restart Logstash
      systemd:
        name: logstash
        state: restarted
