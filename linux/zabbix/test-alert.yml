# @file test-alert.yml
# @desc Тестирует алерты отправляя фейковое значение через zabbix_sender
# @hosts zabbix
# @vars test_host, test_item, bad_value, good_value (extra vars)
---
- name: Test Alert via zabbix_sender
  hosts: zabbix
  gather_facts: no
  # Выполняется на Zabbix сервере по SSH (там установлен zabbix_sender)
  vars:
    test_host: "192.168.0.243"
    test_item: "kaspersky.status"
    bad_value: "0"
    good_value: "266240"
    recovery_delay: 30

  tasks:
    - name: Show test parameters
      ansible.builtin.debug:
        msg:
          - "Testing alert for:"
          - "  Host: {{ test_host }}"
          - "  Item: {{ test_item }}"
          - "  Bad value (trigger): {{ bad_value }}"
          - "  Good value (recover): {{ good_value }}"
          - "  Recovery delay: {{ recovery_delay }} seconds"

    - name: Send BAD value to trigger alert
      ansible.builtin.command:
        cmd: >
          zabbix_sender
          -z localhost
          -s "{{ test_host }}"
          -k "{{ test_item }}"
          -o "{{ bad_value }}"
      register: send_bad

    - name: Show send result
      ansible.builtin.debug:
        msg: "Sent bad value: {{ send_bad.stdout }}"

    - name: Wait for alert to be sent
      ansible.builtin.debug:
        msg: "Waiting {{ recovery_delay }} seconds... Check Telegram for alert!"

    - name: Wait
      ansible.builtin.pause:
        seconds: "{{ recovery_delay }}"

    - name: Send GOOD value to recover
      ansible.builtin.command:
        cmd: >
          zabbix_sender
          -z localhost
          -s "{{ test_host }}"
          -k "{{ test_item }}"
          -o "{{ good_value }}"
      register: send_good

    - name: Show recovery result
      ansible.builtin.debug:
        msg:
          - "Sent good value: {{ send_good.stdout }}"
          - "Check Telegram for recovery notification!"
