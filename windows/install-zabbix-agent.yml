# install-zabbix-agent.yml
# Установка Zabbix Agent 2 на Windows серверы из ZIP архива
#
# Зависимости: нет
# Хосты: windows
# Переменные: zabbix_server (из inventory)
---
- name: Install Zabbix Agent 2 on Windows
  hosts: windows
  gather_facts: no
  vars:
    zabbix_version: "7.0.22"
    agent_dir: 'C:\Zabbix'
    temp_dir: 'C:\Temp'
    zip_name: "zabbix_agent2-{{ zabbix_version }}-windows-amd64-openssl-static"
    zabbix_zip_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.0/{{ zabbix_version }}/{{ zip_name }}.zip"

  tasks:
    - name: Get hostname for Zabbix
      raw: hostname
      register: win_hostname

    - name: Set clean hostname
      ansible.builtin.set_fact:
        clean_hostname: "{{ win_hostname.stdout | trim }}"

    # ========== CLEANUP ==========
    - name: Stop Zabbix Agent 2 service
      raw: 'powershell -Command "Stop-Service -Name ''Zabbix Agent 2'' -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Uninstall Zabbix Agent 2 service
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}\bin\zabbix_agent2.exe'') { Start-Process -FilePath ''{{ agent_dir }}\bin\zabbix_agent2.exe'' -ArgumentList ''--uninstall'' -Wait -NoNewWindow }"'
      ignore_errors: yes

    - name: Delete service via sc
      raw: 'sc.exe delete "Zabbix Agent 2"'
      ignore_errors: yes

    - name: Delete EventLog registry key (leftover from previous install)
      raw: 'powershell -Command "Remove-Item -Path ''HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\Application\Zabbix Agent 2'' -Recurse -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Remove old agent folder
      raw: 'powershell -Command "Remove-Item -Path ''{{ agent_dir }}'' -Recurse -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Wait after cleanup
      raw: 'powershell -Command "Start-Sleep -Seconds 2"'

    # ========== DOWNLOAD AND EXTRACT ==========
    - name: Create temp directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ temp_dir }}'' -Force | Out-Null"'

    - name: Remove old ZIP and extracted folder
      raw: 'powershell -Command "Remove-Item -Path ''{{ temp_dir }}\zabbix_agent2.zip'',''{{ temp_dir }}\zabbix_extract'' -Recurse -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Download Zabbix Agent 2 ZIP
      raw: 'powershell -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri ''{{ zabbix_zip_url }}'' -OutFile ''{{ temp_dir }}\zabbix_agent2.zip'' -UseBasicParsing"'

    - name: Create extract directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ temp_dir }}\zabbix_extract'' -Force | Out-Null"'

    - name: Extract ZIP
      raw: 'powershell -Command "Expand-Archive -Path ''{{ temp_dir }}\zabbix_agent2.zip'' -DestinationPath ''{{ temp_dir }}\zabbix_extract'' -Force"'

    - name: List extracted contents (debug)
      raw: 'powershell -Command "Get-ChildItem -Path ''{{ temp_dir }}\zabbix_extract'' -Recurse | Select-Object FullName"'
      register: extracted_contents

    - name: Show extracted contents
      ansible.builtin.debug:
        msg: "{{ extracted_contents.stdout }}"

    - name: Find zabbix_agent2.exe location
      raw: 'powershell -Command "(Get-ChildItem -Path ''{{ temp_dir }}\zabbix_extract'' -Recurse -Filter ''zabbix_agent2.exe'' | Select-Object -First 1).FullName"'
      register: exe_location

    - name: Show exe location
      ansible.builtin.debug:
        msg: "Found exe at: {{ exe_location.stdout | trim }}"

    - name: Fail if exe not found in ZIP
      ansible.builtin.fail:
        msg: "zabbix_agent2.exe not found in extracted ZIP!"
      when: exe_location.stdout | trim == ""

    # ========== INSTALL ==========
    - name: Create agent directories
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ agent_dir }}\bin'',''{{ agent_dir }}\conf\zabbix_agent2.d\plugins.d'' -Force | Out-Null"'

    - name: Copy zabbix_agent2.exe from found location
      raw: 'powershell -Command "Copy-Item -Path ''{{ exe_location.stdout | trim }}'' -Destination ''{{ agent_dir }}\bin\'' -Force"'

    - name: Verify exe copied
      raw: 'powershell -Command "Test-Path ''{{ agent_dir }}\bin\zabbix_agent2.exe''"'
      register: exe_check

    - name: Fail if exe not copied
      ansible.builtin.fail:
        msg: "Failed to copy zabbix_agent2.exe"
      when: "'False' in exe_check.stdout"

    # ========== CONFIG ==========
    - name: Create zabbix_agent2.conf
      raw: 'powershell -Command "Set-Content -Path ''{{ agent_dir }}\conf\zabbix_agent2.conf'' -Value ''LogFile={{ agent_dir }}\zabbix_agent2.log`r`nLogFileSize=10`r`nServer={{ zabbix_server }}`r`nServerActive={{ zabbix_server }}`r`nHostname={{ clean_hostname }}`r`nControlSocket=\\.\pipe\agent.sock`r`nInclude={{ agent_dir }}\conf\zabbix_agent2.d\*.conf'' -Encoding ASCII"'

    - name: Show config
      raw: 'powershell -Command "Get-Content ''{{ agent_dir }}\conf\zabbix_agent2.conf''"'
      register: conf_content

    - name: Debug config
      ansible.builtin.debug:
        msg: "{{ conf_content.stdout }}"

    # ========== SERVICE ==========
    - name: Install Zabbix Agent 2 as Windows service
      raw: 'powershell -Command "& ''{{ agent_dir }}\bin\zabbix_agent2.exe'' --config ''{{ agent_dir }}\conf\zabbix_agent2.conf'' --install 2>&1"'
      register: install_service

    - name: Debug service install
      ansible.builtin.debug:
        msg: "{{ install_service.stdout | default('') }} {{ install_service.stderr | default('') }}"

    - name: Start Zabbix Agent 2 service
      raw: 'powershell -Command "Start-Service -Name ''Zabbix Agent 2''"'
      register: start_service
      ignore_errors: yes

    - name: Wait for service
      raw: 'powershell -Command "Start-Sleep -Seconds 3"'

    # ========== VERIFY ==========
    - name: Get service status
      raw: 'powershell -Command "Get-Service -Name ''Zabbix Agent 2'' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Status"'
      register: final_status
      ignore_errors: yes

    - name: Get agent log
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}\zabbix_agent2.log'') { Get-Content ''{{ agent_dir }}\zabbix_agent2.log'' -Tail 5 } else { ''no log'' }"'
      register: agent_log
      ignore_errors: yes

    - name: Show result
      ansible.builtin.debug:
        msg:
          - "=== {{ inventory_hostname }} ({{ clean_hostname }}) ==="
          - "Service Status: {{ final_status.stdout | default('NOT FOUND') | trim }}"
          - "Agent log: {{ agent_log.stdout | default('no log') | trim }}"

    # ========== CLEANUP ==========
    - name: Cleanup temp files
      raw: 'powershell -Command "Remove-Item -Path ''{{ temp_dir }}\zabbix_agent2.zip'',''{{ temp_dir }}\zabbix_extract'' -Recurse -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes
