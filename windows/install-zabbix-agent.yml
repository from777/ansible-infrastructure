# install-zabbix-agent.yml
# Установка Zabbix Agent 2 на Windows серверы из ZIP архива
#
# Зависимости: нет
# Хосты: windows
# Переменные: zabbix_server (из inventory)
---
- name: Install Zabbix Agent 2 on Windows
  hosts: windows
  gather_facts: no
  vars:
    zabbix_version: "7.0.22"
    agent_dir: 'C:\Zabbix'
    temp_dir: 'C:\Temp'
    zip_name: "zabbix_agent2-{{ zabbix_version }}-windows-amd64-openssl-static"
    zabbix_zip_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.0/{{ zabbix_version }}/{{ zip_name }}.zip"

  tasks:
    - name: Get hostname for Zabbix
      raw: hostname
      register: win_hostname

    - name: Set clean hostname
      ansible.builtin.set_fact:
        clean_hostname: "{{ win_hostname.stdout | trim }}"

    - name: DEBUG - Show hostname
      ansible.builtin.debug:
        msg: "Hostname: {{ clean_hostname }}"

    # ========== CLEANUP ==========
    - name: Stop Zabbix Agent 2 service
      raw: 'powershell -Command "Stop-Service -Name ''Zabbix Agent 2'' -Force -ErrorAction SilentlyContinue; Write-Host ''Stop service result:'' $?"'
      register: stop_result
      ignore_errors: yes

    - name: DEBUG - Stop service result
      ansible.builtin.debug:
        msg: "{{ stop_result.stdout | default('no output') }}"

    - name: Uninstall Zabbix Agent 2 service via exe
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}\bin\zabbix_agent2.exe'') { & ''{{ agent_dir }}\bin\zabbix_agent2.exe'' --config ''{{ agent_dir }}\conf\zabbix_agent2.conf'' --uninstall 2>&1 } else { Write-Host ''exe not found, skip uninstall'' }"'
      register: uninstall_result
      ignore_errors: yes

    - name: DEBUG - Uninstall result
      ansible.builtin.debug:
        msg: "{{ uninstall_result.stdout | default('no output') }} {{ uninstall_result.stderr | default('') }}"

    - name: Delete service via sc
      raw: 'sc.exe delete "Zabbix Agent 2" 2>&1'
      register: sc_result
      ignore_errors: yes

    - name: DEBUG - sc delete result
      ansible.builtin.debug:
        msg: "{{ sc_result.stdout | default('no output') }}"

    - name: Delete EventLog registry key
      raw: 'reg delete "HKLM\SYSTEM\CurrentControlSet\Services\EventLog\Application\Zabbix Agent 2" /f 2>&1'
      register: reg_result
      ignore_errors: yes

    - name: DEBUG - Registry delete result
      ansible.builtin.debug:
        msg: "{{ reg_result.stdout | default('no output') }}"

    - name: Check if registry key still exists
      raw: 'powershell -Command "Test-Path ''HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\Application\Zabbix Agent 2''"'
      register: reg_check

    - name: DEBUG - Registry key exists check
      ansible.builtin.debug:
        msg: "Registry key exists: {{ reg_check.stdout | trim }}"

    - name: Remove old agent folder
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}'') { Remove-Item -Path ''{{ agent_dir }}'' -Recurse -Force; Write-Host ''Deleted {{ agent_dir }}'' } else { Write-Host ''Folder not found'' }"'
      register: folder_result
      ignore_errors: yes

    - name: DEBUG - Folder delete result
      ansible.builtin.debug:
        msg: "{{ folder_result.stdout | default('no output') }}"

    - name: Wait after cleanup
      raw: 'powershell -Command "Start-Sleep -Seconds 2; Write-Host ''Waited 2 seconds''"'

    # ========== DOWNLOAD AND EXTRACT ==========
    - name: Create temp directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ temp_dir }}'' -Force | Out-Null; Write-Host ''Created {{ temp_dir }}''"'

    - name: Remove old ZIP and extracted folder
      raw: 'powershell -Command "Remove-Item -Path ''{{ temp_dir }}\zabbix_agent2.zip'',''{{ temp_dir }}\zabbix_extract'' -Recurse -Force -ErrorAction SilentlyContinue; Write-Host ''Cleaned temp files''"'
      ignore_errors: yes

    - name: Download Zabbix Agent 2 ZIP
      raw: 'powershell -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri ''{{ zabbix_zip_url }}'' -OutFile ''{{ temp_dir }}\zabbix_agent2.zip'' -UseBasicParsing; Write-Host ''Downloaded ZIP, size:'' (Get-Item ''{{ temp_dir }}\zabbix_agent2.zip'').Length ''bytes''"'
      register: download_result

    - name: DEBUG - Download result
      ansible.builtin.debug:
        msg: "{{ download_result.stdout | default('no output') }}"

    - name: Create extract directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ temp_dir }}\zabbix_extract'' -Force | Out-Null; Write-Host ''Created extract dir''"'

    - name: Extract ZIP
      raw: 'powershell -Command "Expand-Archive -Path ''{{ temp_dir }}\zabbix_agent2.zip'' -DestinationPath ''{{ temp_dir }}\zabbix_extract'' -Force; Write-Host ''Extracted ZIP''"'
      register: extract_result

    - name: DEBUG - Extract result
      ansible.builtin.debug:
        msg: "{{ extract_result.stdout | default('no output') }}"

    - name: List extracted contents
      raw: 'powershell -Command "Get-ChildItem -Path ''{{ temp_dir }}\zabbix_extract'' -Recurse | Select-Object FullName | Format-Table -HideTableHeaders"'
      register: contents

    - name: DEBUG - Extracted contents
      ansible.builtin.debug:
        msg: "{{ contents.stdout }}"

    - name: Find zabbix_agent2.exe location
      raw: 'powershell -Command "(Get-ChildItem -Path ''{{ temp_dir }}\zabbix_extract'' -Recurse -Filter ''zabbix_agent2.exe'' | Select-Object -First 1).FullName"'
      register: exe_location

    - name: DEBUG - exe location
      ansible.builtin.debug:
        msg: "Found exe at: {{ exe_location.stdout | trim }}"

    - name: Fail if exe not found in ZIP
      ansible.builtin.fail:
        msg: "zabbix_agent2.exe not found in extracted ZIP!"
      when: exe_location.stdout | trim == ""

    # ========== INSTALL ==========
    - name: Create agent directories
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ agent_dir }}\bin'',''{{ agent_dir }}\conf\zabbix_agent2.d\plugins.d'' -Force | Out-Null; Write-Host ''Created directories''"'
      register: mkdir_result

    - name: DEBUG - mkdir result
      ansible.builtin.debug:
        msg: "{{ mkdir_result.stdout | default('no output') }}"

    - name: Copy zabbix_agent2.exe
      raw: 'powershell -Command "Copy-Item -Path ''{{ exe_location.stdout | trim }}'' -Destination ''{{ agent_dir }}\bin\'' -Force; Write-Host ''Copied exe''"'
      register: copy_result

    - name: DEBUG - copy result
      ansible.builtin.debug:
        msg: "{{ copy_result.stdout | default('no output') }}"

    - name: Verify exe copied
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}\bin\zabbix_agent2.exe'') { Write-Host ''OK: exe exists'' } else { Write-Host ''FAIL: exe not found'' }"'
      register: exe_check

    - name: DEBUG - exe verify
      ansible.builtin.debug:
        msg: "{{ exe_check.stdout | trim }}"

    # ========== CONFIG ==========
    - name: Create zabbix_agent2.conf
      raw: 'powershell -Command "Set-Content -Path ''{{ agent_dir }}\conf\zabbix_agent2.conf'' -Value ''LogFile={{ agent_dir }}\zabbix_agent2.log`r`nLogFileSize=10`r`nServer={{ zabbix_server }}`r`nServerActive={{ zabbix_server }}`r`nHostname={{ clean_hostname }}`r`nControlSocket=\\.\pipe\agent.sock`r`nInclude={{ agent_dir }}\conf\zabbix_agent2.d\*.conf'' -Encoding ASCII; Write-Host ''Created config''"'
      register: config_result

    - name: DEBUG - config result
      ansible.builtin.debug:
        msg: "{{ config_result.stdout | default('no output') }}"

    - name: Show config content
      raw: 'powershell -Command "Get-Content ''{{ agent_dir }}\conf\zabbix_agent2.conf''"'
      register: conf_content

    - name: DEBUG - config content
      ansible.builtin.debug:
        msg: "{{ conf_content.stdout }}"

    # ========== FINAL CHECK BEFORE SERVICE INSTALL ==========
    - name: Final cleanup - delete registry key again just in case
      raw: 'reg delete "HKLM\SYSTEM\CurrentControlSet\Services\EventLog\Application\Zabbix Agent 2" /f 2>&1'
      register: final_reg_cleanup
      ignore_errors: yes

    - name: DEBUG - Final registry cleanup
      ansible.builtin.debug:
        msg: "{{ final_reg_cleanup.stdout | default('no output') }}"

    # ========== SERVICE ==========
    - name: Install Zabbix Agent 2 as Windows service
      raw: 'powershell -Command "& ''{{ agent_dir }}\bin\zabbix_agent2.exe'' --config ''{{ agent_dir }}\conf\zabbix_agent2.conf'' --install 2>&1"'
      register: install_service

    - name: DEBUG - Service install result
      ansible.builtin.debug:
        msg: "stdout: {{ install_service.stdout | default('no output') }} stderr: {{ install_service.stderr | default('no error') }}"

    - name: Start Zabbix Agent 2 service
      raw: 'powershell -Command "Start-Service -Name ''Zabbix Agent 2'' -ErrorAction SilentlyContinue; Write-Host ''Start service result:'' $?"'
      register: start_service
      ignore_errors: yes

    - name: DEBUG - Start service result
      ansible.builtin.debug:
        msg: "{{ start_service.stdout | default('no output') }}"

    - name: Wait for service
      raw: 'powershell -Command "Start-Sleep -Seconds 3"'

    # ========== VERIFY ==========
    - name: Get service status
      raw: 'powershell -Command "Get-Service -Name ''Zabbix Agent 2'' -ErrorAction SilentlyContinue | Format-List Name,Status,DisplayName"'
      register: final_status
      ignore_errors: yes

    - name: DEBUG - Service status
      ansible.builtin.debug:
        msg: "{{ final_status.stdout | default('SERVICE NOT FOUND') }}"

    - name: Get agent log
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}\zabbix_agent2.log'') { Get-Content ''{{ agent_dir }}\zabbix_agent2.log'' -Tail 10 } else { Write-Host ''no log file'' }"'
      register: agent_log
      ignore_errors: yes

    - name: DEBUG - Agent log
      ansible.builtin.debug:
        msg: "{{ agent_log.stdout | default('no log') }}"

    - name: FINAL RESULT
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "HOST: {{ inventory_hostname }} ({{ clean_hostname }})"
          - "ZABBIX SERVER: {{ zabbix_server }}"
          - "INSTALL DIR: {{ agent_dir }}"
          - "SERVICE STATUS: {{ final_status.stdout | default('NOT FOUND') | trim }}"
          - "============================================"

    # ========== CLEANUP ==========
    - name: Cleanup temp files
      raw: 'powershell -Command "Remove-Item -Path ''{{ temp_dir }}\zabbix_agent2.zip'',''{{ temp_dir }}\zabbix_extract'' -Recurse -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes
