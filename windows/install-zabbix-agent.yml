# install-zabbix-agent.yml
# Установка Zabbix Agent 2 на Windows серверы
# MSI часто не работает корректно, поэтому:
# 1. Устанавливаем MSI с явным INSTALLFOLDER
# 2. Создаём конфиг вручную
# 3. Регистрируем службу через zabbix_agent2.exe -i
#
# Зависимости: нет
# Хосты: windows
# Переменные: zabbix_server (из inventory)
---
- name: Install Zabbix Agent 2 on Windows
  hosts: windows
  gather_facts: no
  vars:
    zabbix_version: "7.0.22"
    agent_dir: 'C:\Program Files\Zabbix Agent 2'
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.0/{{ zabbix_version }}/zabbix_agent2-{{ zabbix_version }}-windows-amd64-openssl.msi"

  tasks:
    - name: Get hostname for Zabbix
      raw: hostname
      register: win_hostname

    # --- ПОЛНОЕ УДАЛЕНИЕ СТАРОГО АГЕНТА ---
    - name: Stop Zabbix Agent 2 service
      raw: 'powershell -Command "Stop-Service -Name ''Zabbix Agent 2'' -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Uninstall Zabbix Agent 2 service
      raw: 'powershell -Command "& ''{{ agent_dir }}\zabbix_agent2.exe'' -d -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Delete Zabbix Agent 2 service via sc
      raw: 'sc.exe delete "Zabbix Agent 2"'
      ignore_errors: yes

    - name: Remove old Zabbix Agent 2 folder
      raw: 'powershell -Command "Remove-Item -Path ''{{ agent_dir }}'' -Recurse -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Wait after cleanup
      raw: 'powershell -Command "Start-Sleep -Seconds 3"'

    # --- УСТАНОВКА MSI ---
    - name: Create Temp directory
      raw: 'powershell -Command "if (-not (Test-Path ''C:\Temp'')) { New-Item -ItemType Directory -Path ''C:\Temp'' -Force }"'

    - name: Download Zabbix Agent 2 MSI
      raw: 'powershell -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri ''{{ zabbix_msi_url }}'' -OutFile ''C:\Temp\zabbix_agent2.msi'' -UseBasicParsing"'

    - name: Install Zabbix Agent 2 MSI with explicit INSTALLFOLDER
      raw: 'powershell -Command "Start-Process msiexec.exe -ArgumentList ''/i C:\Temp\zabbix_agent2.msi /qn INSTALLFOLDER=\"{{ agent_dir }}\" /l*v C:\Temp\zabbix_install.log'' -Wait -NoNewWindow"'

    - name: Wait for MSI
      raw: 'powershell -Command "Start-Sleep -Seconds 5"'

    # --- ПРОВЕРКА УСТАНОВКИ ---
    - name: Check if agent exe exists
      raw: 'powershell -Command "Test-Path ''{{ agent_dir }}\zabbix_agent2.exe''"'
      register: exe_check

    - name: Debug exe check
      ansible.builtin.debug:
        msg: "Exe exists: {{ exe_check.stdout | trim }}"

    - name: Get MSI log if failed
      raw: 'powershell -Command "Get-Content ''C:\Temp\zabbix_install.log'' -Tail 50"'
      register: msi_log
      when: "'False' in exe_check.stdout"

    - name: Fail if exe not found
      ansible.builtin.fail:
        msg: "MSI failed. Check C:\\Temp\\zabbix_install.log on host. Last lines: {{ msi_log.stdout | default('') }}"
      when: "'False' in exe_check.stdout"

    # --- СОЗДАНИЕ КОНФИГА ---
    - name: Create zabbix_agent2.d directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ agent_dir }}\zabbix_agent2.d'' -Force | Out-Null"'

    - name: Create zabbix_agent2.d\plugins.d directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ agent_dir }}\zabbix_agent2.d\plugins.d'' -Force | Out-Null"'

    - name: Create zabbix_agent2.conf
      raw: |
        powershell -Command "
        @'
        LogFile=C:\Program Files\Zabbix Agent 2\zabbix_agent2.log
        LogFileSize=10
        Server={{ zabbix_server }}
        ServerActive={{ zabbix_server }}
        Hostname={{ win_hostname.stdout | trim }}
        ControlSocket=\\.\pipe\agent.sock
        Include=.\zabbix_agent2.d\*.conf
        '@ | Out-File -FilePath '{{ agent_dir }}\zabbix_agent2.conf' -Encoding ASCII -Force
        "

    # --- РЕГИСТРАЦИЯ И ЗАПУСК СЛУЖБЫ ---
    - name: Install Zabbix Agent 2 as Windows service
      raw: 'powershell -Command "& ''{{ agent_dir }}\zabbix_agent2.exe'' -c ''{{ agent_dir }}\zabbix_agent2.conf'' -i"'
      register: install_service

    - name: Debug service install
      ansible.builtin.debug:
        msg: "Service install: {{ install_service.stdout | default('') | trim }} {{ install_service.stderr | default('') | trim }}"

    - name: Start Zabbix Agent 2 service
      raw: 'powershell -Command "Start-Service -Name ''Zabbix Agent 2''"'
      register: start_service
      ignore_errors: yes

    - name: Wait for service
      raw: 'powershell -Command "Start-Sleep -Seconds 3"'

    # --- ФИНАЛЬНАЯ ПРОВЕРКА ---
    - name: Get service status
      raw: 'powershell -Command "Get-Service -Name ''Zabbix Agent 2'' -ErrorAction SilentlyContinue | Select-Object Status, DisplayName | ConvertTo-Json"'
      register: final_status
      ignore_errors: yes

    - name: Get agent log if not running
      raw: 'powershell -Command "Get-Content ''{{ agent_dir }}\zabbix_agent2.log'' -Tail 10 -ErrorAction SilentlyContinue"'
      register: agent_log
      ignore_errors: yes

    - name: Show result
      ansible.builtin.debug:
        msg:
          - "=== {{ inventory_hostname }} ({{ win_hostname.stdout | trim }}) ==="
          - "Zabbix Server: {{ zabbix_server }}"
          - "Service: {{ final_status.stdout | default('NOT FOUND') | trim }}"
          - "Agent log: {{ agent_log.stdout | default('no log') | trim }}"
