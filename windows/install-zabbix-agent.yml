# install-zabbix-agent.yml
# Установка Zabbix Agent 2 на Windows серверы
# ВСЕГДА удаляет старый агент и ставит чистый
# После установки создаёт правильный конфиг (MSI не применяет параметры)
#
# Зависимости: нет
# Хосты: windows
# Переменные: zabbix_server (из inventory)
---
- name: Install Zabbix Agent 2 on Windows
  hosts: windows
  gather_facts: no
  vars:
    zabbix_version: "7.0.22"
    agent_dir: 'C:\Program Files\Zabbix Agent 2'
    # zabbix_server берётся из inventory (windows.vars.zabbix_server)
    zabbix_msi_url: "https://cdn.zabbix.com/zabbix/binaries/stable/7.0/{{ zabbix_version }}/zabbix_agent2-{{ zabbix_version }}-windows-amd64-openssl.msi"

  tasks:
    - name: Get hostname for Zabbix
      raw: hostname
      register: win_hostname

    # --- ПОЛНОЕ УДАЛЕНИЕ СТАРОГО АГЕНТА ---
    - name: Stop Zabbix Agent 2 service
      raw: 'powershell -Command "Stop-Service -Name ''Zabbix Agent 2'' -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Stop Zabbix Agent (old) service
      raw: 'powershell -Command "Stop-Service -Name ''Zabbix Agent'' -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Delete Zabbix Agent 2 service (if broken)
      raw: 'sc.exe delete "Zabbix Agent 2"'
      ignore_errors: yes

    - name: Delete Zabbix Agent service (old)
      raw: 'sc.exe delete "Zabbix Agent"'
      ignore_errors: yes

    - name: Remove old Zabbix Agent 2 folder
      raw: 'powershell -Command "Remove-Item -Path ''{{ agent_dir }}'' -Recurse -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Remove old Zabbix Agent folder
      raw: 'powershell -Command "Remove-Item -Path ''C:\Program Files\Zabbix Agent'' -Recurse -Force -ErrorAction SilentlyContinue"'
      ignore_errors: yes

    - name: Wait after cleanup
      raw: 'powershell -Command "Start-Sleep -Seconds 3"'

    # --- УСТАНОВКА НОВОГО АГЕНТА ---
    - name: Create Temp directory
      raw: 'powershell -Command "if (-not (Test-Path ''C:\Temp'')) { New-Item -ItemType Directory -Path ''C:\Temp'' }"'

    - name: Create agent directory before MSI
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ agent_dir }}'' -Force | Out-Null"'

    - name: Enable TLS 1.2 and download Zabbix Agent 2 MSI
      raw: 'powershell -Command "[Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12; Invoke-WebRequest -Uri ''{{ zabbix_msi_url }}'' -OutFile ''C:\Temp\zabbix_agent2.msi'' -UseBasicParsing"'

    - name: Install Zabbix Agent 2 (MSI with parameters)
      raw: 'powershell -Command "Start-Process msiexec.exe -ArgumentList ''/l*v C:\Temp\zabbix_install.log /i C:\Temp\zabbix_agent2.msi /qn SERVER={{ zabbix_server }} SERVERACTIVE={{ zabbix_server }} HOSTNAME={{ win_hostname.stdout | trim }} ENABLEPATH=1'' -Wait -NoNewWindow"'

    - name: Wait for installation
      raw: 'powershell -Command "Start-Sleep -Seconds 10"'

    - name: Check if agent exe exists
      raw: 'powershell -Command "Test-Path ''{{ agent_dir }}\zabbix_agent2.exe''"'
      register: exe_check

    - name: Show MSI log if exe not found
      raw: 'powershell -Command "Get-Content ''C:\Temp\zabbix_install.log'' -Tail 30"'
      register: msi_log
      when: "'False' in exe_check.stdout"

    - name: Fail if exe not found
      ansible.builtin.fail:
        msg: "MSI installation failed. Log: {{ msi_log.stdout | default('no log') }}"
      when: "'False' in exe_check.stdout"

    - name: Create zabbix_agent2.d directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ agent_dir }}\zabbix_agent2.d'' -Force | Out-Null"'

    # Создаём конфиг вручную (MSI часто не применяет параметры)
    - name: Create correct zabbix_agent2.conf
      raw: |
        powershell -Command "
        @'
        LogFile=C:\Program Files\Zabbix Agent 2\zabbix_agent2.log
        LogFileSize=10
        Server={{ zabbix_server }}
        ServerActive={{ zabbix_server }}
        Hostname={{ win_hostname.stdout | trim }}
        ControlSocket=\\.\pipe\agent.sock
        Include=.\zabbix_agent2.d\plugins.d\*.conf
        Include=.\zabbix_agent2.d\*.conf
        '@ | Out-File -FilePath '{{ agent_dir }}\zabbix_agent2.conf' -Encoding ASCII -Force
        "

    # --- ЗАПУСК СЛУЖБЫ ---
    - name: Start Zabbix Agent 2 service
      raw: 'powershell -Command "Start-Service -Name ''Zabbix Agent 2''"'
      register: start_result
      ignore_errors: yes

    - name: Wait for service start
      raw: 'powershell -Command "Start-Sleep -Seconds 3"'

    # --- ПРОВЕРКА ---
    - name: Verify service status
      raw: 'powershell -Command "Get-Service -Name ''Zabbix Agent 2'' | Select-Object Status, DisplayName | ConvertTo-Json"'
      register: final_status

    - name: Get agent log if failed
      raw: 'powershell -Command "if ((Get-Service -Name ''Zabbix Agent 2'').Status -ne ''Running'') { Get-Content ''{{ agent_dir }}\zabbix_agent2.log'' -Tail 20 -ErrorAction SilentlyContinue }"'
      register: agent_log
      ignore_errors: yes

    - name: Show result
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }} ({{ win_hostname.stdout | trim }})"
          - "Zabbix Server: {{ zabbix_server }}"
          - "Status: {{ final_status.stdout | default('ERROR') | trim }}"
          - "Agent log: {{ agent_log.stdout | default('') | trim }}"
