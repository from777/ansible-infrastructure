# configure-kaspersky-monitoring.yml
# Настройка UserParameter для мониторинга Kaspersky через Zabbix Agent 2
# Запускать ПОСЛЕ install-zabbix-agent.yml
# Хосты указывать через Limit в Task Template
---
- name: Configure Kaspersky monitoring on Zabbix Agent 2
  hosts: windows_servers
  gather_facts: no
  vars:
    agent_conf_dir: 'C:\Program Files\Zabbix Agent 2\zabbix_agent2.d'

  tasks:
    - name: Check if Zabbix Agent 2 installed
      raw: 'powershell -Command "Test-Path ''{{ agent_conf_dir }}''"'
      register: agent_dir_check

    - name: Fail if agent not installed
      ansible.builtin.fail:
        msg: "Zabbix Agent 2 not installed on {{ inventory_hostname }}. Run install-zabbix-agent.yml first."
      when: "'False' in agent_dir_check.stdout"

    # Создаём файл через echo с экранированием
    - name: Create kaspersky.conf UserParameter file
      raw: |
        powershell -Command "
        Set-Content -Path '{{ agent_conf_dir }}\kaspersky.conf' -Value @'
        # Kaspersky monitoring UserParameters
        UserParameter=kaspersky.db.age,powershell -NoProfile -Command \"`$f = Get-ChildItem 'C:\ProgramData\Kaspersky Lab\AVP*\Bases' -File -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1; if (`$f) { [math]::Round(((Get-Date) - `$f.LastWriteTime).TotalDays, 1) } else { -1 }\"
        UserParameter=kaspersky.status,powershell -NoProfile -Command \"(`$p = Get-CimInstance -Namespace root/SecurityCenter2 -ClassName AntivirusProduct -ErrorAction SilentlyContinue | Where-Object { `$_.displayName -like '*Kaspersky*' }); if (`$p) { `$p.productState } else { 0 }\"
        UserParameter=kaspersky.db.date,powershell -NoProfile -Command \"`$f = Get-ChildItem 'C:\ProgramData\Kaspersky Lab\AVP*\Bases' -File -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1; if (`$f) { `$f.LastWriteTime.ToString('yyyy-MM-dd HH:mm') } else { 'N/A' }\"
        '@
        "

    - name: Restart Zabbix Agent 2 to apply config
      raw: 'powershell -Command "Restart-Service -Name ''Zabbix Agent 2'' -Force"'

    - name: Wait for agent restart
      raw: 'powershell -Command "Start-Sleep -Seconds 5"'

    - name: Verify UserParameter works
      raw: 'powershell -Command "& ''C:\Program Files\Zabbix Agent 2\zabbix_agent2.exe'' -t kaspersky.db.age 2>&1"'
      register: test_result
      ignore_errors: yes

    - name: Show test result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: kaspersky.db.age = {{ test_result.stdout | trim }}"
