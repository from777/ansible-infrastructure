# configure-kaspersky-monitoring.yml
# Настройка UserParameter для мониторинга Kaspersky через Zabbix Agent 2
# Запускать ПОСЛЕ install-zabbix-agent.yml
# Хосты указывать через Limit в Task Template
---
- name: Configure Kaspersky monitoring on Zabbix Agent 2
  hosts: windows_servers
  gather_facts: no
  vars:
    agent_dir: 'C:\Program Files\Zabbix Agent 2'
    scripts_dir: 'C:\Program Files\Zabbix Agent 2\scripts'

  tasks:
    - name: Check if Zabbix Agent 2 installed
      raw: 'powershell -Command "Test-Path ''{{ agent_dir }}''"'
      register: agent_dir_check

    - name: Fail if agent not installed
      ansible.builtin.fail:
        msg: "Zabbix Agent 2 not installed on {{ inventory_hostname }}. Run install-zabbix-agent.yml first."
      when: "'False' in agent_dir_check.stdout"

    - name: Create scripts directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ scripts_dir }}'' -Force"'

    # Скрипт kaspersky-db-age.ps1
    - name: Create kaspersky-db-age.ps1
      raw: |
        powershell -Command "$script = @'
        $f = Get-ChildItem 'C:\ProgramData\Kaspersky Lab\AVP*\Bases' -File -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if ($f) { [math]::Round(((Get-Date) - $f.LastWriteTime).TotalDays, 1) } else { -1 }
        '@; $script | Out-File -FilePath '{{ scripts_dir }}\kaspersky-db-age.ps1' -Encoding UTF8 -Force"

    # Скрипт kaspersky-status.ps1
    - name: Create kaspersky-status.ps1
      raw: |
        powershell -Command "$script = @'
        $av = Get-CimInstance -Namespace root/SecurityCenter2 -ClassName AntivirusProduct -ErrorAction SilentlyContinue | Where-Object { $_.displayName -like '*Kaspersky*' } | Select-Object -First 1
        if ($av) { $av.productState } else { 0 }
        '@; $script | Out-File -FilePath '{{ scripts_dir }}\kaspersky-status.ps1' -Encoding UTF8 -Force"

    # Скрипт kaspersky-db-date.ps1
    - name: Create kaspersky-db-date.ps1
      raw: |
        powershell -Command "$script = @'
        $f = Get-ChildItem 'C:\ProgramData\Kaspersky Lab\AVP*\Bases' -File -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 1
        if ($f) { $f.LastWriteTime.ToString('yyyy-MM-dd HH:mm') } else { 'N/A' }
        '@; $script | Out-File -FilePath '{{ scripts_dir }}\kaspersky-db-date.ps1' -Encoding UTF8 -Force"

    # Создаём kaspersky.conf с UserParameter
    - name: Create kaspersky.conf line 1
      raw: 'powershell -Command "''# Kaspersky monitoring'' | Out-File -FilePath ''{{ agent_dir }}\zabbix_agent2.d\kaspersky.conf'' -Encoding UTF8 -Force"'

    - name: Create kaspersky.conf line 2
      raw: 'powershell -Command "''UserParameter=kaspersky.db.age,powershell -NoProfile -ExecutionPolicy Bypass -File \"C:\Program Files\Zabbix Agent 2\scripts\kaspersky-db-age.ps1\"'' | Add-Content -Path ''{{ agent_dir }}\zabbix_agent2.d\kaspersky.conf'' -Encoding UTF8"'

    - name: Create kaspersky.conf line 3
      raw: 'powershell -Command "''UserParameter=kaspersky.status,powershell -NoProfile -ExecutionPolicy Bypass -File \"C:\Program Files\Zabbix Agent 2\scripts\kaspersky-status.ps1\"'' | Add-Content -Path ''{{ agent_dir }}\zabbix_agent2.d\kaspersky.conf'' -Encoding UTF8"'

    - name: Create kaspersky.conf line 4
      raw: 'powershell -Command "''UserParameter=kaspersky.db.date,powershell -NoProfile -ExecutionPolicy Bypass -File \"C:\Program Files\Zabbix Agent 2\scripts\kaspersky-db-date.ps1\"'' | Add-Content -Path ''{{ agent_dir }}\zabbix_agent2.d\kaspersky.conf'' -Encoding UTF8"'

    - name: Restart Zabbix Agent 2
      raw: 'powershell -Command "Restart-Service -Name ''Zabbix Agent 2'' -Force"'

    - name: Wait for agent restart
      raw: 'powershell -Command "Start-Sleep -Seconds 5"'

    - name: Test kaspersky.db.age
      raw: 'powershell -Command "& ''{{ agent_dir }}\zabbix_agent2.exe'' -t kaspersky.db.age 2>&1"'
      register: test_result
      ignore_errors: yes

    - name: Show test result
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }}: {{ test_result.stdout | trim }}"
