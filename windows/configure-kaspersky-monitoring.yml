# configure-kaspersky-monitoring.yml
# Настройка UserParameter для мониторинга Kaspersky через Zabbix Agent 2
#
# Зависимости: install-zabbix-agent.yml (агент должен быть установлен)
# Хосты: windows
# Путь установки агента: C:\Zabbix (соответствует install-zabbix-agent.yml)
---
- name: Configure Kaspersky monitoring on Zabbix Agent 2
  hosts: windows
  gather_facts: no
  vars:
    agent_dir: 'C:\Zabbix'
    scripts_dir: 'C:\Zabbix\scripts'
    # Base64 encoded scripts - читают из registry Kaspersky (LastSuccessfulUpdate в FILETIME)
    # Registry path: HKLM:\SOFTWARE\Wow6432Node\KasperskyLab\AVP*\Data\LastSuccessfulUpdate
    script_db_age_b64: ""
    script_status_b64: ""
    script_db_date_b64: ""
    # Base64 kaspersky.conf с путями C:\Zabbix\scripts\
    kaspersky_conf_b64: ""

  tasks:
    - name: Show configuration
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "HOST: {{ inventory_hostname }}"
          - "AGENT DIR: {{ agent_dir }}"
          - "SCRIPTS DIR: {{ scripts_dir }}"
          - "============================================"

    # ========== CHECK AGENT INSTALLED ==========
    - name: Check if Zabbix Agent 2 directory exists
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}'') { Write-Host ''EXISTS'' } else { Write-Host ''NOT_FOUND'' }"'
      register: agent_dir_check

    - name: DEBUG - Agent directory check
      ansible.builtin.debug:
        msg: "Agent directory {{ agent_dir }}: {{ agent_dir_check.stdout | trim }}"

    - name: Fail if agent not installed
      ansible.builtin.fail:
        msg: "Zabbix Agent 2 not installed on {{ inventory_hostname }}. Directory {{ agent_dir }} not found. Run install-zabbix-agent.yml first."
      when: "'NOT_FOUND' in agent_dir_check.stdout"

    - name: Check if zabbix_agent2.exe exists
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}\bin\zabbix_agent2.exe'') { Write-Host ''EXISTS'' } else { Write-Host ''NOT_FOUND'' }"'
      register: exe_check

    - name: DEBUG - Agent exe check
      ansible.builtin.debug:
        msg: "Agent exe {{ agent_dir }}\\bin\\zabbix_agent2.exe: {{ exe_check.stdout | trim }}"

    - name: Fail if exe not found
      ansible.builtin.fail:
        msg: "zabbix_agent2.exe not found in {{ agent_dir }}\\bin\\. Agent installation is broken."
      when: "'NOT_FOUND' in exe_check.stdout"

    # ========== CREATE SCRIPTS DIRECTORY ==========
    - name: Create scripts directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ scripts_dir }}'' -Force | Out-Null; Write-Host ''Created scripts directory''"'
      register: scripts_dir_result

    - name: DEBUG - Scripts directory result
      ansible.builtin.debug:
        msg: "{{ scripts_dir_result.stdout | default('no output') }}"

    - name: Verify scripts directory exists
      raw: 'powershell -Command "if (Test-Path ''{{ scripts_dir }}'') { Write-Host ''EXISTS'' } else { Write-Host ''NOT_FOUND'' }"'
      register: scripts_dir_check

    - name: DEBUG - Scripts directory verify
      ansible.builtin.debug:
        msg: "Scripts directory {{ scripts_dir }}: {{ scripts_dir_check.stdout | trim }}"

    # ========== CREATE KASPERSKY SCRIPTS ==========
    - name: Create kaspersky-db-age.ps1
      raw: 'powershell -Command "[IO.File]::WriteAllBytes(''{{ scripts_dir }}\kaspersky-db-age.ps1'', [Convert]::FromBase64String(''{{ script_db_age_b64 }}'')); Write-Host ''Created kaspersky-db-age.ps1''"'
      register: script_age_result

    - name: DEBUG - kaspersky-db-age.ps1 result
      ansible.builtin.debug:
        msg: "{{ script_age_result.stdout | default('no output') }}"

    - name: Verify kaspersky-db-age.ps1 exists
      raw: 'powershell -Command "if (Test-Path ''{{ scripts_dir }}\kaspersky-db-age.ps1'') { Write-Host ''EXISTS - size:'' (Get-Item ''{{ scripts_dir }}\kaspersky-db-age.ps1'').Length ''bytes'' } else { Write-Host ''NOT_FOUND'' }"'
      register: script_age_check

    - name: DEBUG - kaspersky-db-age.ps1 verify
      ansible.builtin.debug:
        msg: "{{ script_age_check.stdout | trim }}"

    - name: Create kaspersky-status.ps1
      raw: 'powershell -Command "[IO.File]::WriteAllBytes(''{{ scripts_dir }}\kaspersky-status.ps1'', [Convert]::FromBase64String(''{{ script_status_b64 }}'')); Write-Host ''Created kaspersky-status.ps1''"'
      register: script_status_result

    - name: DEBUG - kaspersky-status.ps1 result
      ansible.builtin.debug:
        msg: "{{ script_status_result.stdout | default('no output') }}"

    - name: Verify kaspersky-status.ps1 exists
      raw: 'powershell -Command "if (Test-Path ''{{ scripts_dir }}\kaspersky-status.ps1'') { Write-Host ''EXISTS - size:'' (Get-Item ''{{ scripts_dir }}\kaspersky-status.ps1'').Length ''bytes'' } else { Write-Host ''NOT_FOUND'' }"'
      register: script_status_check

    - name: DEBUG - kaspersky-status.ps1 verify
      ansible.builtin.debug:
        msg: "{{ script_status_check.stdout | trim }}"

    - name: Create kaspersky-db-date.ps1
      raw: 'powershell -Command "[IO.File]::WriteAllBytes(''{{ scripts_dir }}\kaspersky-db-date.ps1'', [Convert]::FromBase64String(''{{ script_db_date_b64 }}'')); Write-Host ''Created kaspersky-db-date.ps1''"'
      register: script_date_result

    - name: DEBUG - kaspersky-db-date.ps1 result
      ansible.builtin.debug:
        msg: "{{ script_date_result.stdout | default('no output') }}"

    - name: Verify kaspersky-db-date.ps1 exists
      raw: 'powershell -Command "if (Test-Path ''{{ scripts_dir }}\kaspersky-db-date.ps1'') { Write-Host ''EXISTS - size:'' (Get-Item ''{{ scripts_dir }}\kaspersky-db-date.ps1'').Length ''bytes'' } else { Write-Host ''NOT_FOUND'' }"'
      register: script_date_check

    - name: DEBUG - kaspersky-db-date.ps1 verify
      ansible.builtin.debug:
        msg: "{{ script_date_check.stdout | trim }}"

    # ========== LIST ALL SCRIPTS ==========
    - name: List scripts directory
      raw: 'powershell -Command "Get-ChildItem ''{{ scripts_dir }}'' | Select-Object Name,Length | Format-Table -AutoSize"'
      register: scripts_list

    - name: DEBUG - Scripts list
      ansible.builtin.debug:
        msg: "{{ scripts_list.stdout }}"

    # ========== CREATE KASPERSKY.CONF ==========
    - name: Check if conf directory exists
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}\conf\zabbix_agent2.d'') { Write-Host ''EXISTS'' } else { Write-Host ''NOT_FOUND'' }"'
      register: conf_dir_check

    - name: DEBUG - Conf directory check
      ansible.builtin.debug:
        msg: "Conf directory {{ agent_dir }}\\conf\\zabbix_agent2.d: {{ conf_dir_check.stdout | trim }}"

    - name: Create conf directory if not exists
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ agent_dir }}\conf\zabbix_agent2.d'' -Force | Out-Null; Write-Host ''Created conf directory''"'
      register: conf_dir_create
      when: "'NOT_FOUND' in conf_dir_check.stdout"

    - name: DEBUG - Conf directory create result
      ansible.builtin.debug:
        msg: "{{ conf_dir_create.stdout | default('directory already exists') }}"
      when: conf_dir_create is defined

    - name: Create kaspersky.conf
      raw: 'powershell -Command "[IO.File]::WriteAllBytes(''{{ agent_dir }}\conf\zabbix_agent2.d\kaspersky.conf'', [Convert]::FromBase64String(''{{ kaspersky_conf_b64 }}'')); Write-Host ''Created kaspersky.conf''"'
      register: kaspersky_conf_result

    - name: DEBUG - kaspersky.conf result
      ansible.builtin.debug:
        msg: "{{ kaspersky_conf_result.stdout | default('no output') }}"

    - name: Show kaspersky.conf content
      raw: 'powershell -Command "Get-Content ''{{ agent_dir }}\conf\zabbix_agent2.d\kaspersky.conf''"'
      register: kaspersky_conf_content

    - name: DEBUG - kaspersky.conf content
      ansible.builtin.debug:
        msg: "{{ kaspersky_conf_content.stdout }}"


    # ========== RESTART AGENT ==========
    - name: Get service status before restart
      raw: 'powershell -Command "Get-Service -Name ''Zabbix Agent 2'' -ErrorAction SilentlyContinue | Select-Object Name,Status | Format-List"'
      register: service_before

    - name: DEBUG - Service status before restart
      ansible.builtin.debug:
        msg: "{{ service_before.stdout | default('SERVICE NOT FOUND') }}"

    - name: Restart Zabbix Agent 2
      raw: 'powershell -Command "Restart-Service -Name ''Zabbix Agent 2'' -Force; Write-Host ''Restart command completed''"'
      register: restart_result

    - name: DEBUG - Restart result
      ansible.builtin.debug:
        msg: "{{ restart_result.stdout | default('no output') }}"

    - name: Wait for agent restart
      raw: 'powershell -Command "Start-Sleep -Seconds 3; Write-Host ''Waited 3 seconds''"'

    - name: Force start Zabbix Agent 2 (in case restart failed)
      raw: 'powershell -Command "Start-Service -Name ''Zabbix Agent 2'' -ErrorAction SilentlyContinue; Write-Host ''Start service result:'' $?"'
      register: start_result
      ignore_errors: yes

    - name: DEBUG - Start service result
      ansible.builtin.debug:
        msg: "{{ start_result.stdout | default('no output') }}"

    - name: Wait after start
      raw: 'powershell -Command "Start-Sleep -Seconds 3; Write-Host ''Waited 3 seconds''"'

    - name: Get service status after restart
      raw: 'powershell -Command "Get-Service -Name ''Zabbix Agent 2'' -ErrorAction SilentlyContinue | Select-Object Name,Status | Format-List"'
      register: service_after

    - name: DEBUG - Service status after restart
      ansible.builtin.debug:
        msg: "{{ service_after.stdout | default('SERVICE NOT FOUND') }}"

    # ========== TEST USERPARAMETERS ==========
    - name: Test kaspersky.db.age via agent
      raw: 'powershell -Command "& ''{{ agent_dir }}\bin\zabbix_agent2.exe'' -c ''{{ agent_dir }}\conf\zabbix_agent2.conf'' -t kaspersky.db.age 2>&1"'
      register: test_age
      ignore_errors: yes

    - name: DEBUG - kaspersky.db.age test
      ansible.builtin.debug:
        msg: "{{ test_age.stdout | default('ERROR: no output') }}"

    - name: Test kaspersky.status via agent
      raw: 'powershell -Command "& ''{{ agent_dir }}\bin\zabbix_agent2.exe'' -c ''{{ agent_dir }}\conf\zabbix_agent2.conf'' -t kaspersky.status 2>&1"'
      register: test_status
      ignore_errors: yes

    - name: DEBUG - kaspersky.status test
      ansible.builtin.debug:
        msg: "{{ test_status.stdout | default('ERROR: no output') }}"

    - name: Test kaspersky.db.date via agent
      raw: 'powershell -Command "& ''{{ agent_dir }}\bin\zabbix_agent2.exe'' -c ''{{ agent_dir }}\conf\zabbix_agent2.conf'' -t kaspersky.db.date 2>&1"'
      register: test_date
      ignore_errors: yes

    - name: DEBUG - kaspersky.db.date test
      ansible.builtin.debug:
        msg: "{{ test_date.stdout | default('ERROR: no output') }}"

    # ========== CHECK AGENT LOG FOR ERRORS ==========
    - name: Get last 10 lines of agent log
      raw: 'powershell -Command "if (Test-Path ''{{ agent_dir }}\zabbix_agent2.log'') { Get-Content ''{{ agent_dir }}\zabbix_agent2.log'' -Tail 10 } else { Write-Host ''no log file'' }"'
      register: agent_log
      ignore_errors: yes

    - name: DEBUG - Agent log (last 10 lines)
      ansible.builtin.debug:
        msg: "{{ agent_log.stdout | default('no log') }}"

    # ========== FINAL RESULT ==========
    - name: FINAL RESULT
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "HOST: {{ inventory_hostname }}"
          - "SCRIPTS:"
          - "  kaspersky-db-age.ps1: {{ script_age_check.stdout | trim }}"
          - "  kaspersky-status.ps1: {{ script_status_check.stdout | trim }}"
          - "  kaspersky-db-date.ps1: {{ script_date_check.stdout | trim }}"
          - "CONFIG:"
          - "  kaspersky.conf: {{ agent_dir }}\\conf\\zabbix_agent2.d\\kaspersky.conf"
          - "SERVICE: {{ service_after.stdout | default('NOT FOUND') | trim }}"
          - "TESTS:"
          - "  db.age: {{ test_age.stdout | default('ERROR') | trim }}"
          - "  status: {{ test_status.stdout | default('ERROR') | trim }}"
          - "  db.date: {{ test_date.stdout | default('ERROR') | trim }}"
          - "============================================"
