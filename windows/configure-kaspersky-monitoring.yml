# configure-kaspersky-monitoring.yml
# Настройка UserParameter для мониторинга Kaspersky через Zabbix Agent 2
---
- name: Configure Kaspersky monitoring on Zabbix Agent 2
  hosts: windows_servers
  gather_facts: no
  vars:
    agent_dir: 'C:\Program Files\Zabbix Agent 2'
    scripts_dir: 'C:\Program Files\Zabbix Agent 2\scripts'
    # Base64 encoded scripts
    # С -Recurse для поиска внутри подпапок
    script_db_age_b64: ""
    script_status_b64: ""
    script_db_date_b64: ""
    kaspersky_conf_b64: ""

  tasks:
    - name: Check if Zabbix Agent 2 installed
      raw: 'powershell -Command "Test-Path ''{{ agent_dir }}''"'
      register: agent_dir_check

    - name: Fail if agent not installed
      ansible.builtin.fail:
        msg: "Zabbix Agent 2 not installed on {{ inventory_hostname }}. Run install-zabbix-agent.yml first."
      when: "'False' in agent_dir_check.stdout"

    - name: Create scripts directory
      raw: 'powershell -Command "New-Item -ItemType Directory -Path ''{{ scripts_dir }}'' -Force | Out-Null"'

    - name: Create kaspersky-db-age.ps1
      raw: 'powershell -Command "[IO.File]::WriteAllText(''{{ scripts_dir }}\kaspersky-db-age.ps1'', [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(''{{ script_db_age_b64 }}'')))"'

    - name: Create kaspersky-status.ps1
      raw: 'powershell -Command "[IO.File]::WriteAllText(''{{ scripts_dir }}\kaspersky-status.ps1'', [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(''{{ script_status_b64 }}'')))"'

    - name: Create kaspersky-db-date.ps1
      raw: 'powershell -Command "[IO.File]::WriteAllText(''{{ scripts_dir }}\kaspersky-db-date.ps1'', [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(''{{ script_db_date_b64 }}'')))"'

    - name: Create kaspersky.conf
      raw: 'powershell -Command "[IO.File]::WriteAllText(''{{ agent_dir }}\zabbix_agent2.d\kaspersky.conf'', [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String(''{{ kaspersky_conf_b64 }}'')))"'

    - name: Restart Zabbix Agent 2
      raw: 'powershell -Command "Restart-Service -Name ''Zabbix Agent 2'' -Force"'

    - name: Wait for agent restart
      raw: 'powershell -Command "Start-Sleep -Seconds 5"'

    - name: Test kaspersky.db.age
      raw: 'powershell -Command "& ''{{ agent_dir }}\zabbix_agent2.exe'' -t kaspersky.db.age"'
      register: test_age
      ignore_errors: yes

    - name: Test kaspersky.status
      raw: 'powershell -Command "& ''{{ agent_dir }}\zabbix_agent2.exe'' -t kaspersky.status"'
      register: test_status
      ignore_errors: yes

    - name: Show results
      ansible.builtin.debug:
        msg:
          - "{{ inventory_hostname }}:"
          - "  db.age: {{ test_age.stdout | default('ERROR') | trim }}"
          - "  status: {{ test_status.stdout | default('ERROR') | trim }}"
