# Zabbix Agent 2 UserParameter для мониторинга Kaspersky
# Копировать в: C:\Program Files\Zabbix Agent 2\zabbix_agent2.d\

# Возраст баз Kaspersky в днях (из WMI SecurityCenter2)
UserParameter=kaspersky.db.age,powershell -NoProfile -Command "$av = Get-CimInstance -Namespace 'root/SecurityCenter2' -ClassName AntivirusProduct -ErrorAction SilentlyContinue | Where-Object { $_.displayName -like '*Kaspersky*' } | Sort-Object timestamp -Descending | Select-Object -First 1; if ($av) { $ts = [DateTime]::Parse($av.timestamp); [math]::Round(((Get-Date) - $ts).TotalDays, 1) } else { -1 }"

# Статус Kaspersky (productState: 266240 = включен и обновлён)
UserParameter=kaspersky.status,powershell -NoProfile -Command "$av = Get-CimInstance -Namespace 'root/SecurityCenter2' -ClassName AntivirusProduct -ErrorAction SilentlyContinue | Where-Object { $_.displayName -like '*Kaspersky*' } | Sort-Object timestamp -Descending | Select-Object -First 1; if ($av) { $av.productState } else { 0 }"

# Дата последнего обновления баз (формат: yyyy-MM-dd HH:mm)
UserParameter=kaspersky.db.date,powershell -NoProfile -Command "$av = Get-CimInstance -Namespace 'root/SecurityCenter2' -ClassName AntivirusProduct -ErrorAction SilentlyContinue | Where-Object { $_.displayName -like '*Kaspersky*' } | Sort-Object timestamp -Descending | Select-Object -First 1; if ($av) { ([DateTime]::Parse($av.timestamp)).ToString('yyyy-MM-dd HH:mm') } else { 'N/A' }"
